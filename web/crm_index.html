<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRM Agent — Home</title>
<style>

/* ════════════════════════════════════════════════════════════════════
   GALAXY BACKGROUND  (Activity page — exact)
   ════════════════════════════════════════════════════════════════════ */
.galaxy-background {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: -1;
    overflow: hidden;
    background: radial-gradient(ellipse at center, #1a0933 0%, #0a0118 100%);
}
.galaxy-background::before {
    content: '';
    position: absolute;
    top: -50%; left: -50%;
    width: 200%; height: 200%;
    background:
        radial-gradient(ellipse at 30% 40%, rgba(255,20,147,0.4) 0%, transparent 40%),
        radial-gradient(ellipse at 70% 60%, rgba(0,191,255,0.4)  0%, transparent 40%),
        radial-gradient(ellipse at 50% 50%, rgba(138,43,226,0.3) 0%, transparent 50%);
    animation: galaxy-rotate 120s linear infinite;
}
.galaxy-background::after {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background-image:
        radial-gradient(2px 2px at 20% 30%, white, transparent),
        radial-gradient(2px 2px at 60% 70%, white, transparent),
        radial-gradient(1px 1px at 50% 50%, white, transparent),
        radial-gradient(1px 1px at 80% 10%, white, transparent),
        radial-gradient(2px 2px at 90% 60%, white, transparent),
        radial-gradient(1px 1px at 33% 50%, white, transparent),
        radial-gradient(1px 1px at 66% 33%, white, transparent);
    background-size: 200% 200%, 200% 200%, 300% 300%, 250% 250%, 200% 200%, 280% 280%, 220% 220%;
    background-position: 0% 0%, 100% 100%, 50% 50%, 80% 20%, 10% 90%, 40% 60%, 70% 30%;
    animation: stars-twinkle 8s ease-in-out infinite;
}
.nebula-cloud {
    position: absolute;
    border-radius: 50%;
    filter: blur(60px);
    opacity: 0.6;
    animation: nebula-float 20s ease-in-out infinite;
}
.nebula-cloud:nth-child(1) { top:10%;left:20%;width:400px;height:400px;background:radial-gradient(circle,rgba(255,20,147,0.6) 0%,transparent 70%);animation-delay:0s; }
.nebula-cloud:nth-child(2) { top:50%;right:15%;width:500px;height:500px;background:radial-gradient(circle,rgba(0,191,255,0.5) 0%,transparent 70%);animation-delay:-7s; }
.nebula-cloud:nth-child(3) { bottom:15%;left:35%;width:450px;height:450px;background:radial-gradient(circle,rgba(138,43,226,0.5) 0%,transparent 70%);animation-delay:-14s; }
@keyframes galaxy-rotate { 0%{transform:rotate(0deg)}100%{transform:rotate(360deg)} }
@keyframes stars-twinkle  { 0%,100%{opacity:1}50%{opacity:0.5} }
@keyframes nebula-float   { 0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(30px,-30px) scale(1.1)}66%{transform:translate(-20px,20px) scale(0.9)} }

/* ════════════════════════════════════════════════════════════════════
   BASE  (Activity page)
   ════════════════════════════════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body {
    font-family: "Segoe UI", Tahoma, sans-serif;
    background: transparent;
    margin: 0; padding: 0;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    position: relative;
}
a { color: inherit; text-decoration: none; }

/* ════════════════════════════════════════════════════════════════════
   HEADER  (Activity page — exact)
   ════════════════════════════════════════════════════════════════════ */
header {
    background: linear-gradient(135deg, rgba(0,120,215,0.95) 0%, rgba(88,86,214,0.95) 100%);
    color: white;
    padding: 0.5rem 1rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: 0 2px 20px rgba(138,43,226,0.5);
    backdrop-filter: blur(10px);
    position: relative;
    z-index: 10;
}
.header-brand {
    flex: 1;                       /* equal weight left column */
    display: flex;
    align-items: center;
}
header h1 {
    font-size: 1.2rem;
    font-weight: bold;
    margin: 0;
    text-shadow: 0 0 20px rgba(255,255,255,0.5), 0 0 40px rgba(138,43,226,0.5);
    line-height: 1;
}
.header-greeting {
    flex: 1;                       /* centre column — takes equal space */
    font-size: 1.2rem;             /* same as h1 */
    font-weight: bold;
    color: white;
    margin: 0;
    text-align: center;
    text-shadow: 0 0 20px rgba(255,255,255,0.5), 0 0 40px rgba(138,43,226,0.5);
    line-height: 1;
}
.session-info {
    flex: 1;                       /* equal weight right column */
    font-size: 0.8rem;
    display: flex;
    align-items: center;
    justify-content: flex-end;     /* push status to the right */
    gap: 0.5rem;
    color: rgba(255,255,255,0.9);
}
#status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #69db7c;
    display: inline-block;
    flex-shrink: 0;
    transition: background 0.3s;
}
#status-dot.err     { background: #ff6b6b; }
#status-dot.loading { background: #74c0fc; animation: pulse-dot 1s ease-in-out infinite; }
@keyframes pulse-dot { 0%,100%{opacity:0.4}50%{opacity:1} }

/* ════════════════════════════════════════════════════════════════════
   CONTENT AREA  — bright white, Activity page .response style
   ════════════════════════════════════════════════════════════════════ */
.content-area {
    flex: 1;
    overflow-y: auto;
    padding: 0.98rem 1rem 2.5rem;
    background: rgba(255, 255, 255, 0.95);   /* Activity page .response */
    backdrop-filter: blur(10px);
    border-top: 1px solid rgba(138, 43, 226, 0.3);
    position: relative;
    z-index: 5;
}
.content-inner {
    max-width: 1100px;
    margin: 0 auto;
}

/* ════════════════════════════════════════════════════════════════════
   SECTION LABEL  (dark, on white bg)
   ════════════════════════════════════════════════════════════════════ */
.sec-label {
    font-size: 0.65rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #aaa;
    margin-bottom: 0.39rem;
    text-align: center;
}

/* ════════════════════════════════════════════════════════════════════
   OVERVIEW KPI CARDS
   Reference: Activity page .summary-card (white bg, coloured left border)
   Size: original 230px wide → 195px (−15%), height −35% via padding/font scale
   ════════════════════════════════════════════════════════════════════ */
.kpi-grid {
    display: flex;
    justify-content: center;
    gap: 0.65rem;
    margin-bottom: 0.88rem;
}
.kpi-card {
    background: white;
    border-radius: 10px;
    padding: 0.49rem 0.85rem 0.45rem;   /* height −25% from previous */
    width: 224px;                        /* width +15% from 195px */
    flex-shrink: 0;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    border-left: 4px solid #0078d7;     /* Activity summary-card style */
    transition: transform 0.18s, box-shadow 0.18s;
    position: relative;
}
.kpi-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(0,0,0,0.10);
}
/* Activity page accent colours per card */
.kpi-card.pipeline { border-left-color: #0078d7; }
.kpi-card.leads    { border-left-color: #fd7e14; }
.kpi-card.orders   { border-left-color: #28a745; }
.kpi-card.alerts   { border-left-color: #dc3545; }

.kpi-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 0.26rem;
}
.kpi-lbl {
    font-size: 0.55rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: #888;
}
.kpi-icon {
    width: 17px; height: 17px;
    border-radius: 5px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
}
/* KPI value — Activity summary-card accent colour */
.kpi-val {
    font-size: 1.09rem;               /* height −25% from 1.45rem */
    font-weight: 700;
    line-height: 1;
    margin-bottom: 3px;
    display: flex;
    align-items: baseline;
    gap: 3px;
}
.kpi-val .currency { font-size: 0.62rem; font-weight: 400; opacity: 0.7; }
.kpi-card.pipeline .kpi-val { color: #0078d7; }
.kpi-card.leads    .kpi-val { color: #fd7e14; }
.kpi-card.orders   .kpi-val { color: #28a745; }
.kpi-card.alerts   .kpi-val { color: #dc3545; }

.kpi-sub {
    font-size: 0.57rem;
    color: #888;
    margin-bottom: 0.34rem;
    min-height: 12px;
}
.kpi-divider {
    border: none;
    border-top: 1px solid #f0f0f0;
    margin-bottom: 0.4rem;
}
.kpi-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 5px;
    flex-wrap: wrap;
    min-height: 14px;
}
.kpi-detail { font-size: 0.57rem; color: #aaa; font-family: monospace; }

/* Delta badge */
.delta {
    font-size: 0.57rem;
    font-weight: 700;
    padding: 1px 6px;
    border-radius: 100px;
    white-space: nowrap;
}
.delta.up { background: #f0fff4; color: #28a745; border: 1px solid rgba(40,167,69,0.25); }
.delta.dn { background: #fff5f5; color: #dc3545; border: 1px solid rgba(220,53,69,0.25); }
.delta.fl { background: #f8f9fa; color: #aaa;    border: 1px solid #e9ecef; }

/* Pills */
.pills { display: flex; flex-wrap: wrap; gap: 3px; }
.pill {
    font-size: 0.55rem;
    padding: 1px 6px;
    border-radius: 100px;
    border: 1px solid #e0e6ed;
    color: #666;
    background: #f8f9fa;
    white-space: nowrap;
}

/* Sparkline */
.spark-wrap {
    display: flex;
    align-items: flex-end;
    gap: 2px;
    height: 17px;
    margin: 0.26rem 0 0.22rem;
}
.spark-bar {
    flex: 1;
    border-radius: 2px 2px 0 0;
    background: rgba(220,53,69,0.45);
    min-height: 2px;
    transition: opacity 0.15s;
}
.spark-bar:hover { opacity: 1 !important; }
.spark-bar.today { background: #dc3545; opacity: 1 !important; }

/* ════════════════════════════════════════════════════════════════════
   SKELETON SHIMMER
   ════════════════════════════════════════════════════════════════════ */
@keyframes shimmer { 0%{opacity:.3}50%{opacity:.7}100%{opacity:.3} }
.sk { background: #e9ecef; border-radius: 4px; animation: shimmer 1.4s ease-in-out infinite; display: inline-block; }
.sk-v { width: 58px; height: 18px; }
.sk-s { width: 100px; height: 7px; margin-top: 3px; display: block; }
.sk-f { width: 72px; height: 7px; }

/* ════════════════════════════════════════════════════════════════════
   ZONE DIVIDER
   ════════════════════════════════════════════════════════════════════ */
.zone-divider {
    border: none;
    border-top: 1px solid #f0f0f0;
    margin: 0.63rem auto;
    max-width: 1000px;
}

/* ════════════════════════════════════════════════════════════════════
   MODULE CARDS (10)
   Default: white background with border
   Hover: green gradient (Activity primary-btn style)
   Icon: top-right | Title: same line as icon, left-aligned
   Size: height −25%, width −10% (via grid justify-items + width:90%)
   ════════════════════════════════════════════════════════════════════ */
.modules-grid {
    display: grid;
    grid-template-columns: repeat(5, minmax(0,1fr));
    gap: 0.65rem;
    justify-items: center;          /* centres each card in its column */
    margin-bottom: 1.75rem;
}
.mcard {
    background: white;
    border: 1px solid #e0e6ed;
    border-radius: 10px;
    padding: 0.75rem 0.8rem 0.7rem;  /* −25% from 1rem top/bottom */
    width: 90%;                      /* −10% width reduction */
    cursor: pointer;
    display: block;
    transition: background 0.2s, border-color 0.2s, transform 0.15s, box-shadow 0.2s, color 0.2s;
    box-shadow: 0 2px 6px rgba(0,0,0,0.05);
    /* Layout: icon top-right, title same line */
}
.mcard:hover, .mcard:focus {
    background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
    border-color: transparent;
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(40,167,69,0.4), 0 0 20px rgba(32,201,151,0.25);
    outline: none;
}
.mcard:active { transform: translateY(0); }

/* Card top row: title left, icon right — same horizontal line */
.mcard-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 0.35rem;
}
.mname {
    font-size: 0.78rem;
    font-weight: 700;
    color: #1a1a18;
    line-height: 1.2;
    transition: color 0.2s;
}
.mcard:hover .mname,
.mcard:focus .mname { color: white; }

.micon {
    width: 28px; height: 28px;    /* slightly smaller, proportional to reduced height */
    border-radius: 7px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: background 0.2s;
}
/* On hover, icon bg becomes semi-transparent white */
.mcard:hover .micon,
.mcard:focus .micon { background: rgba(255,255,255,0.22) !important; }

.mdesc {
    font-size: 0.68rem;
    color: #888;
    line-height: 1.3;
    margin-bottom: 0.4rem;
    transition: color 0.2s;
}
.mcard:hover .mdesc,
.mcard:focus .mdesc { color: rgba(255,255,255,0.82); }

.mendp {
    font-family: monospace;
    font-size: 0.62rem;
    color: #bbb;
    transition: color 0.2s;
}
.mcard:hover .mendp,
.mcard:focus .mendp { color: rgba(255,255,255,0.65); }

/* SVG icon stroke colour transitions */
.mcard:hover .micon svg,
.mcard:focus .micon svg { stroke: white !important; }

/* ════════════════════════════════════════════════════════════════════
   FOOTER
   ════════════════════════════════════════════════════════════════════ */
.footer-row {
    border-top: 1px solid #f0f0f0;
    padding-top: 0.9rem;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 10px;
}
.footer-left {
    display: flex;
    flex-direction: column;
    gap: 2px;
}
.ftext       { font-size: 0.65rem; color: #ccc; }
.ftext-sys   { font-size: 0.65rem; color: #bbb; }
.tags  { display: flex; flex-wrap: wrap; gap: 4px; }
.tag   {
    font-size: 0.62rem;
    padding: 2px 8px;
    border-radius: 100px;
    border: 1px solid #e9ecef;
    color: #ccc;
    background: #fafafa;
}

/* ════════════════════════════════════════════════════════════════════
   RESPONSIVE
   ════════════════════════════════════════════════════════════════════ */
@media(max-width:1000px){ .modules-grid{grid-template-columns:repeat(4,minmax(0,1fr))} }
@media(max-width:760px) { .modules-grid{grid-template-columns:repeat(3,minmax(0,1fr))} .kpi-card{width:190px} .kpi-val{font-size:1rem} }
@media(max-width:580px) { .modules-grid{grid-template-columns:repeat(2,minmax(0,1fr))} .kpi-grid{gap:0.5rem} .kpi-card{width:calc(50% - 0.25rem)} }
@media(max-width:380px) { .modules-grid{grid-template-columns:1fr} .kpi-card{width:100%} }
</style>
</head>

const BASE = 'https://orbitcrm-production.up.railway.app';

/* Module definitions — icon colour matches white-bg card icon bg */
const MODS = [
  {k:'accounts',   n:'Accounts',      d:'Companies & financials',    e:'/account-chat',       f:'account-chat.html',       i:'M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z M9 22V12h6v10',                                                                                           ib:'#e8f4fd', ic:'#0078d7'},

function svgi(path, color, sz=13) {
  return `<svg width="${sz}" height="${sz}" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${
    path.split(' M').map((p,i)=>`<path d="${i?'M'+p:p}"/>`).join('')
  }</svg>`;
}
function fmt(n)  { return (+n||0).toLocaleString(undefined,{maximumFractionDigits:0}); }
function fmtK(n) { const v=+n||0; return v>=1e6?'$'+(v/1e6).toFixed(1)+'M':v>=1e3?'$'+(v/1e3).toFixed(0)+'K':'$'+fmt(v); }
function el(id)  { return document.getElementById(id); }

/* ── Initialise ─────────────────────────────────────────────── */
(function init(){
  const h = new Date().getHours();
  el('greeting').textContent = h<12?'Good morning ☀️':h<17?'Good afternoon 🌤️':'Good evening 🌙';
  el('datestamp').textContent = new Date().toLocaleDateString(undefined,
    {weekday:'short',month:'short',day:'numeric'});

  /* Module grid — icon top-right, title same row */
  const grid = el('mgrid');
  MODS.forEach(m=>{
    const a = document.createElement('a');
    a.className = 'mcard';
    a.href = `./${m.f}`;            /* open local HTML file in same directory */
    a.target = '_blank';
    a.tabIndex = 0;
    a.innerHTML =
      `<div class="mcard-top">` +
        `<span class="mname">${m.n}</span>` +
        `<div class="micon" style="background:${m.ib}">${svgi(m.i, m.ic)}</div>` +
      `</div>` +
      `<div class="mdesc">${m.d}</div>` +
      `<div class="mendp">${m.e}</div>`;
    grid.appendChild(a);
  });

  /* Agent tags */
  const tags = el('atags');
  ['accounts','contacts','products','orders','activities',
   'opportunities','accounting','leads','analytics','notifications'].forEach(n=>{
    const t=document.createElement('span'); t.className='tag'; t.textContent=n; tags.appendChild(t);
  });
})();

/* ── Populate KPI cards ─────────────────────────────────────── */
function fillCards(data) {
  const P = data.active_pipeline || {};
  const L = data.open_leads      || {};
  const O = data.pending_orders  || {};
  const A = data.unread_alerts   || {};

  /* Card 1 */
  el('kv1').innerHTML = `<span class="currency">$</span>${fmt(P.total_amount||0)}`;
  el('ks1').textContent = `${fmt(P.count||0)} open opportunit${P.count===1?'y':'ies'}`;
  el('kd1').textContent = `Weighted: ${fmtK(P.weighted_amount||0)}`;

  /* Card 2 */
  el('kv2').textContent = fmt(L.count||0);
  el('ks2').textContent = `lead${L.count===1?'':'s'} awaiting qualification`;
  el('kd2').innerHTML = (L.by_status||[])
    .map(s=>`<span class="pill">${s.status} <strong>${s.count}</strong></span>`).join('')
    || '<span style="font-size:.62rem;color:#ccc">—</span>';

  /* Card 3 */
  el('kv3').textContent = fmt(O.count||0);
  el('ks3').textContent = `order${O.count===1?'':'s'} processing & ready`;
  el('kd3').innerHTML = (O.by_status||[])
    .map(s=>`<span class="pill">${s.status} <strong>${s.count}</strong></span>`).join('')
    || '<span style="font-size:.62rem;color:#ccc">—</span>';

  /* Card 4 — alerts with sparkline */
  const cnt30    = A.count_30d       || 0;
  const cntToday = A.count_today     || 0;
  const cntYest  = A.count_yesterday || 0;
  const delta    = A.delta_today     || 0;
  const byDay    = A.by_day          || [];

  el('kv4').textContent = fmt(cnt30);
  el('ks4').textContent = `unread — last 30 days`;

  const spark = el('spark4');
  spark.innerHTML = '';
  if (byDay.length) {
    const maxV = Math.max(...byDay.map(d=>d.count||0), 1);
    const todayStr = new Date().toISOString().slice(0,10);
    byDay.forEach(d=>{
      const pct = Math.max(((d.count||0)/maxV)*100, 4);
      const bar = document.createElement('div');
      bar.className = 'spark-bar'+(d.day===todayStr?' today':'');
      bar.style.height = pct+'%';
      bar.style.opacity = d.day===todayStr ? '1' : '0.5';
      bar.title = `${d.day}: ${d.count} unread`;
      spark.appendChild(bar);
    });
  } else {
    spark.style.display = 'none';
  }

  el('kd4').innerHTML =
    `<span style="font-size:.62rem;color:#888">Today: <strong style="color:#555">${fmt(cntToday)}</strong> · Yesterday: <strong style="color:#555">${fmt(cntYest)}</strong></span>`;

  el('kpi-delta').innerHTML = delta>0
    ? `<span class="delta up">+${delta}</span>`
    : delta<0
      ? `<span class="delta dn">${delta}</span>`
      : `<span class="delta fl">—</span>`;
}

function showOffline(msg) {
  ['kv1','kv2','kv3','kv4'].forEach(id=>{ el(id).textContent='—'; });
  ['ks1','ks2','ks3','ks4'].forEach(id=>{ el(id).textContent=msg||'server not connected'; });
  ['kd1','kd2','kd3','kd4'].forEach(id=>{ el(id).textContent=''; });
  el('kpi-delta').innerHTML='';
  el('spark4').innerHTML='';
}

/* ── Page load: call sp_home_index via /home-index ─────────── */
async function loadHomeIndex() {
  const dot  = el('status-dot');
  const stxt = el('status-txt');

  dot.className = 'loading';
  stxt.textContent = 'Calling sp_home_index…';

  try {
    const ctrl  = new AbortController();
    const timer = setTimeout(()=>ctrl.abort(), 8000);
    const res   = await fetch(`${BASE}/home-index`, {signal: ctrl.signal});
    clearTimeout(timer);

    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    if (!data.success) throw new Error(data.detail||'SP returned error');

    fillCards(data);

    dot.className = '';
    dot.style.background = '#28a745';
    stxt.textContent = '10 agents active';

    const meta  = data.metadata || {};
    const genAt = meta.generated_at
      ? new Date(meta.generated_at).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})
      : new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});

    el('sysinfo').textContent = `10 modules online · 1 server · port 8000 · data as of ${genAt}`;
    el('fstamp').textContent  = `CRM Agent · FastAPI + LangGraph · sp_home_index · refreshed ${genAt}`;

  } catch(err) {
    dot.className = 'err';
    stxt.textContent = err.name==='AbortError' ? 'Timeout — server unreachable' : 'Offline — run: python main.py';
    el('sysinfo').textContent = '10 modules ready · start the CRM Agent server on port 8000';
    showOffline('start the CRM Agent server to load live data');
  }
}

document.addEventListener('DOMContentLoaded', loadHomeIndex);
</script>
