    <style>
        /* === Galaxy Background === */
        .galaxy-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
            background: radial-gradient(ellipse at center, #1a0933 0%, #0a0118 100%);
        }

        .galaxy-background::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background:
                radial-gradient(ellipse at 30% 40%, rgba(255, 20, 147, 0.4) 0%, transparent 40%),
                radial-gradient(ellipse at 70% 60%, rgba(0, 191, 255, 0.4) 0%, transparent 40%),
                radial-gradient(ellipse at 50% 50%, rgba(138, 43, 226, 0.3) 0%, transparent 50%);
            animation: galaxy-rotate 120s linear infinite;
        }

        .galaxy-background::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                radial-gradient(2px 2px at 20% 30%, white, transparent),
                radial-gradient(2px 2px at 60% 70%, white, transparent),
                radial-gradient(1px 1px at 50% 50%, white, transparent),
                radial-gradient(1px 1px at 80% 10%, white, transparent),
                radial-gradient(2px 2px at 90% 60%, white, transparent),
                radial-gradient(1px 1px at 33% 50%, white, transparent),
                radial-gradient(1px 1px at 66% 33%, white, transparent);
            background-size: 200% 200%, 200% 200%, 300% 300%, 250% 250%, 200% 200%, 280% 280%, 220% 220%;
            background-position: 0% 0%, 100% 100%, 50% 50%, 80% 20%, 10% 90%, 40% 60%, 70% 30%;
            animation: stars-twinkle 8s ease-in-out infinite;
        }

        .nebula-cloud {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.6;
            animation: nebula-float 20s ease-in-out infinite;
        }

        .nebula-cloud:nth-child(1) {
            top: 10%;
            left: 20%;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(255, 20, 147, 0.6) 0%, transparent 70%);
            animation-delay: 0s;
        }

        .nebula-cloud:nth-child(2) {
            top: 50%;
            right: 15%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(0, 191, 255, 0.5) 0%, transparent 70%);
            animation-delay: -7s;
        }

        .nebula-cloud:nth-child(3) {
            bottom: 15%;
            left: 35%;
            width: 450px;
            height: 450px;
            background: radial-gradient(circle, rgba(138, 43, 226, 0.5) 0%, transparent 70%);
            animation-delay: -14s;
        }

        @keyframes galaxy-rotate {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        @keyframes stars-twinkle {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }
        }

        @keyframes nebula-float {

            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }

            33% {
                transform: translate(30px, -30px) scale(1.1);
            }

            66% {
                transform: translate(-20px, 20px) scale(0.9);
            }
        }

            margin: 0;

            display: flex;
            flex-direction: column;

            font-size: 0.7rem;

        /* === Input Bar === */
        .input-bar {
            display: flex;

            padding: 0.2rem 1rem;
            background: linear-gradient(180deg, rgba(200, 150, 255, 0.25) 0%, rgba(150, 220, 255, 0.25) 100%);

            border-top: 1px solid rgba(200, 150, 255, 0.4);
            position: relative;

        .input-bar form {
            display: flex;
            flex-direction: row;
            align-items: center;
            position: relative;
            width: 100%;

        .search-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            width: 1.5rem;
            height: 1.5rem;
            color: #666;
            pointer-events: none;
            z-index: 2;
            transition: color 0.3s ease;
        }

        .search-icon svg {
            width: 100%;
            height: 100%;
            display: block;
        }

        .input-wrapper {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
        }

        textarea {
            flex: 1;
            width: 100%;
            padding: 0.5rem 3rem 0.5rem 3.5rem;
            border: 1px solid rgba(200, 150, 255, 0.4);
            border-radius: 24px;

            transition: all 0.3s ease;
            height: 1.5rem;
        }

        textarea:hover {
            height: 2.5rem;
            box-shadow: 0 2px 8px rgba(138, 43, 226, 0.3);
        }

        textarea:focus {
            height: 2.5rem;
            outline: none;
            box-shadow: 0 2px 12px rgba(138, 43, 226, 0.5);
            border-color: rgba(138, 43, 226, 0.6);
        }

        button.send {
            display: none;
        }

        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255, 255, 255, .3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Voice Input Button */
        .voice-btn-google {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: none;
            background: #f1f3f4;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            color: #5f6368;
        }

        .voice-btn-google:hover {
            background: #e8eaed;
            color: #202124;
        }

        .voice-btn-google.listening {
            background: #d93025;
            color: white;
            animation: pulse-mic 1.5s ease-in-out infinite;
        }

        @keyframes pulse-mic {

            0%,
            100% {
                transform: translateY(-50%) scale(1);
                box-shadow: 0 0 0 0 rgba(217, 48, 37, 0.4);
            }

            50% {
                transform: translateY(-50%) scale(1.05);
                box-shadow: 0 0 0 10px rgba(217, 48, 37, 0);
            }
        }

        .voice-status {
            position: absolute;
            bottom: calc(100% + 8px);
            right: 8px;
            background: #d93025;
            color: white;
            padding: 6px 12px;
            border-radius: 16px;
            font-size: 0.85rem;
            font-weight: 500;
            display: none;
            animation: fadeInDown 0.3s ease-out;
            box-shadow: 0 2px 8px rgba(217, 48, 37, 0.3);
        }

        .voice-status.active {
            display: block;
        }

        /* === Quick Actions Button Styling === */
        .unified-action-btn {
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);

            border: none;
            padding: 0.45rem 1rem;

        .action-buttons {

            margin-top: 0.75rem;

        /* Record styling */
        .audit-record {
            border: 2px solid #0078d7;

<body>

    <div class="input-bar">
        <form id="chatForm" onsubmit="return sendMessage(event);">
            <span class="search-icon">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

                        <path
                            d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z" />

    <script>
        // === API Configuration ===
        const API_ENDPOINT = 'https://orbitcrm-production.up.railway.app/contact-chat';

        // === Sample Contacts for Quick Actions ===
        const SAMPLE_CONTACTS = {
            bobSmith: {
                id: "8408c71a-2c75-4668-8088-90875aacc673",
                firstName: "Bob",
                lastName: "Smith",
                email: "bob.smith@example.com",
                phone: "+12124348620",
                role: "Decision Maker",
                accountName: "c0b2f509-cebc-4fc9-840f-46e427386872"
            },
            charlieNguyen: {
                id: "f803a797-b5b7-4938-96a7-4ec84d4b0c9b",
                firstName: "Charlie",
                lastName: "Nguyen",
                email: "charlie.nguyen@example.com",
                phone: "+11119676122",
                role: "Technical Contact",
                accountName: "9b782ba5-cdd2-4cc6-8c88-98604ee5d57e"
            },
            ethanWong: {
                id: "a5a419cd-d9fc-4e0d-a67c-0e3d647a5c9b",
                firstName: "Ethan",
                lastName: "Wong",
                email: "ethan.wong@example.com",
                phone: "+16041226848",
                role: "Purchasing",
                accountName: "ab55fda8-d835-4173-bf3e-ed8e23085102"
            }
        };

        // === Role options ===
        const ROLES = ['CEO', 'CTO', 'CFO', 'VP Sales', 'VP Marketing', 'Sales Manager', 'IT Director', 'Developer', 'Consultant', 'Other'];

        // === Session Management ===
        let sessionId = localStorage.getItem('contactSessionId') || generateSessionId();
        localStorage.setItem('contactSessionId', sessionId);
        document.getElementById('sessionId').textContent = sessionId.substring(0, 8) + '...';

        // === State Management ===
        let lastListHTML = '';
        let lastDuplicateReportHTML = '';
        let cameFromList = false;
        let cameFromDuplicateReport = false;
        let currentEditingContact = null; // v4.1: Track current contact for 360° view and update form

        function generateSessionId() {
            return 'sess_' + Math.random().toString(36).substring(2, 15) + Math.random().toString(36).substring(2, 15);
        }

        function hideQuickUI() {
            const quickUI = document.getElementById('quick-ui');
            if (quickUI) quickUI.style.display = 'none';
        }

        function showQuickUI() {
            const quickUI = document.getElementById('quick-ui');
            if (quickUI) quickUI.style.display = 'block';
        }

        function resetSession() {
            sessionId = generateSessionId();
            localStorage.setItem('contactSessionId', sessionId);
            document.getElementById('sessionId').textContent = sessionId.substring(0, 8) + '...';
            location.reload();
        }

        function sendRequest(text) {
            const messageBox = document.getElementById('message');
            messageBox.value = text;
            document.getElementById('chatForm').dispatchEvent(new Event('submit'));
        }

        // ── callContactSP ──────────────────────────────────────────────────────────
        // Sends a structured SP call directly to the pre-router, bypassing AI Agent.
        // msgPrefix must match a direct-route trigger in contact_pre_router_v3.js
        // e.g. 'list contacts:', 'get contact:', 'create contact:', etc.
        async function callContactSP(msgPrefix, extraParams = {}) {
            hideQuickUI();
            const responseArea = document.getElementById('responseArea');
            responseArea.innerHTML = `<div style="padding:1rem;color:#666;text-align:center;">
            <div class="loading" style="margin:0 auto;"></div>
            <p style="margin-top:0.5rem;">Processing: "${msgPrefix.trim()}"</p>
        </div>`;

            try {
                const res = await fetch(API_ENDPOINT, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        sessionId,
                        chatInput: { message: msgPrefix, ...extraParams }
                    })
                });

                let data;
                try { data = await res.json(); } catch { data = await res.text(); }

                let responseHTML = '';
                if (Array.isArray(data) && data.length > 0 && data[0].output) {
                    responseHTML = buildResponseHTML(data[0].output, data[0]);
                } else if (typeof data === 'string') {
                    responseHTML = buildResponseHTML(data);
                } else if (data.output) {
                    responseHTML = buildResponseHTML(data.output, data);
                } else if (data.message) {
                    responseHTML = buildResponseHTML(data.message, data);
                } else {
                    responseHTML = `<div class="audit-record"><pre>${JSON.stringify(data, null, 2)}</pre></div>`;
                }
                responseArea.innerHTML = `<div class="fade-in">${responseHTML}</div>`;
            } catch (err) {
                responseArea.innerHTML = `<div style="padding:0.75rem;background:#fff3f3;border:1px solid #dc3545;border-radius:6px;color:#dc3545;">
                ❌ Error: ${err.message}</div>`;
            }
        }

        // === Actions Namespace ===
        const actions = {
            // Direct SP calls — no AI Agent
            listContacts() { callContactSP('list contacts:', { pageSize: 50, pageNumber: 1 }); },
            showDetails() { callContactSP('get contact:', { contactId: SAMPLE_CONTACTS.bobSmith.id }); },
            showActivities() { callContactSP('contact activities:', { contactId: SAMPLE_CONTACTS.bobSmith.id }); },
            findDuplicates() { callContactSP('contact duplicates:', {}); },
            showStats() { callContactSP('contact summary:', {}); },
            sendVerification() { callContactSP('send verification:', { email: SAMPLE_CONTACTS.bobSmith.email }); },
            // Form-based — open form UI
            createContact() { showCreateContactForm(); },
            updateContact() { showUpdateContactForm(SAMPLE_CONTACTS.ethanWong); },
        };

        // === Attach Quick Action Button Handlers ===
        function attachQuickActionHandlers() {
            document.querySelectorAll("[data-action]").forEach(btn => {
                btn.addEventListener("click", () => {
                    const fnName = btn.dataset.action;
                    if (fnName && actions[fnName]) actions[fnName]();
                });
            });
        }
        attachQuickActionHandlers();

        // === Keyboard Shortcuts ===
        document.addEventListener("keydown", function (e) {
            const isCtrl = e.ctrlKey || e.metaKey;
            if (isCtrl) {
                switch (e.key.toLowerCase()) {
                    case "l": e.preventDefault(); actions.listContacts(); break;
                    case "d": e.preventDefault(); actions.showDetails(); break;
                    case "r": e.preventDefault(); actions.findDuplicates(); break;
                }
            }
        });

        // === Message Handling ===
        function handleKeyDown(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage(event);
            }
        }

        async function sendMessage(event) {
            if (event) event.preventDefault();

            const input = document.getElementById('message');
            const sendBtn = document.getElementById('sendBtn');
            const message = input.value.trim();

            if (!message) return false;

            hideQuickUI();

            const responseArea = document.getElementById('responseArea');

            // Don't clear input immediately - keep it visible so user can see what was sent
            // input.value = ''; // Moved to after response is displayed
            sendBtn.disabled = true;
            sendBtn.innerHTML = '<span class="spinner"></span>';

            responseArea.innerHTML = `<div style="padding: 1rem; color: #666; text-align: center;">
            <div class="loading" style="margin: 0 auto;"></div>
            <p style="margin-top: 0.5rem;">Processing: "${message.substring(0, 50)}${message.length > 50 ? '...' : ''}"</p>
        </div>`;

            try {
                const res = await fetch(API_ENDPOINT, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chatInput: { message },
                        sessionId
                    })
                });

                let data;
                try {
                    data = await res.json();
                } catch {
                    data = await res.text();
                }

                let responseHTML = '';

                if (Array.isArray(data) && data.length > 0 && data[0].output) {
                    responseHTML = buildResponseHTML(data[0].output, data[0]);
                } else if (typeof data === 'string') {
                    responseHTML = buildResponseHTML(data);
                } else if (data.output) {
                    responseHTML = buildResponseHTML(data.output, data);
                } else if (data.message) {
                    responseHTML = buildResponseHTML(data.message, data);
                } else {
                    responseHTML = `<div class="audit-record"><pre>${JSON.stringify(data, null, 2)}</pre></div>`;
                }

                responseArea.innerHTML = `<div class="fade-in">${responseHTML}</div>`;

                // Clear input after response is displayed
                input.value = '';

            } catch (err) {
                responseArea.innerHTML = `
                <div style="padding: 0.75rem; background: #fff3f3; border: 1px solid #dc3545; border-radius: 6px; color: #dc3545;">
                    ❌ Error connecting to server: ${err.message}
                </div>
            `;
                // Clear input even on error
                input.value = '';
            } finally {
                sendBtn.disabled = false;
                sendBtn.innerHTML = 'Send';
            }

            return false;
        }

        // === Strip mode markers ===
        function stripMarkers(text) {
            return text.split('\n')
                .filter(line => !line.trim().match(/^\[MODE:\w+\]/i))
                .filter(line => !line.trim().match(/^\[LIST\]/i))
                .filter(line => !line.trim().match(/^\[360°\]/i))
                .filter(line => !line.trim().match(/^\[BAR_CHART\]/i))
                .filter(line => !line.trim().match(/^\[CALENDAR\]/i))
                .filter(line => !line.trim().match(/^\*\*LIST CONTACTS\*\*/i))
                .filter(line => !line.trim().match(/^\*\*CONTACT LIST\*\*/i))
                .filter(line => !line.trim().match(/^\*\*CONTACT STATISTICS\*\*/i))
                .join('\n');
        }

        // === Response Building ===
        function buildResponseHTML(text, data) {
            if (!text) return '<div class="audit-record">No response received</div>';

            // v6.3 FIX: Check error flag BEFORE routing by mode.
            // Format Response sets data.error = true for SP error codes.
            // Without this guard, mode='update' with error=true would render
            // the success 360° view and swallow the error message entirely.
            if (data?.error === true) {
                return buildErrorHTML(text, data);
            }

            const mode = data?.mode || data?.reportMode || extractModeFromText(text);

            console.log('Mode detected:', mode);

            switch (mode) {
                case 'list':
                    return buildListModeHTML(text, data);
                case 'get_details':
                case 'detail':
                    return buildDetailModeHTML(text, data);
                case 'create':
                case 'create_confirmation':
                    return buildCreateConfirmationHTML(text, data);
                case 'update':
                case 'update_confirmation':
                    return buildUpdateConfirmationHTML(text, data);
                case 'send_verification':
                case 'verification_sent':
                    return buildVerificationSentHTML(text, data);
                case 'verify_email':
                case 'verification_confirmed':
                    return buildVerificationConfirmedHTML(text, data);
                case 'duplicates':
                    return buildDuplicatesModeHTML(text, data);
                case 'merge':
                case 'merge_confirmation':
                    return buildMergeConfirmationHTML(text, data);
                case 'archive':
                case 'archive_confirmation':
                    return buildArchiveConfirmationHTML(text, data);
                case 'restore':
                case 'restore_confirmation':
                    return buildRestoreConfirmationHTML(text, data);
                case 'activities':
                    return buildActivitiesModeHTML(text, data);
                case 'summary':
                    return buildSummaryModeHTML(text, data);
                default:
                    return buildFallbackHTML(text, data);
            }
        }

        function extractModeFromText(text) {
            const modeMatch = text.match(/\[MODE:(\w+)\]/);
            if (modeMatch) return modeMatch[1];

            if (text.includes('[LIST]') || text.includes('CONTACT LIST')) return 'list';
            if (text.includes('[360°]') || text.includes('CONTACT 360°')) return 'detail';
            if (text.includes('CREATED SUCCESSFULLY')) return 'create';
            if (text.includes('UPDATED SUCCESSFULLY')) return 'update';
            if (text.includes('VERIFICATION TOKEN')) return 'send_verification';
            if (text.includes('EMAIL VERIFIED')) return 'verify_email';
            if (text.includes('ACTIVITY TIMELINE')) return 'activities';
            if (text.includes('DUPLICATE') && text.includes('REPORT')) return 'duplicates';
            if (text.includes('MERGED SUCCESSFULLY')) return 'merge';
            if (text.includes('ARCHIVED SUCCESSFULLY')) return 'archive';
            if (text.includes('RESTORED SUCCESSFULLY')) return 'restore';
            if (text.includes('CONTACT STATISTICS') || text.includes('[BAR_CHART]')) return 'summary';

            return 'unknown';
        }

        function stripMarkers(text) {
            return text
                .replace(/\[MODE:\w+\]/g, '')
                .replace(/\[LIST\]/g, '')
                .replace(/\[360°\]/g, '')
                .replace(/\[SUCCESS\]/g, '')
                .replace(/\[EMAIL\]/g, '')
                .replace(/\[CHECK\]/g, '')
                .replace(/\[SEARCH\]/g, '')
                .replace(/\[MERGE\]/g, '')
                .replace(/\[ARCHIVE\]/g, '')
                .replace(/\[RESTORE\]/g, '')
                .replace(/\[CALENDAR\]/g, '')
                .replace(/\[SUMMARY\]/g, '')
                .replace(/\[BAR_CHART\]/g, '')
                .replace(/\[INFO\]/g, '')
                .replace(/\[ERROR\]/g, '')
                .trim();
        }

        // === ISSUE 1 FIX: LIST MODE - Full UUID display ===
        function buildListModeHTML(text, data) {
            let html = `<div class="audit-record">`;
            html += `<div style="margin-top: 0.5rem; text-align: left; max-width: 100%; margin-left: 1.75rem; margin-right: auto;">
                    <h3 style="color: #0078d7; font-weight: bold;">Contact List</h3>`;

            // Parse pagination
            const pageMatch = text.match(/\*\*Page:\*\*\s*(\d+)\s*of\s*(\d+)\s*\|\s*\*\*Total:\*\*\s*(\d+)/);
            if (pageMatch) {
                html += `<div style="margin: 0.5rem 0 1rem 0; color: #6c757d; font-size: 0.9rem;">
                Page ${pageMatch[1]} of ${pageMatch[2]} | ${pageMatch[3]} contacts
            </div>`;
            }

            // Check if showing deleted
            if (text.includes('Archived contacts only')) {

        // === Parse contacts from plain text ===
        function parseContactsFromText(text) {
            const contacts = [];
            const lines = text.split('\n');
            let currentContact = null;

            for (const line of lines) {
                // Match contact header: **1. First Last**
                const headerMatch = line.match(/\*\*(\d+)\.\s+([^*]+)\*\*/);
                if (headerMatch && !line.includes('Page:') && !line.includes('Total:')) {
                    if (currentContact && currentContact.firstName) {
                        contacts.push(currentContact);
                    }
                    const fullName = headerMatch[2].trim();
                    const nameParts = fullName.split(' ');
                    currentContact = {
                        firstName: nameParts[0] || '',
                        lastName: nameParts.slice(1).join(' ') || ''
                    };
                    continue;
                }

                if (currentContact) {
                    const trimmed = line.trim();

                    // Parse ID (FULL UUID - ISSUE 1 FIX)
                    const idMatch = trimmed.match(/ID:\s*([a-f0-9-]+)/i);
                    if (idMatch) currentContact.id = idMatch[1];

                    // Parse Email
                    const emailMatch = trimmed.match(/Email:\s*([^\s]+)/i);
                    if (emailMatch) currentContact.email = emailMatch[1];

                    // Parse Phone
                    const phoneMatch = trimmed.match(/Phone:\s*([^\s]+)/i);
                    if (phoneMatch) currentContact.phone = phoneMatch[1];

                    // Parse Role
                    const roleMatch = trimmed.match(/Role:\s*(.+)/i);
                    if (roleMatch) currentContact.role = roleMatch[1].trim();

                    // Parse Account
                    const accountMatch = trimmed.match(/Account:\s*(.+)/i);
                    if (accountMatch) currentContact.accountName = accountMatch[1].trim();

                    // Parse Status
                    const statusMatch = trimmed.match(/Status:\s*([^\s]+)/i);
                    if (statusMatch) currentContact.status = statusMatch[1].trim();

                    // Parse Created
                    const createdMatch = trimmed.match(/Created:\s*(.+)/i);
                    if (createdMatch) currentContact.created = createdMatch[1].trim();

                    // Parse Updated
                    const updatedMatch = trimmed.match(/Updated:\s*(.+)/i);
                    if (updatedMatch) currentContact.updated = updatedMatch[1].trim();

                    // Parse billing Address (added in Format Response v4x+)
                    const addrMatch = trimmed.match(/Address:\s*(.+)/i);
                    if (addrMatch) {
                        // Store raw address string; split on ", " for card display
                        const parts = addrMatch[1].trim().split(', ');
                        currentContact.billingStreet = parts[0] || '';
                        currentContact.billingCity = parts[1] || '';
                        currentContact.billingProvince = parts[2] || '';
                        currentContact.billingPostal = parts[3] || '';
                        currentContact.billingCountry = parts[4] || '';
                    }

                    // Check for archived
                    if (trimmed.includes('[ARCHIVED]')) {
                        currentContact.isDeleted = true;
                    }
                }
            }

            if (currentContact && currentContact.firstName) {
                contacts.push(currentContact);
            }

            return contacts;
        }

        // === Helper: Parse markdown table to get value by field name ===
        function parseMarkdownTableValue(text, fieldName) {
            // Match markdown table rows: | Field | Value |
            const regex = new RegExp(`\\|\\s*${fieldName}\\s*\\|\\s*([^|]+)\\s*\\|`, 'i');
            const match = text.match(regex);
            if (match) {
                let value = match[1].trim();
                // Remove markdown bold formatting
                value = value.replace(/\*\*/g, '');
                return value || 'N/A';
            }
            return 'N/A';
        }

        // === Helper: Parse markdown table section with multiple columns ===
        function parseMarkdownTableSection(text, sectionName) {
            // Find the section header and extract the table after it
            const sectionRegex = new RegExp(`###\\s*${sectionName}[\\s\\S]*?\\|([^|]+\\|)+[\\s\\S]*?(?=###|$)`, 'i');
            const sectionMatch = text.match(sectionRegex);
            if (!sectionMatch) return [];

            const sectionText = sectionMatch[0];
            const rows = [];
            const lines = sectionText.split('\n');
            let headers = [];
            let headerFound = false;

            for (const line of lines) {
                if (line.includes('|') && !line.match(/^\s*\|[\s-]+\|/)) {  // Skip separator lines
                    const cells = line.split('|').map(c => c.trim()).filter(c => c);
                    if (cells.length > 0) {
                        if (!headerFound) {
                            headers = cells.map(h => h.toLowerCase().replace(/\s+/g, '_'));
                            headerFound = true;
                        } else {
                            const row = {};
                            cells.forEach((cell, i) => {
                                if (headers[i]) {
                                    row[headers[i]] = cell;
                                }
                            });
                            if (Object.keys(row).length > 0) {
                                rows.push(row);
                            }
                        }
                    }
                }
            }
            return rows;
        }

        // === Helper: Parse address from markdown table section ===
        function parseAddressFromMarkdownSection(text, sectionName) {
            const sectionRegex = new RegExp(`###\\s*${sectionName}[\\s\\S]*?(?=###|$)`, 'i');
            const sectionMatch = text.match(sectionRegex);
            if (!sectionMatch) return null;

            const sectionText = sectionMatch[0];
            const street = parseMarkdownTableValue(sectionText, 'Street');
            const line2 = parseMarkdownTableValue(sectionText, 'Line2');
            const city = parseMarkdownTableValue(sectionText, 'City');
            const province = parseMarkdownTableValue(sectionText, 'Province');
            const postalCode = parseMarkdownTableValue(sectionText, 'Postal Code');
            const country = parseMarkdownTableValue(sectionText, 'Country');

            if (street === 'N/A' && city === 'N/A') return null;

            // Build address string
            let parts = [];
            if (street !== 'N/A') parts.push(street);
            if (line2 !== 'N/A') parts.push(line2);
            if (city !== 'N/A') parts.push(city);
            if (province !== 'N/A') parts.push(province);
            if (postalCode !== 'N/A') parts.push(postalCode);
            if (country !== 'N/A') parts.push(country);

            return parts.join(', ');
        }

        // === SUMMARY MODE (v4.5) — parses card-based output from Format Response v4x ===
        // SP v3e returns: Totals (metrics), Top Accounts (ranking), Role/Status/Owner (bar)
        // Format code outputs: ### SectionTitle followed by markdown pipe tables

        // ── renderSparkline ───────────────────────────────────────────────────
        // Converts Unicode block chars (▁▂▃▄▅▆▇█ U+2581-2588) to CSS mini-bars.
        // Font-independent — works over file:// and https:// equally.
        function renderSparkline(s) {
            if (!s) return '';
            const bars = Array.from(String(s)).map(c => {
                const code = c.charCodeAt(0);
                if (code >= 0x2581 && code <= 0x2588) {
                    const pct = Math.round(((code - 0x2580) / 8) * 100);
                    return `<span style="display:inline-block;width:5px;height:12px;vertical-align:bottom;margin:0 0.5px;position:relative;">` +
                           `<span style="display:block;width:100%;height:${pct}%;background:#5856d6;border-radius:1px 1px 0 0;position:absolute;bottom:0;"></span></span>`;
                }
                return escapeHTML(c);
            });
            return `<span style="display:inline-flex;align-items:flex-end;height:12px;gap:0;">${bars.join('')}</span>`;
        }

        function buildSummaryModeHTML(text, data) {

            // ---- Helpers ----
            function parseMarkdownTable(block) {
                const lines = block.split('\n').map(l => l.trim()).filter(l => l.startsWith('|'));
                if (lines.length < 3) return { headers: [], rows: [] };
                const splitRow = (line) => line.split('|').map(c => c.trim()).filter((_, i, a) => i > 0 && i < a.length - 1);
                const headers = splitRow(lines[0]);
                // lines[1] is the separator ---|---
                const rows = lines.slice(2).map(splitRow);
                return { headers, rows };
            }

            function colIdx(headers, ...candidates) {
                for (const c of candidates) {
                    const i = headers.findIndex(h => h === c || h.toLowerCase() === c.toLowerCase());
                    if (i >= 0) return i;
                }
                return -1;
            }

            function trendClass(val) {
                if (val === '↑') return 'trend-up';
                if (val === '↓') return 'trend-down';
                return 'trend-flat';
            }

            function changeClass(val) {
                const n = parseFloat(val);
                if (n > 0) return 'positive';
                if (n < 0) return 'negative';
                return '';
            }

            function severityBadge(val) {
                const cls = 'severity-' + (val || 'none').toLowerCase();
                return `<span class="severity-badge ${cls}">${escapeHTML(val || 'None')}</span>`;
            }

            function rankCell(val) {
                if (val === '1') return `<span class="rank-gold">${escapeHTML(val)}</span>`;
                if (val === '2') return `<span class="rank-silver">${escapeHTML(val)}</span>`;
                if (val === '3') return `<span class="rank-bronze">${escapeHTML(val)}</span>`;
                return escapeHTML(val);
            }

            // ---- Parse sections delimited by ### ----
            const sections = [];
            const sectRe = /###\s+(.+?)\n([\s\S]*?)(?=\n###\s|$)/g;
            let m;
            while ((m = sectRe.exec(cleanText)) !== null) {
                sections.push({ title: m[1].trim(), content: m[2] });
            }

            const cardIcons = {
                'Totals': '🔢',
                'Top Accounts by Contacts': '🏆',
                'Contacts by Role': '👥',
                'Contacts by Status': '📊',
                'Contacts by Owner': '👤'
            };

            // Display columns per card type (Forecast columns intentionally excluded for brevity)
            const RANKING_COLS = ['Rank', 'Account', 'Value', 'Prev', 'Δ%', 'Trend', 'Sparkline', 'Score', '% of Total'];
            const BAR_COLS = ['Category', 'Count', 'Prev', 'Δ%', 'Trend', 'Sparkline', 'Score', '% of Total', 'Severity'];

            let html = `<div class="summary-container">`;
            html += `<h2>📊 Contact Statistics</h2>`;

            if (sections.length === 0) {
                html += `<p style="color:#888;">No summary data available.</p>`;
                html += `</div>`;
                return html;
            }

            sections.forEach(sect => {
                const { title, content } = sect;
                const icon = cardIcons[title] || '📋';
                const { headers, rows } = parseMarkdownTable(content);
                if (!rows.length) return;

                const isTotals = title === 'Totals';
                const isRanking = title.includes('Account');

                // ====== TOTALS → gradient hero with metric cards ======
                if (isTotals) {
                    html += `<section class="summary-totals">`;
                    html += `<h3>${icon} ${escapeHTML(title)}</h3>`;
                    html += `<div class="metric-cards-grid">`;

                    const iMetric = colIdx(headers, 'Metric', 'label');
                    const iValue = colIdx(headers, 'Value');
                    const iPrev = colIdx(headers, 'Prev');
                    const iChange = colIdx(headers, 'Δ%', 'change_pct');
                    const iTrend = colIdx(headers, 'Trend');
                    const iSpark = colIdx(headers, 'Sparkline');

                    rows.forEach(row => {
                        const label = iMetric >= 0 ? row[iMetric] : '';
                        const value = iValue >= 0 ? row[iValue] : '—';
                        const prev = iPrev >= 0 ? row[iPrev] : '';
                        const change = iChange >= 0 ? row[iChange] : '';
                        const trend = iTrend >= 0 ? row[iTrend] : '→';
                        const spark = iSpark >= 0 ? row[iSpark] : '';

                        const tc = trendClass(trend);
                        const cc = changeClass(change);
                        const chg = change && change !== '%' ? change : '';

                        html += `
                    <div class="metric-card">
                        <div class="metric-label">${escapeHTML(label)}</div>
                        <div class="metric-value">${escapeHTML(value)}</div>
                        <div class="metric-sparkline">${renderSparkline(spark)}</div>
                        <div class="metric-footer">
                            <span class="metric-trend ${tc}">${escapeHTML(trend)}</span>
                            ${chg ? `<span class="metric-change ${cc}">${escapeHTML(chg)}</span>` : ''}
                            ${prev ? `<span class="metric-prev">prev: ${escapeHTML(prev)}</span>` : ''}
                        </div>
                    </div>`;
                    });

                    html += `</div></section>`;

                    // ====== RANKING (Top Accounts) ======
                } else if (isRanking) {
                    html += `<section>`;
                    html += `<h3>${icon} ${escapeHTML(title)}</h3>`;
                    html += `<div class="summary-table-wrap"><table class="summary-table">`;
                    html += `<thead><tr>`;

                    const showCols = RANKING_COLS.filter(c => colIdx(headers, c) >= 0);
                    showCols.forEach(c => html += `<th>${escapeHTML(c)}</th>`);
                    html += `</tr></thead><tbody>`;

                    rows.forEach(row => {
                        html += `<tr>`;
                        showCols.forEach(col => {
                            const ci = colIdx(headers, col);
                            const val = ci >= 0 ? row[ci] : '';
                            let cell = '';
                            if (col === 'Rank') cell = rankCell(val);
                            else if (col === 'Trend') cell = `<span class="${trendClass(val)}">${escapeHTML(val)}</span>`;
                            else if (col === 'Δ%') cell = `<span class="${changeClass(val)}">${escapeHTML(val)}</span>`;
                            else if (col === 'Sparkline') cell = renderSparkline(val);
                            else cell = escapeHTML(val);
                            html += `<td>${cell}</td>`;
                        });
                        html += `</tr>`;
                    });

                    html += `</tbody></table></div></section>`;

                    // ====== BAR (Role / Status / Owner) ======
                } else {
                    html += `<section>`;
                    html += `<h3>${icon} ${escapeHTML(title)}</h3>`;
                    html += `<div class="summary-table-wrap"><table class="summary-table">`;
                    html += `<thead><tr>`;

                    const showCols = BAR_COLS.filter(c => colIdx(headers, c) >= 0);
                    showCols.forEach(c => html += `<th>${escapeHTML(c)}</th>`);
                    html += `</tr></thead><tbody>`;

                    rows.forEach(row => {
                        html += `<tr>`;
                        showCols.forEach(col => {
                            const ci = colIdx(headers, col);
                            const val = ci >= 0 ? row[ci] : '';
                            let cell = '';
                            if (col === 'Trend') cell = `<span class="${trendClass(val)}">${escapeHTML(val)}</span>`;
                            else if (col === 'Δ%') cell = `<span class="${changeClass(val)}">${escapeHTML(val)}</span>`;
                            else if (col === 'Sparkline') cell = renderSparkline(val);
                            else if (col === 'Severity') cell = severityBadge(val);
                            else if (col === 'Category') {
                                const label = val === '(unset)' ? '<em style="color:#aaa;">(unset)</em>' : escapeHTML(val);
                                cell = label;
                            }
                            else cell = escapeHTML(val);
                            html += `<td>${cell}</td>`;
                        });
                        html += `</tr>`;
                    });

                    html += `</tbody></table></div></section>`;
                }
            });

            html += `<div class="action-buttons" style="margin-top:1.5rem;padding-top:1rem;border-top:none;">
            <button class="unified-action-btn" onclick="goHome()">🏠 Back Home</button>
            <button class="unified-action-btn" onclick="sendRequest('Show all contacts')">📋 View Contacts</button>
            <button class="unified-action-btn" onclick="sendRequest('Show duplicate contacts report')">⚠️ Find Duplicates</button>
        </div>`;

            html += `</div>`;

        // === Helper Functions ===
        function escapeHTML(s) {

        // === Voice Input ===
        let recognition = null;
        let isListening = false;
        let voiceInputBaseline = '';
        let voiceFinalTranscript = '';

        function toggleVoiceInput() {
            if (isListening) {
                stopVoiceInput();
            } else {
                startVoiceInput();
            }
        }

        function startVoiceInput() {
            if (!recognition) {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

                if (!SpeechRecognition) {
                    alert('Speech recognition is not supported in your browser. Please use Chrome, Edge, or Safari.');
                    return;
                }

                recognition = new SpeechRecognition();
                recognition.continuous = true;
                recognition.interimResults = true;
                recognition.lang = 'en-US';

                recognition.onresult = (event) => {
                    let interimTranscript = '';
                    let newFinalTranscript = '';

                    for (let i = event.resultIndex; i < event.results.length; i++) {
                        const transcript = event.results[i][0].transcript;
                        if (event.results[i].isFinal) {
                            newFinalTranscript += transcript + ' ';
                        } else {
                            interimTranscript += transcript;
                        }
                    }

                    if (newFinalTranscript) {
                        voiceFinalTranscript += newFinalTranscript;
                    }

                    const input = document.getElementById('message');
                    input.value = voiceInputBaseline + voiceFinalTranscript + interimTranscript;
                };

                recognition.onerror = (event) => {
                    console.error('Speech recognition error:', event.error);
                    if (event.error === 'not-allowed' || event.error === 'permission-denied') {
                        alert('Microphone permission denied. Please allow microphone access.');
                    }
                    stopVoiceInput();
                };

                recognition.onend = () => {
                    if (isListening) {
                        try {
                            recognition.start();
                        } catch (e) {
                            stopVoiceInput();
                        }
                    }
                };
            }

            const input = document.getElementById('message');
            voiceInputBaseline = input.value;
            voiceFinalTranscript = '';

            try {
                recognition.start();
                isListening = true;

                document.getElementById('voiceBtn').classList.add('listening');
                document.getElementById('voiceStatus').classList.add('active');

                const handleStop = () => { if (isListening) stopVoiceInput(); };
                input.addEventListener('click', handleStop, { once: true });
                input.addEventListener('input', handleStop, { once: true });
                input.addEventListener('keydown', handleStop, { once: true });

            } catch (error) {
                console.error('Error starting voice input:', error);
            }
        }

        function stopVoiceInput() {
            if (recognition) {
                try { recognition.stop(); } catch (e) { }
            }

            isListening = false;
            document.getElementById('voiceBtn').classList.remove('listening');
            document.getElementById('voiceStatus').classList.remove('active');
            voiceInputBaseline = '';
            voiceFinalTranscript = '';
        }

        // ═══════════════════════════════════════════════════════════════════════
        //  CONTACT SEARCH ENGINE  (v5.0)
        //  Google-style typeahead — bypasses AI Agent entirely.
        //  Calls n8n → pre-router → sp_contacts MODE:list / MODE:get via JSON.
        // ═══════════════════════════════════════════════════════════════════════

        // ── Config ───────────────────────────────────────────────────────────────
        const SEARCH_DEBOUNCE_MS = 280;
        const SEARCH_MIN_CHARS = 2;
        const SEARCH_PAGE_SIZE = 12;
        const SEARCH_MAX_INPUT_LEN = 120;

        // ── State ─────────────────────────────────────────────────────────────────
        let _homeSearchTimer = null;
        let _formSearchTimer = null;
        let _homeSearchIdx = -1;
        let _formSearchIdx = -1;
        let _homeSearchContacts = [];

        // ── Core: call n8n directly (bypasses AI Agent) ───────────────────────────
        /**
         * Sends a JSON request to n8n with message = 'search contacts: <query>'
         * Pre-router intercepts → routes to Build SQL Query with
         * mode:'list', search:<query>  (no AI Agent involved).
         */
        async function searchContactsDirect(query) {
            const q = (query || '').trim().substring(0, SEARCH_MAX_INPUT_LEN);
            if (q.length < SEARCH_MIN_CHARS) return [];

            const payload = {
                sessionId,
                chatInput: {
                    message: `search contacts: ${q}`,
                    pageSize: SEARCH_PAGE_SIZE,
                    pageNumber: 1
                }
            };

            console.log('[ContactSearch] → n8n payload:', payload);

            const res = await fetch(API_ENDPOINT, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (!res.ok) throw new Error(`HTTP ${res.status}`);

            const json = await res.json();
            console.log('[ContactSearch] <- n8n raw response:', json);

            // Unwrap: n8n returns [ { output, mode, contacts, metadata } ]
            const envelope = Array.isArray(json) ? json[0] : json;
            const record = (envelope && envelope.contacts !== undefined) ? envelope
                : (envelope && envelope.data !== undefined) ? envelope.data
                    : (envelope && envelope.result !== undefined) ? envelope.result
                        : envelope;
            const contacts = (record && Array.isArray(record.contacts)) ? record.contacts : [];

            console.log('[ContactSearch] <- parsed contacts count:', contacts.length);
            return contacts;
        }

        // ── Fetch full contact data via MODE=get (bypasses AI Agent) ─────────────
        /**
         * Sends a JSON request to n8n with message = 'get contact: <uuid>'
         * Pre-router intercepts → routes to sp_contacts with mode:'get'.
         */
        async function fetchContactGetMode(uuid) {
            const payload = {
                sessionId,
                chatInput: {
                    message: `get contact: ${uuid}`,
                    contact_id: uuid
                }
            };

            console.log('[ContactGetMode] → n8n payload:', payload);

            const res = await fetch(API_ENDPOINT, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (!res.ok) throw new Error(`HTTP ${res.status}`);

            const json = await res.json();
            console.log('[ContactGetMode] <- n8n raw response:', json);

            const envelope = Array.isArray(json) ? json[0] : json;
            const contact = envelope.contact || envelope;
            return contact;
        }

            </div>
            <div style="font-size:0.78rem;color:#5f6368;">
                <span>&#9993; ${email}</span><span style="margin-left:0.8rem;">&#128222; ${phone}</span>
            </div>`;
            return div;
        }

        // ══════════════════════════════════════════════════════════════════════════
        //  HOME PAGE SEARCH
        // ══════════════════════════════════════════════════════════════════════════

        function homeSearchDebounce(value) {
            const clear = document.getElementById('home-search-clear');
            if (clear) clear.style.display = value ? 'block' : 'none';
            clearTimeout(_homeSearchTimer);
            if (!value || value.trim().length < SEARCH_MIN_CHARS) return;
            _homeSearchTimer = setTimeout(() => runHomeSearch(value.trim()), SEARCH_DEBOUNCE_MS);
        }

        async function runHomeSearch(query) {
            const spinner = document.getElementById('home-search-spinner');
            const responseArea = document.getElementById('responseArea');
            if (spinner) spinner.style.display = 'inline-block';
            try {
                const contacts = await searchContactsDirect(query);
                if (spinner) spinner.style.display = 'none';
                hideQuickUI();

                if (!contacts.length) {
                    responseArea.innerHTML = `
                    <div class="audit-record fade-in">
                        <div style="margin-top:0.5rem;text-align:left;max-width:100%;margin-left:1.75rem;">
                            <h3 style="color:#0078d7;">Contact List</h3>
                        </div>
                        <div class="create-customer-btn-container" style="justify-content:space-between;">
                            <button class="unified-action-btn" onclick="goHome()">&#127968; Back Home</button>
                            <button class="unified-action-btn" onclick="showCreateContactForm()">&#43; Create Contact</button>
                        </div>
                        <div style="padding:2rem 1.75rem;color:#888;font-size:0.95rem;">
                            No contacts found for "<strong>${escapeHTML(query)}</strong>".
                        </div>
                    </div>`;
                    return;
                }

                _homeSearchContacts = contacts;
                // Build list text using same format as existing buildListModeHTML parser
                const lines = ['[MODE:list] **LIST CONTACTS**', '', `**Page:** 1 of 1 | **Total:** ${contacts.length} contacts`, `**Search:** "${query}"`, ''];
                contacts.forEach((c, i) => {
                    const firstName = c.firstName || c.first_name || '';
                    const lastName = c.lastName || c.last_name || '';
                    lines.push(`**${i + 1}. ${firstName} ${lastName}** [${c.role || 'N/A'}]`);
                    lines.push(`   ID: ${c.id || c.contact_id || ''}`);
                    lines.push(`   Email: ${c.email || 'N/A'}`);
                    lines.push(`   Phone: ${c.phone || 'N/A'}`);
                    lines.push(`   Account: ${c.accountName || c.account_name || 'N/A'}`);
                    lines.push(`   Status: ${c.status || 'active'}`);
                    lines.push('');
                });
                const html = buildListModeHTML(lines.join('\n'), { mode: 'list', contacts });
                responseArea.innerHTML = `<div class="fade-in">${html}</div>`;
            } catch (err) {
                if (spinner) spinner.style.display = 'none';
                console.error('[ContactSearch] home search error:', err);
                hideQuickUI();
                responseArea.innerHTML = `
                <div class="audit-record fade-in">
                    <div class="create-customer-btn-container">
                        <button class="unified-action-btn" onclick="goHome()">&#127968; Back Home</button>
                    </div>
                    <div style="padding:2rem 1.75rem;color:#dc3545;">&#9888; Search error. Please try again.</div>
                </div>`;
            }
        }

        function homeSearchKeyNav(event) {
            if (event.key === 'Enter') {
                const val = (document.getElementById('home-search-input')?.value || '').trim();
                if (val.length >= SEARCH_MIN_CHARS) { clearTimeout(_homeSearchTimer); runHomeSearch(val); }
            } else if (event.key === 'Escape') {
                clearHomeSearch();
            }
        }

        function clearHomeSearch() {
            const inp = document.getElementById('home-search-input');
            const clr = document.getElementById('home-search-clear');
            if (inp) { inp.value = ''; inp.focus(); }
            if (clr) clr.style.display = 'none';
        }

        // ══════════════════════════════════════════════════════════════════════════
        //  UPDATE FORM SEARCH
        // ══════════════════════════════════════════════════════════════════════════

        function formSearchDebounce(value) {
            const clear = document.getElementById('form-search-clear');
            if (clear) clear.style.display = value ? 'block' : 'none';
            clearTimeout(_formSearchTimer);
            closeFormDropdown();
            if (!value || value.trim().length < SEARCH_MIN_CHARS) return;
            _formSearchTimer = setTimeout(() => runFormSearch(value.trim()), SEARCH_DEBOUNCE_MS);
        }

        async function runFormSearch(query) {
            const spinner = document.getElementById('form-search-spinner');
            const dropdown = document.getElementById('form-search-dropdown');
            if (!spinner || !dropdown) return;

            spinner.style.display = 'inline-block';
            dropdown.style.display = 'none';
            _formSearchIdx = -1;

            try {
                const contacts = await searchContactsDirect(query);
                spinner.style.display = 'none';

                if (!contacts.length) {
                    dropdown.innerHTML = `<div style="padding:0.8rem 1rem; color:#888; font-size:0.88rem;">
                    No contacts found for "<strong>${escapeHTML(query)}</strong>"
                </div>`;
                    dropdown.style.display = 'block';
                    return;
                }

                dropdown.innerHTML = '';
                contacts.forEach((c, i) => {
                    dropdown.appendChild(renderContactDropdownItem(
                        c, i,
                        (contact) => formSearchSelect(contact),
                        (idx) => { _formSearchIdx = idx; }
                    ));
                });
                dropdown.style.display = 'block';
            } catch (err) {
                spinner.style.display = 'none';
                console.error('[ContactSearch] form search error:', err);
                dropdown.innerHTML = `<div style="padding:0.8rem 1rem; color:#dc3545; font-size:0.85rem;">
                &#9888; Search error — please try again.
            </div>`;
                dropdown.style.display = 'block';
            }
        }

        async function formSearchSelect(contact) {
            closeFormDropdown();

            const inp = document.getElementById('form-search-input');
            const clr = document.getElementById('form-search-clear');
            if (inp) inp.value = '';
            if (clr) clr.style.display = 'none';

            const loadingEl = document.getElementById('form-get-loading');
            if (loadingEl) loadingEl.style.display = 'flex';

            try {
                const uuid = contact.id || contact.contact_id || '';
                let fullContact = contact;

                if (uuid) {
                    fullContact = await fetchContactGetMode(uuid);
                    console.log('[FormSearch] get-mode contact:', fullContact);
                } else {
                    console.warn('[FormSearch] No UUID on selected contact — skipping get-mode fetch');
                }

                populateContactForm(normalizeContactData(fullContact));
            } catch (err) {
                console.warn('[FormSearch] get-mode fetch failed — falling back to list data:', err);
                populateContactForm(normalizeContactData(contact));
            } finally {
                if (loadingEl) loadingEl.style.display = 'none';
            }
        }

        function formSearchKeyNav(event) {
            const dropdown = document.getElementById('form-search-dropdown');
            if (!dropdown || dropdown.style.display === 'none') return;
            const items = dropdown.querySelectorAll('[data-idx]');
            if (event.key === 'ArrowDown') {
                event.preventDefault();
                _formSearchIdx = Math.min(_formSearchIdx + 1, items.length - 1);
                highlightContactDropdownItem(items, _formSearchIdx);
            } else if (event.key === 'ArrowUp') {
                event.preventDefault();
                _formSearchIdx = Math.max(_formSearchIdx - 1, 0);
                highlightContactDropdownItem(items, _formSearchIdx);
            } else if (event.key === 'Enter') {
                if (_formSearchIdx >= 0 && items[_formSearchIdx]) {
                    items[_formSearchIdx].dispatchEvent(new MouseEvent('mousedown'));
                }
            } else if (event.key === 'Escape') {
                closeFormDropdown();
            }
        }

        function closeFormDropdown() {
            const d = document.getElementById('form-search-dropdown');
            if (d) d.style.display = 'none';
            _formSearchIdx = -1;
        }

        function clearFormSearch() {
            const inp = document.getElementById('form-search-input');
            const clr = document.getElementById('form-search-clear');
            if (inp) { inp.value = ''; inp.focus(); }
            if (clr) clr.style.display = 'none';
            closeFormDropdown();
        }

        // ══════════════════════════════════════════════════════════════════════════
        //  SHARED HELPERS
        // ══════════════════════════════════════════════════════════════════════════

        function highlightContactDropdownItem(items, idx) {
            items.forEach((el, i) => { el.style.background = i === idx ? '#f0f7ff' : ''; });
            if (items[idx]) items[idx].scrollIntoView({ block: 'nearest' });
        }

        /**
         * Normalize the contact object returned by sp_contacts list / get mode
         * into the flat shape expected by populateContactForm.
         *
         * v6.4: billing address resolved from nested billing_address object first
         * (Format Response / SP get_details shape), flat fields retained as fallbacks.
         */
        function normalizeContactData(c) {
            const ba = (c.billing_address && typeof c.billing_address === 'object')
                ? c.billing_address : {};

            return {
                id: c.id || c.contact_id || '',
                firstName: c.firstName || c.first_name || '',
                lastName: c.lastName || c.last_name || '',
                email: c.email || '',
                phone: c.phone || '',
                role: c.role || '',
                accountId: c.accountId || c.account_id || '',
                status: c.status || 'active',
                // Billing address — nested object first, flat prefixed, then bare
                billing_line1: ba.street || c.billing_line1 || c.billing_street || c.line1 || '',
                billing_line2: ba.line2 || c.billing_line2 || c.line2 || '',
                billing_city: ba.city || c.billing_city || c.city || '',
                billing_province: ba.province || c.billing_province || c.province || '',
                billing_postal: ba.postal_code || c.billing_postal || c.postal_code || '',
                billing_country: ba.country || c.billing_country || c.country || 'CA',
            };
        }

        /**
         * Populate the rendered Update Contact form fields with contact data.
         */
        function populateContactForm(data) {
            const set = (id, val) => { const el = document.getElementById(id); if (el) el.value = val || ''; };

            set('update-contactId', data.id);
            set('update-firstName', data.firstName);
            set('update-lastName', data.lastName);
            set('update-email', data.email);
            set('update-phone', data.phone);
            set('update-accountId', data.accountId);
            set('update-line1', data.billing_line1);
            set('update-line2', data.billing_line2);
            set('update-city', data.billing_city);
            set('update-province', data.billing_province);
            set('update-postal', data.billing_postal);
            set('update-country', data.billing_country);

            const selectField = (id, val) => {
                const el = document.getElementById(id);
                if (!el) return;
                const opt = [...el.options].find(o => o.value === val);
                if (opt) el.value = val;
            };
            selectField('update-role', data.role);
            selectField('update-status', data.status);

            // Flash the form border to confirm data loaded
            const form = document.querySelector('.create-form');
            if (form) {
                form.style.boxShadow = '0 0 0 3px rgba(40,167,69,0.35)';
                setTimeout(() => { form.style.boxShadow = ''; }, 800);
            }

            const responseArea = document.getElementById('responseArea');
            if (responseArea) responseArea.scrollTop = 0;

            console.log('[ContactSearch] Form populated with contact:', data.id, data.firstName, data.lastName);
        }

    </script>

</body>
