      }

      // ================================================================
      // AUTO-SWITCHING SEARCH ENGINE  v1.12
      // Intent Detection · Tab/Banner/Chip Controller · Tab Sync
      // ================================================================

      let _activeTab   = 'orders';   // current active entity tab
      let _lastQuery   = '';         // most recent submitted query (for banner re-fire)

      // ── Keyword signal tables ──────────────────────────────────────
      const ORDER_SIGNALS = [
        /\borders?\b/i,       /\binvoice\b/i,      /\bpurchase\b/i,
        /\bshippe?d?\b/i,     /\bpending\b/i,      /\bprocessing\b/i,
        /\bcancell?ed?\b/i,   /\bdelivered\b/i,    /\bitem\b/i,
        /\bquantity\b/i,      /\bsku\b/i,           /\bproduct\b/i,
        /\btotal\b/i,         /\bamount\b/i,        /\bpayment\b/i,
        /\b#\d{3,}\b/,        /\bSO-\d{4}-\d{6}\b/i,
        /\blast\s+(week|month|year)\b/i,
        /\brecent\s+order\b/i,   /\bplace[sd]?\s+order\b/i,
        /\bcategory\b/i,      /\bsales\b/i,         /\brevenue\b/i
      ];

      const ACCOUNT_SIGNALS = [
        /\baccounts?\b/i,     /\bcustomer\b/i,     /\bclient\b/i,
        /\bcontact\b/i,       /\bemail\b/i,         /\bphone\b/i,
        /\bregion\b/i,        /\btiered?\b/i,       /\bgold\b/i,
        /\bsilver\b/i,        /\bdiamond\b/i,
        /\bregistered\b/i,    /\blocation\b/i,      /\baddress\b/i,
        /@[\w.-]+\.\w{2,}/    // email address in query
      ];

      /**
       * detectIntent(q) → 'orders' | 'accounts' | 'both' | 'ambiguous'
       */
      function detectIntent(q) {
        const text = q.trim();
        const oScore = ORDER_SIGNALS.filter(r   => r.test(text)).length;
        const aScore = ACCOUNT_SIGNALS.filter(r => r.test(text)).length;

        if (oScore > 0 && aScore === 0) return 'orders';
        if (aScore > 0 && oScore === 0) return 'accounts';
        if (oScore > 0 && aScore > 0)   return 'both';
        return 'ambiguous';
      }

      // ── Tab switcher ──────────────────────────────────────────────
      function switchTab(entity, manual = false) {
        if (_activeTab === entity && !manual) return;  // no-op if already correct

        // Fade the response panel briefly
        const responseDiv = document.getElementById('response');
        if (_activeTab !== entity) {
          responseDiv.classList.add('tab-switching');
          setTimeout(() => responseDiv.classList.remove('tab-switching'), 160);
        }

        _activeTab = entity;
        document.querySelectorAll('.entity-tab').forEach(btn => btn.classList.remove('active'));
        const tabEl = document.getElementById('tab-' + entity);
        if (tabEl) tabEl.classList.add('active');

        // Manual click hides the banner
        if (manual) hideBanner();
      }

      function showBanner(msg) {

        document.getElementById('intent-banner-msg').textContent = msg;
        el.style.display = 'flex';
      }

        const el = document.getElementById('intent-banner');
        if (el) el.style.display = 'none';
      }

      /**
       * bannerSwitch — called when user clicks a banner pill button.
       * Switches the tab and re-fires the last query targeted at that entity.
       */
      function bannerSwitch(entity) {

        const q = _lastQuery || document.getElementById('userInput').value.trim();

      // ── Intent chip helpers ───────────────────────────────────────

      function hideChip() {

      // ── Wire chip to textarea input (300ms debounce, visual only) ─
      let _intentDebounce = null;
      document.getElementById('userInput').addEventListener('input', function () {
        clearTimeout(_intentDebounce);
        const q = this.value.trim();
        if (!q) { hideChip(); hideBanner(); return; }

        _intentDebounce = setTimeout(() => {
          const intent = detectIntent(q);

      document.getElementById('userInput').addEventListener('input', function () {

      // ── _syncTabFromMode — called after displayOrderResponse renders ─
      // Corrects the active tab to match what the AI actually returned.
      // Prefers data[0].entity (from format_response v5.2) when available;
      // falls back to mode inference for older workflow versions.
      function _syncTabFromMode(modeNum, textMode) {
        // Try to read entity directly from the last raw response (most reliable)
        const _lastResponseEntity = window._lastResponseEntity || null;
        if (_lastResponseEntity) {
          switchTab(_lastResponseEntity);
          window._lastResponseEntity = null;
          return;
        }

        // Fallback: infer from mode strings
        const tm = textMode ? String(textMode).toLowerCase() : '';
        if (tm === 'account_summary' || tm === 'account_search' || tm === 'contact_search') {
          switchTab('accounts');
        } else if (tm === 'list_employees' || tm === 'get_pricing') {
          // Form-support modes — leave tab as-is
        } else if (modeNum !== null && !isNaN(modeNum)) {

          switchTab('orders');
        }
      }

      // ================================================================
      // END AUTO-SWITCHING SEARCH ENGINE
      // ================================================================

      // Form Submission
      document.getElementById('chatForm').addEventListener('submit', async function(e) {

        const message = userInput.value.trim();

        // ── Auto-switching logic (v1.12) ──────────────────────────
        _lastQuery = message;

        switch (_intent) {
          case 'orders':
            switchTab('orders');
            hideBanner();
            break;
          case 'accounts':
            switchTab('accounts');
            hideBanner();
            break;
          case 'both':
            showBanner('Results found in both Orders and Accounts.');
            break;
          case 'ambiguous':
          default:
            // Stay on current tab; show a soft banner suggestion
            showBanner(`No clear entity detected — showing ${_activeTab} results. Switch?`);
            break;
        }
        hideChip();  // chip only shows while typing
        // ── End auto-switching logic ───────────────────────────────
        
        // Process query
        processQuery(message);
        
        // Clear input
        userInput.value = '';
      });

      // Send query from buttons or form
      async function sendQuery(message) {
        const userInput = document.getElementById('userInput');
        userInput.value = message;

        // ── Auto-switching logic for button-triggered queries (v1.12) ──
        _lastQuery = message;
        const _intent = detectIntent(message);
        switch (_intent) {
          case 'orders':   switchTab('orders');   hideBanner(); break;
          case 'accounts': switchTab('accounts'); hideBanner(); break;
          case 'both':     showBanner('Results found in both Orders and Accounts.'); break;

        }

      // Process query function
      async function processQuery(message) {
        // Show loading
        showLoading();
        
        try {
          // Create abort controller with 60 second timeout
          const controller = new AbortController();
          const timeoutId = setTimeout(() => controller.abort(), 60000); // 60 seconds
          
          // Call n8n webhook
          const response = await fetch('https://orbitcrm-production.up.railway.app/order-chat', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
            },
            body: JSON.stringify({
              chatInput: {
                message: message,
                entity:  _activeTab    // 'orders' | 'accounts' — soft routing hint for n8n (v1.12)
              },
              sessionId: currentSessionId
            }),
            signal: controller.signal
          });
          
          clearTimeout(timeoutId);
          
          // Check HTTP status
          if (!response.ok) {
            throw new Error(`HTTP error! status: ${response.status}`);
          }
          
          const data = await response.json();
          
          // Display response
          displayOrderResponse(data);
          
        } catch (error) {
          console.error('Error in processQuery:', error);
          console.error('Error details:', {
            name: error.name,
            message: error.message,
            stack: error.stack
          });
          
          if (error.name === 'AbortError') {
            displayError('Request timed out after 60 seconds. Please try again or simplify your query.');
          } else if (error.message && error.message.includes('HTTP error')) {
            displayError(`Server returned an error: ${error.message}`);
          } else if (error.message && error.message.includes('Failed to fetch')) {
            displayError('Failed to connect to n8n webhook. Please check:\n• Is the workflow active?\n• Check browser console for details.');
          } else {
            displayError(`Failed to communicate with server. Error: ${error.message}\n\nPlease check:\n• Workflow is active in n8n\n• Webhook URL: https://alanturing.app.n8n.cloud/webhook/order-chat\n• Browser console for more details`);
          }
        }
      }

      // ── _cleanUuid — v1.20 ──────────────────────────────────────────────
      // Strips trailing garbage (emojis, spaces) the Format Response markdown
      // renderer may append to UUID-bearing table cells.
      function _cleanUuid(str) {
        if (!str) return str;
        const m = String(str).match(/[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}/i);
        return m ? m[0] : str;
      }

      // ── processDirectQuery — v1.20 ────────────────────────────────────────
      // Sends a structured SP params object directly to the pre-router via
      // batchData.context = 'direct_query', bypassing the AI Agent entirely.
      const _WEBHOOK_URL = 'https://orbitcrm-production.up.railway.app/order-chat';

      async function processDirectQuery(params) {
        // Sanitize all UUID-typed fields before sending
        const _UUID_FIELDS = ['orderId','accountId','contactId','productId',
                              'productPricingId','orderItemId','createdBy','updatedBy'];
        _UUID_FIELDS.forEach(k => { if (params[k]) params[k] = _cleanUuid(params[k]); });

        showLoading();
        try {
          const controller = new AbortController();
          const timeoutId  = setTimeout(() => controller.abort(), 60000);
          const response   = await fetch(_WEBHOOK_URL, {
            method:  'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              chatInput: {
                message:   'order_direct_operation',
                batchData: { context: 'direct_query', ...params }
              },
              sessionId: currentSessionId
            }),
            signal: controller.signal
          });
          clearTimeout(timeoutId);
          if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
          const data = await response.json();
          displayOrderResponse(data);
        } catch (error) {
          console.error('processDirectQuery error:', error);
          if (error.name === 'AbortError')
            displayError('Request timed out after 60 s. Please try again.');
          else if (error.message?.includes('HTTP error'))
            displayError(`Server error: ${error.message}`);
          else if (error.message?.includes('Failed to fetch'))
            displayError('Cannot reach n8n webhook. Is the workflow active?');
          else
            displayError(`Request failed: ${error.message}`);
        }
      }

      // ── Header visibility helpers (v1.19) ─────────────────────────────────
      function hideHeader() { var h = document.querySelector('header'); if (h) h.style.display = 'none'; }
      function showHeader() { var h = document.querySelector('header'); if (h) h.style.display = ''; }

      // Display Functions
      function showLoading() {

      function displayOrderResponse(data) {

        // ENHANCED: Parse mode from text if not available in JSON
        if (modeNum === null || isNaN(modeNum)) {

          const modeTextMatch = rawText.match(/^M(\d+)\s*\[/m);
          if (modeTextMatch) {
            modeNum = parseInt(modeTextMatch[1]);
            console.log('   - Mode parsed from text pattern "M' + modeNum + '"');
          } else {

            const modeHeaderMatch = rawText.match(/Mode:\s*(\d+)/i);
            if (modeHeaderMatch) {

        }
        
        console.log('   - Final Mode Number:', modeNum);
        
        // Also extract text mode (e.g., "category_summary", "get_detail")
        let textMode = null;

        const textModeMap = {

        if (!rawText) {

        let html = '';

        // --- Explicit mode routing (like Product Management) ---
        if (modeNum !== null && !isNaN(modeNum)) {

                ? data[0].result.orders
                : (data?.result?.orders || null);

            case 5: // Category Summary (renamed from Mode 3)

            default:

        } else {

          console.log('⚠️ Mode number not available, using content detection');

      // Content-based routing fallback
      function routeByContent(rawText) {
        let html = '';

          isDetailView = true;

        // Check for Sales Summary (Mode 9) - NEW! Check before category to avoid confusion
        else if (/\[BAR_CHART\]|SALES SUMMARY|Overall Performance/i.test(rawText) && /Total Orders:|Total Revenue:/i.test(rawText)) {
          console.log('📈 Content detected: Sales Summary (Mode 9)');
          html = buildSalesSummaryHTML(rawText);

        // Check for Category Summary (Mode 5) - Updated detection

        }
        // Check for Account Summary (Mode 6) - Updated detection

        }
        
        // Parse Orders Summary Table
        const ordersSummaryMatch = text.match(/###\s*Orders Summary\s*\n\|([^\n]+)\|\s*\n\|[-|\s]+\|\s*\n((?:\|[^\n]+\|\s*\n)+)/);
        
        let orders = [];
        if (ordersSummaryMatch) {
          const headers = ordersSummaryMatch[1].split('|').map(h => h.trim()).filter(h => h);
          const rowsText = ordersSummaryMatch[2];
          const rows = rowsText.trim().split('\n').map(row => {
            return row.split('|').map(cell => cell.trim()).filter(cell => cell);
          });
          
          // Store orders with their data
          rows.forEach(row => {
            if (row.length === headers.length) {
              const order = {};
              headers.forEach((header, idx) => {
                order[header] = row[idx];
              });
              orders.push(order);
            }
          });
        }
        
        // Parse all Items Tables into a map keyed by Order ID
        const itemsMap = {};
        const itemsPattern = /###\s*Items for Order #(\d+)\s*\n((?:\|[^\n]+\|\s*\n)+|No items found[^\n]*)/g;
        let itemMatch;
        
        while ((itemMatch = itemsPattern.exec(text)) !== null) {
          const orderId = itemMatch[1];

          // Check if "No items found" message

          // Parse table headers and rows

          const headerLine = tableLines[0];
          const headers = headerLine.split('|').map(h => h.trim()).filter(h => h);
          
          const dataRows = tableLines.slice(2); // Skip header and separator
          const rows = dataRows.map(row => {
            return row.split('|').map(cell => cell.trim()).filter(cell => cell);

      // Get status badge class
      function getStatusClass(status) {
        const s = status.toLowerCase();
        if (s === 'completed' || s === 'delivered') return 'status-completed';
        if (s === 'pending') return 'status-pending';
        if (s === 'cancelled') return 'status-cancelled';
        if (s === 'processing') return 'status-processing';
        if (s === 'shipped') return 'status-shipped';
        if (s === 'delivered') return 'status-deliveredd';
        if (s === 'refunded') return 'status-cancelled';
        return 'status-processing';
      }

      function buildRestoreOrderHTML(text) {
        console.log('♻️ Building Restore Order HTML (Mode 8)');

        cleanText = cleanText.replace(/^#+\s*Order Management System[\s\S]*?(?=###)/m, '');
        
        // Extract the formatted message content
        const messageMatch = cleanText.match(/###[\s\S]+/);
        const messageContent = messageMatch ? messageMatch[0] : cleanText;
        
        // Check if it's an error (code < 0)
        const isError = text.includes('ERROR OCCURRED') || text.includes('Code: -');
        
        let html = '<div class="details-record">';

            const messageMatch2 = text.match(/Message:\s*([^\n]+)/);
            const detailsMatch = text.match(/Details:\s*([^\n]+)/);
            
            const errorCode = codeMatch ? codeMatch[1] : 'Unknown';

            html += '<div style="padding: 1.5rem;">';

            // What You Can Do

            html += `<strong>To find deleted orders to restore:</strong><br>`;

            html += `• This shows all orders that were soft-deleted and can be restored`;
            html += `</div>`;
            html += `</div>`;
            
            // Valid Orders Info
            html += `<div style="background: #f8f9fa; padding: 1rem; border-radius: 6px; border: 1px solid #dee2e6;">`;

        if (!container) {
          alert("Could not find order details.");
          console.error('No .details-record container found');
          return;
        }

        const statusSelect = container.querySelector('#edit-status');
        if (!statusSelect) {
          alert("Could not find status selector.");

          return;

        const newStatus = statusSelect.value.trim();

        // v1.20: direct SP call
        processDirectQuery({
          mode: 'update', action: 'change_status',
          orderId: _cleanUuid(orderId), status: newStatus
        });
      }

        // ──────────────────────────────────────────────────────────────
        // TYPEAHEAD  (Account Search)
        // ──────────────────────────────────────────────────────────────
        let _uofSearchTimer = null;

        function _uofInitTypeahead() {
            const input   = document.getElementById('uof_account_search');
            if (!input) return;
            const dropdown = document.getElementById('uof_dropdown');
            const spinner  = document.getElementById('uof_search_spinner');

            input.addEventListener('input', () => {
                clearTimeout(_uofSearchTimer);
                const q = input.value.trim();
                if (q.length < 2) {
                    dropdown.classList.remove('open');
                    spinner.classList.remove('active');
                    return;
                }
                spinner.classList.add('active');
                _uofSearchTimer = setTimeout(() => _uofDispatchSearch(q), 350);
            });

            document.addEventListener('click', (e) => {
                const wrapper = document.getElementById('uof_typeahead_wrapper');
                if (wrapper && !wrapper.contains(e.target)) {
                    if (dropdown) dropdown.classList.remove('open');
                }
            }, { capture: true });
        }

        async function _uofSearchAccounts(query) {
            const spinner  = document.getElementById('uof_search_spinner');
            const dropdown = document.getElementById('uof_dropdown');
            if (!spinner || !dropdown) return;

            try {
                const resp = await fetch('http://localhost:5678/webhook/order-chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chatInput: { message: `search accounts: ${query}` },
                        sessionId: currentSessionId
                    })
                });
                const data = await resp.json();
                spinner.classList.remove('active');

                const rows = _uofParseAccountRows(data);
                _uofRenderDropdown(rows, dropdown);
            } catch(e) {
                console.error('Account search error:', e);
                if (spinner) spinner.classList.remove('active');
                if (dropdown) {
                    dropdown.innerHTML = '<div class="uof-dropdown-empty">⚠️ Search failed — check webhook</div>';
                    dropdown.classList.add('open');
                }
            }
        }

        function _uofParseAccountRows(data) {
            let text = '';
            if (Array.isArray(data) && data[0]) text = data[0].output || '';
            else if (data && data.output) text = data.output;
            else text = String(data);

            const rows = [];
            // Match table rows: | Account Name | Account ID | Email |
            const lines = text.split('\n');
            for (const line of lines) {
                if (!line.startsWith('|')) continue;
                const cells = line.split('|').map(c => c.trim()).filter(c => c);
                if (cells.length < 2) continue;
                // Skip header and separator
                if (cells[0].toLowerCase().includes('account') && cells[1].toLowerCase().includes('id')) continue;
                if (cells[0].includes('---')) continue;
                // Try to extract UUID from any cell
                const uuidRegex = /[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}/i;
                let accountId = null, accountName = null, email = null;
                for (const cell of cells) {
                    if (uuidRegex.test(cell)) {
                        accountId = cell.match(uuidRegex)[0];
                    } else if (!accountName && cell.length > 0 && !cell.includes('@')) {
                        accountName = cell;
                    } else if (cell.includes('@')) {
                        email = cell;
                    }
                }
                if (accountId && accountName) {
                    rows.push({ id: accountId, name: accountName, email: email || '' });
                }
            }
            return rows;
        }

        function _uofRenderDropdown(rows, dropdown) {
            if (!dropdown) return;
            if (rows.length === 0) {
                dropdown.innerHTML = '<div class="uof-dropdown-empty">No accounts found.</div>';
            } else {
                dropdown.innerHTML = rows.map(r => `
                    <div class="uof-dropdown-item" onclick="_uofSelectAccount(${JSON.stringify(r).replace(/"/g,'&quot;')})">
                        <div class="item-name">🏢 ${escapeHtml(r.name)}</div>
                        <div class="item-meta">${escapeHtml(r.id)}</div>
                    </div>`).join('');
            }
            dropdown.classList.add('open');
        }

        function _uofSelectAccount(account) {
            uof_selectedAccount = account;

            // Immediately populate Row 2 account fields (visible in all modes)
            const acctNameEl = document.getElementById('uof_account_name_display');
            const acctIdEl   = document.getElementById('uof_account_id_display');

                    </div>`;
            }

            // Show orders section and fetch orders
            const ordersSection = document.getElementById('uof_orders_section');
            if (ordersSection) {
                ordersSection.style.display = '';
                document.getElementById('uof_orders_content').innerHTML = `
                    <div class="uof-loading"><div class="mini-spinner"></div>Fetching orders for ${escapeHtml(account.name)}…</div>`;

            uof_orders = [];
            uof_selectedOrderId = null;

            // Clear Row 2 account fields
            const acctNameEl = document.getElementById('uof_account_name_display');

                                    style="height:42px;border-radius:24px;padding:0 2.5rem 0 1.1rem;border:1.5px solid #d0d7e2;box-shadow:0 1px 6px rgba(0,0,0,0.08);">
