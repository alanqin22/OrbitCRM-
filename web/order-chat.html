      function saveNewOrder() {
        const container = document.querySelector('.details-record');
        if (!container) {
            alert("Could not find order form.");
            return;
        }

        const getValue = (selector) => {
            const el = container.querySelector(selector);
            return el ? el.value.trim() : null;
        };

        // Get order fields
        const accountId = getValue('#new-account-id');
        const contactId = getValue('#new-contact-id');
        const productId = getValue('#new-product-id');
        const quantity = getValue('#new-quantity') || '1';
        const priceType = getValue('#new-price-type') || 'Retail';
        const status = getValue('#new-status') || 'Pending';
        const orderDate = getValue('#new-order-date');

        // Validate required fields
        if (!accountId) {
            alert("Account ID is required!\n\nPlease provide a valid Account UUID.\nUse Account/Customer Management to find account UUIDs.");
            return;
        }

        // Validate UUID format for accountId
        const uuidRegex = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i;
        if (!uuidRegex.test(accountId)) {
            alert("Invalid Account ID format!\n\nPlease enter a valid UUID (e.g., 12345678-1234-1234-1234-123456789abc)");
            return;
        }

        // v1.20: direct SP call — no AI Agent
        const spParams = {
          mode: 'create',
          accountId,
          orderDate: orderDate || new Date().toISOString().split('T')[0],
          status:    status    || 'Pending'
        };
        if (contactId && uuidRegex.test(contactId)) spParams.contactId = contactId;
        if (productId && uuidRegex.test(productId)) {
          spParams.productId = productId;
          spParams.quantity  = parseInt(quantity) || 1;
          spParams.priceType = priceType || 'Retail';
        }
        processDirectQuery(spParams);
      }

      function returnToList() {
        // Restore the saved list if available
        if (cameFromList && lastListHTML) {
          document.getElementById('response').innerHTML = lastListHTML;
          cameFromList = false;
          lastListHTML = "";
        } else {
          // Fallback: make a new query if no saved list
          // v1.20: direct SP call
          processDirectQuery({ mode:'list', includeDeleted:false, sortField:'order_date', sortOrder:'DESC', pageSize:50, pageNumber:1 });
        }
      }

      // Convert markdown to HTML (for stored procedure formatted output)
      function convertMarkdownToHTML(markdown) {
        let html = markdown;
        
        // Convert headers
        html = html.replace(/^### (.+)$/gm, '<h3 style="color:#0078d7; margin: 0.4rem 0 0.4rem 0; font-size: 1.1rem; border-bottom: 2px solid #e1e4e8; padding-bottom: 0.5rem;">$1</h3>');
        //html = html.replace(/^### (.+)$/gm, '<h3 style="color:#0078d7; margin: 1.5rem 0 1rem 0; font-size: 1.1rem; border-bottom: 2px solid #e1e4e8; padding-bottom: 0.5rem;">$1</h3>');
        html = html.replace(/^## (.+)$/gm, '<h2 style="color:#6f42c1; margin: 1.5rem 0 1rem 0; font-size: 1.3rem;">$1</h2>');
        html = html.replace(/^# (.+)$/gm, '<h1 style="color:#0078d7; margin: 1.7rem 0 1rem 0; font-size: 1.5rem;">$1</h1>');
        
        // Convert markdown tables to HTML
        html = convertMarkdownTablesToHTML(html);
        
        // Convert bold
        html = html.replace(/\*\*(.+?)\*\*/g, '<strong style="color:#0078d7; font-weight: 600;">$1</strong>');
        
        // Convert italic
        html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
        
        // Convert inline code
        html = html.replace(/`([^`]+)`/g, '<code style="background:#f6f8fa; padding:2px 6px; border-radius:3px; font-family:Consolas,monospace; color:#dc3545; font-size: 0.9em;">$1</code>');
        
        // Convert links
        html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" style="color:#0078d7; text-decoration:none; font-weight:bold;" target="_blank">$1</a>');
        
        // Convert horizontal rules
        html = html.replace(/^---$/gm, '<hr style="border:none; border-top:2px solid #e1e4e8; margin:1.5rem 0;">');
        
        // Convert line breaks
        html = html.replace(/\n/g, '<br>');
        
        return html;
      }

      // Convert markdown tables to HTML tables with beautiful styling
      function convertMarkdownTablesToHTML(text) {
        // Match markdown tables - find consecutive lines starting with |
        const lines = text.split('\n');
        let inTable = false;
        let tableLines = [];
        let result = '';
        let lastIndex = 0;
        
        for (let i = 0; i < lines.length; i++) {
          const line = lines[i].trim();
          
          // Check if this line is part of a table
          if (line.startsWith('|') && line.endsWith('|')) {
            if (!inTable) {
              // Start of a new table - add any text before this table
              result += lines.slice(lastIndex, i).join('\n');
              inTable = true;
              tableLines = [];
            }
            tableLines.push(line);
          } else {
            // Not a table line
            if (inTable) {
              // End of table - convert it
              if (tableLines.length >= 2) {
                result += convertTableToHTML(tableLines) + '\n';
              } else {
                result += tableLines.join('\n') + '\n';
              }
              inTable = false;
              tableLines = [];
              lastIndex = i;
            }
          }
        }
        
        // Handle any remaining table
        if (inTable && tableLines.length >= 2) {
          result += convertTableToHTML(tableLines);
        } else if (inTable) {
          result += tableLines.join('\n');
        } else {
          result += lines.slice(lastIndex).join('\n');
        }
        
        return result;
      }
      
      // Helper function to convert a markdown table to HTML
      function convertTableToHTML(tableLines) {
        if (tableLines.length < 2) return tableLines.join('\n');
        
        const headers = tableLines[0].split('|').map(h => h.trim()).filter(h => h);
        const separator = tableLines[1]; // separator line
        const rows = tableLines.slice(2).map(line => 
          line.split('|').map(cell => cell.trim()).filter((cell, index, arr) => {
            // Filter out empty first/last elements from splitting on |
            return cell !== '' || (index !== 0 && index !== arr.length - 1);
          })
        );
        
        let html = '<table style="width: 100%; border-collapse: collapse; margin: 0.8rem 0; box-shadow: 0 2px 8px rgba(0,0,0,0.1); border-radius: 8px; overflow: hidden;">';        
        
        // Header
        html += '<thead style="background: linear-gradient(135deg, #0078d7 0%, #5856d6 100%); color: white;">';
        html += '<tr>';
        headers.forEach(header => {
          html += `<th style="padding: 0.75rem 1rem; text-align: left; font-weight: 600; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.5px;">${header}</th>`;
        });
        html += '</tr></thead>';
        
        // Body
        html += '<tbody>';
        rows.forEach((row, index) => {
          if (row.length === 0) return; // Skip empty rows
          const bgColor = index % 2 === 0 ? '#ffffff' : '#f8f9fa';
          html += `<tr style="background: ${bgColor}; border-bottom: 1px solid #e1e4e8;">`;
          row.forEach(cell => {
            html += `<td style="padding: 0.75rem 1rem; color: #333; font-size: 0.9rem;">${cell}</td>`;
          });
          html += '</tr>';
        });
        html += '</tbody>';
        
        html += '</table>';
        return html;
      }

      
      // Format markdown-like output with beautiful colors
      function formatMarkdown(text) {
        let html = escapeHtml(text);
        
        // Section Headers (ORDER ITEMS, Summary, etc.)
        html = html.replace(/^(ORDER ITEMS|ITEMS|Summary|Created|Updated)$/gm, '<strong style="color:#0078d7; font-size:1.05em;">$1</strong>');
        html = html.replace(/^(ORDER ITEMS|ITEMS|Summary|Created|Updated):/gm, '<strong style="color:#0078d7; font-size:1.05em;">$1:</strong>');
        
        // Product line: • Product (SKU: XXX) - Qty: N × $X.XX = $XX.XX [Category]
        html = html.replace(/• ([^(]+) \(SKU: ([^)]+)\) - Qty: (\d+) × \$([0-9.]+) = \$([0-9.]+) \[([^\]]+)\]/g, 
          '• <span style="color:#28a745; font-weight:bold;">$1</span> <span style="color:#999;">(SKU: <span style="color:#6f42c1; font-weight:bold;">$2</span>)</span> - Qty: <span style="color:#dc3545; font-weight:bold;">$3</span> × <span style="color:#17a2b8; font-weight:bold;">$$$4</span> = <span style="color:#28a745; font-weight:bold; font-size:1.05em;">$$$5</span> <span style="color:#fd7e14; font-weight:bold;">[$6]</span>'
        );
        
        // Items count and totals: Items: N | Total Qty: N | Calculated: $X.XX
        html = html.replace(/Items: (\d+) \| Total Qty: (\d+) \| Calculated: \$([0-9.]+)/g,
          '<span style="color:#6f42c1;">Items:</span> <span style="color:#dc3545; font-weight:bold;">$1</span> | <span style="color:#6f42c1;">Total Qty:</span> <span style="color:#dc3545; font-weight:bold;">$2</span> | <span style="color:#6f42c1;">Calculated:</span> <span style="color:#28a745; font-weight:bold; font-size:1.1em;">$$$3</span>'
        );
        
        // Dates and timestamps
        html = html.replace(/Created: (.+?)(?=<br>|$)/g, '<span style="color:#fd7e14;">Created:</span> <span style="color:#495057; font-weight:bold;">$1</span>');
        html = html.replace(/Updated: (.+?)(?=<br>|$)/g, '<span style="color:#fd7e14;">Updated:</span> <span style="color:#495057; font-weight:bold;">$1</span>');
        
        // Headers
        html = html.replace(/^###### (.+)$/gm, '<h6 style="color:#6f42c1; font-size:0.95rem; margin:0.75rem 0 0.5rem 0;">$1</h6>');
        html = html.replace(/^##### (.+)$/gm, '<h5 style="color:#0078d7; font-size:1rem; margin:1rem 0 0.5rem 0;">$1</h5>');
        html = html.replace(/^#### (.+)$/gm, '<h4 style="color:#0078d7; font-size:1.1rem; margin:1rem 0 0.5rem 0;">$1</h4>');
        
        // Bold (but only for remaining unformatted bold text)
        html = html.replace(/\*\*(.+?)\*\*/g, '<strong style="color:#0078d7;">$1</strong>');
        
        // Code blocks
        html = html.replace(/`([^`]+)`/g, '<code style="background:#f4f4f4; padding:2px 6px; border-radius:3px; font-family:Consolas,monospace; color:#dc3545;">$1</code>');
        
        // Links
        html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" style="color:#0078d7; text-decoration:none; font-weight:bold;" target="_blank">$1</a>');
        
        // Horizontal rules
        html = html.replace(/^---$/gm, '<hr style="border:none; border-top:2px solid #e0e6ed; margin:1rem 0;">');
        
        // Line breaks
        html = html.replace(/\n/g, '<br>');
        
        return html;
      }

      function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
      }
