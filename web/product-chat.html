    // =========================================================================
    async function _directQuery(context, params = {}, label = 'Loading…') {
        hideHeader();
        responseBox.innerHTML = `<div class="loading-message"><div class="spinner"></div> ${escapeHTML(label)}</div>`;
        try {
            const res = await fetch(WEBHOOK_URL, {
                method:  'POST',

                body: JSON.stringify({
                    sessionId,
                    chatInput: {
                        message:     'product_direct_operation',
                        productData: { context, ...params }
                    }
                })
            });
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const data = await res.json();
            const text = typeof data === 'string' ? data
                : (Array.isArray(data) ? data[0]?.output : null)
                || data?.output || data?.response || data?.text
                || JSON.stringify(data);
            responseBox.innerHTML = buildProductResponseHTML(text);
            _pfPostRenderSetup();
        } catch (err) {
            console.error(`_directQuery [${context}] error:`, err);
            responseBox.innerHTML = buildErrorHTML(`❌ ${escapeHTML(label)} failed — ${escapeHTML(err.message)}`);

    }

            .replace(/^#### (.+)$/gm, '<div class="report-title">$1</div>')

            .replace(/^\s*---\s*$/gm, '<hr>')

    // === Main Response Router ===
    function buildProductResponseHTML(text) {
        if (!text) return "<div class='message-error'>No response</div>";

        let rawText, mode, reportMode;

        if (Array.isArray(text) && text[0]) {
            rawText = text[0].output || "";
            mode = text[0].mode || null;
            reportMode = text[0].reportMode || null;
            console.log("📦 Received array response:", { output: rawText.substring(0, 100), mode, reportMode });
        } else if (typeof text === "object" && text.output) {
            rawText = text.output;
            mode = text.mode || null;
            reportMode = text.reportMode || null;
            console.log("📦 Received object response:", { output: rawText.substring(0, 100), mode, reportMode });
        } else {
            rawText = String(text);
            mode = null;
            reportMode = null;
            console.log("📦 Received string response:", rawText.substring(0, 100));
        }

        if (!mode) {
            const modeMatch = rawText.match(/\[MODE:(\w+)\]/);
            if (modeMatch) {
                mode = modeMatch[1];
                console.log("📦 Extracted mode from text:", mode);
            }
        }

        console.log(`✅ Routing to mode: ${mode}`);
        
        switch(mode) {
            case 'list':
                return buildProductListHTML(rawText);
            case 'get_details':
            case 'get':
            case 'detail':
                return buildProductDetailsHTML(rawText);
            case 'add':
            case 'add_confirmation':
            case 'create':
            case 'create_confirmation':
                return buildAddConfirmationHTML(rawText);
            case 'update':
            case 'update_confirmation':
                return buildUpdateConfirmationHTML(rawText);
            case 'bulk_adjust_stock':
                return buildBulkAdjustStockHTML(rawText);
            case 'inventory_summary':
                return buildInventorySummaryHTML(rawText);
            case 'low_stock':
                return buildLowStockHTML(rawText);
            case 'price_history':
                return buildPriceHistoryHTML(rawText);
            case 'price_matrix':
                return buildPriceMatrixHTML(rawText);
            default:
                return buildFallbackResponse(rawText);
        }
    }

    // === Fallback Response Handler ===
    function buildFallbackResponse(rawText) {
        const routes = [
            { regex: /PRODUCT LIST|List.*products/i, handler: buildProductListHTML },
            { regex: /PRODUCT DETAILS|Product Details/i, handler: buildProductDetailsHTML },
            { regex: /PRODUCT CREATED|Created Successfully|Product added Successfully/i, handler: buildAddConfirmationHTML },
            { regex: /PRODUCT UPDATED|Updated Successfully/i, handler: buildUpdateConfirmationHTML },
            { regex: /BULK STOCK|Bulk.*Update|Bulk Stock Adjustment/i, handler: buildBulkAdjustStockHTML },
            { regex: /INVENTORY SUMMARY/i, handler: buildInventorySummaryHTML },
            { regex: /LOW STOCK|Stock Alert/i, handler: buildLowStockHTML },
            { regex: /PRICE HISTORY/i, handler: buildPriceHistoryHTML },
            { regex: /PRICE MATRIX/i, handler: buildPriceMatrixHTML },
            { regex: /ERROR|error|Failed|Invalid/i, handler: buildErrorHTML },
        ];

        for (const route of routes) {
            if (route.regex.test(rawText)) {
                console.log(`Fallback matched: ${route.regex}`);
                return route.handler(rawText);
            }
        }

        return buildPlainMessageHTML(rawText);
    }

    // === MODE: get_details - Product Details ===
    function buildProductDetailsHTML(text) {
        const clean = text.replace(/\*\*/g, '');
        
        const getField = (pattern) => {
            const match = clean.match(pattern);
            return match ? match[1].trim() : "";
        };

        // Extract product name - handle multiple formats:
        // 1. get_details: "Product Details" followed by name on next non-empty line
        // 2. add/update: "[MODE:xxx] Product Added/Updated Successfully" followed by name
        let name = "";
        let id = "";
        
        // Try Format 1: Product Details header
        const nameLineMatch = text.match(/Product Details\*?\*?\s*\n+\*?\*?([^\n*]+)\*?\*?\s*\n+Product ID:/i);
        if (nameLineMatch) {
            name = nameLineMatch[1].trim();
        }
        
        // Try Format 2: [MODE:add/update] ... Successfully header
        // Pattern: First line is **[MODE:xxx]...**, then blank, then product name, then Product ID:
        if (!name) {
            const addUpdateMatch = text.match(/\[MODE:(?:add|update)\][^\n]*\*?\*?\s*\n+\s*\n*\*?\*?([^\n*]+?)\*?\*?\s*\n+Product ID:/i);
            if (addUpdateMatch) {
                name = addUpdateMatch[1].trim();
            }
        }
        
        // Try Format 3: Alternative pattern - look for line before "Product ID:"
        // Skip lines containing MODE, Successfully, or empty lines
        if (!name) {
            const lines = clean.split('\n');
            for (let i = 0; i < lines.length; i++) {
                const line = lines[i].trim();
                if (line.toLowerCase().includes('product id:')) {
                    // Look backwards for the product name
                    for (let j = i - 1; j >= 0; j--) {
                        const prevLine = lines[j].trim();
                        // Skip empty lines and header lines
                        if (!prevLine) continue;
                        if (prevLine.includes('[MODE:')) continue;
                        if (prevLine.toLowerCase().includes('successfully')) continue;
                        if (prevLine.toLowerCase().includes('product details')) continue;
                        // Found the product name
                        name = prevLine;
                        break;
                    }
                    break;
                }
            }
        }
        
        // Get FULL Product ID
        const idMatch = clean.match(/Product ID:\s*([a-f0-9-]+)/i);
        if (idMatch) {
            id = idMatch[1];
        }
        
        // Get Product#
        const productNumMatch = clean.match(/Product#:\s*([^\n]+)/i);
        const productNum = productNumMatch ? productNumMatch[1].trim() : 'N/A';
        
        // Get Category fields
        const categoryMatch = clean.match(/Category:\s*([^\n]+)/i);
        const category = categoryMatch ? categoryMatch[1].trim() : '';
        
        const categoryNumMatch = clean.match(/Category#:\s*([^\n]+)/i);
        const categoryNum = categoryNumMatch ? categoryNumMatch[1].trim() : '';
        
        // Get FULL Category ID
        const categoryIdMatch = clean.match(/Category ID:\s*([a-f0-9-]+)/i);
        const categoryId = categoryIdMatch ? categoryIdMatch[1].trim() : '';
        
        // Prices

        const promoMatch = clean.match(/Promo:\s*\$([0-9,.]+)/i);
        const wholesaleMatch = clean.match(/Wholesale:\s*\$([0-9,.]+)/i);

        const product = {
            id,

            name,
            sku: getField(/SKU:\s*([^\n|]+)/),
            category,
            categoryNum,
            categoryId,
            description: getField(/Description[:\s]*([^\n]+)/),
            stock: getField(/Stock:\s*[^\d]*(\d+)/),
            retail: retailMatch ? retailMatch[1].replace(/,/g, '') : null,
            promo: promoMatch ? promoMatch[1].replace(/,/g, '') : null,
            wholesale: wholesaleMatch ? wholesaleMatch[1].replace(/,/g, '') : null,
            isActive: /Status:\s*Active/i.test(clean) ? "Active" : "Inactive",
            created: getField(/Created:\s*([^\n]+)/),
            updated: getField(/Updated:\s*([^\n]+)/)
        };

        const historyMatches = [...text.matchAll(/(\d+)\.\s*([^:]+):\s*\$([0-9,.]+)\s*(\[ACTIVE\])?[\s\S]*?(\w+\s+\d+,\s*\d+)/gi)];

        const modeBadgeHTML = hasProduct

    // === MODE: add - Add Confirmation ===
    function buildAddConfirmationHTML(text) {

    // === MODE: update - Update Confirmation ===
    function buildUpdateConfirmationHTML(text) {
        // Only show the success banner if the server response actually confirms an update occurred.
        // Guards against the banner appearing on plain detail views routed through this handler.
        const isConfirmedUpdate = /product updated successfully|updated successfully|update.*success|successfully updated/i.test(text);

        let html = '';

        if (isConfirmedUpdate) {
            let bannerLabel = 'Product Updated Successfully!';
            if (text.includes('Price Added') || /price.*change/i.test(text)) {
                bannerLabel = 'Product Updated Successfully! (Price Changed)';
            }

            html += `<div class="message-success fade-in">`;
            html += `<strong>✅ ${bannerLabel}</strong>`;
            html += `</div>`;

            // New Status and Current Stock are intentionally NOT shown here —
            // they are already visible in the edit form fields below.
        }

        html += buildProductDetailsHTML(text);
        return html;
    }

    // === MODE: price_history ===
    function buildPriceHistoryHTML(text) {
        let html = `<div class="inventory-record fade-in">`;
        html += `<div class="report-title">📈 Price History</div>`;

        const productMatch = text.match(/Product:\s*([^\n]+)/i);
        const skuMatch = text.match(/SKU:\s*([^\n]+)/i);
        const productNumMatch = text.match(/Product#:\s*([^\n]+)/i);
        
        if (productMatch) {
            html += `<div><span class="field-title">🏷️ Product Name:</span> <span class="field-value product-name">${escapeHTML(productMatch[1].replace(/\*\*/g, '').trim())}</span></div>`;
        }
        if (productNumMatch) {
            html += `<div><span class="field-title">🔢 Product Number:</span> <span class="field-value product-num">${escapeHTML(productNumMatch[1].trim())}</span></div>`;
        }
        if (skuMatch) {
            html += `<div style="margin-bottom: 1rem;"><span class="field-title">🔖 SKU:</span> <span class="field-value sku">${escapeHTML(skuMatch[1].trim())}</span></div>`;
        }

        const lines = text.split('\n');
        let inTable = false;
        let headerParsed = false;
        let priceEntries = [];
        
        for (const line of lines) {
            const trimmedLine = line.trim();
            
            if (!trimmedLine) continue;
            
            if (trimmedLine.includes('| Type |') && trimmedLine.includes('Price')) {
                inTable = true;
                continue;
            }
            
            if (inTable && trimmedLine.match(/^\|\s*-+\s*\|/)) {
                headerParsed = true;
                continue;
            }
            
            if (inTable && headerParsed && trimmedLine.startsWith('|') && trimmedLine.endsWith('|')) {
                const cells = trimmedLine.split('|').map(c => c.trim()).filter((c, i, arr) => i > 0 && i < arr.length - 1);
                
                if (cells.length >= 5) {
                    priceEntries.push({
                        type: cells[0] || 'N/A',
                        price: cells[1] ? cells[1].replace(/[$,]/g, '') : '0',
                        from: cells[2] || 'N/A',
                        to: cells[3] || 'Present',
                        isCurrent: (cells[4] || '').toLowerCase() === 'yes'
                    });
                }
            }
        }

        const priceTypes = {};
        priceEntries.forEach(entry => {
            if (!priceTypes[entry.type]) priceTypes[entry.type] = [];
            priceTypes[entry.type].push(entry);
        });

        const typeColors = { 'Retail': '#28a745', 'Promo': '#e91e63', 'Wholesale': '#17a2b8' };

        Object.keys(priceTypes).forEach(type => {
            const entries = priceTypes[type];
            if (entries.length === 0) return;
            
            const color = typeColors[type] || '#0078d7';
            const colorRgb = color === '#28a745' ? '40,167,69' : color === '#e91e63' ? '233,30,99' : '23,162,184';
            
            html += `<div style="margin: 1.5rem 0;">`;
            html += `<div style="font-weight: bold; color: ${color}; padding: 0.5rem; background: rgba(${colorRgb},0.1); border-left: 4px solid ${color}; border-radius: 4px;">💰 ${type} Price History</div>`;
            html += `<div class="price-history" style="border-left-color: ${color};">`;
            
            entries.forEach(entry => {
                html += `<div class="price-history-item ${entry.isCurrent ? 'current' : ''}">`;
                html += `<div style="display: flex; justify-content: space-between; align-items: center;">`;
                html += `<div>`;
                html += `<span style="font-size: 1.2rem; font-weight: bold;">$${entry.price}</span>`;
                if (entry.isCurrent) {
                    html += ` <span class="stock-ok" style="margin-left: 0.5rem;">CURRENT</span>`;
                }
                html += `</div>`;
                html += `<div style="color: #666; font-size: 0.9rem;">${escapeHTML(entry.from)} → ${escapeHTML(entry.to)}</div>`;
                html += `</div></div>`;
            });
            
            html += `</div></div>`;
        });

        if (Object.keys(priceTypes).length === 0) {
            html += `<div class="message-warning">No price history data found.</div>`;
        }

        html += `<div class="create-btn-container" style="margin-top: 1rem;">
            <button class="pf-btn pf-btn-secondary" onclick="goBackHome()">🏠 Back Home</button>
        </div>`;
        html += `</div>`;
        return html;

            if (inTable && trimmedLine.match(/^\|\s*-+\s*\|/)) {

                    const promo = promoStr ? parseFloat(promoStr) : 0;
                    const wholesale = wholesaleStr ? parseFloat(wholesaleStr) : 0;
                    
                    const margin = retail > 0 && wholesale > 0 ? retail - wholesale : 0;
                    const marginPct = retail > 0 && wholesale > 0 ? (margin / retail) * 100 : 0;
                    
                    totalRetail += retail;
                    totalWholesale += wholesale;

                    html += `<tr>

    // === Sync Category Dropdowns ===
    function syncCategoryDropdowns(source) {
        const idSelect = document.getElementById('edit-category-id');
        const numSelect = document.getElementById('edit-category-num');
        const nameSelect = document.getElementById('edit-category-name');
        
        if (!idSelect || !numSelect || !nameSelect) return;
        
        let category = null;
        
        if (source === 'id' && idSelect.value) {
            category = getCategoryById(idSelect.value);
        } else if (source === 'num' && numSelect.value) {
            category = getCategoryByNumber(numSelect.value);
        } else if (source === 'name' && nameSelect.value) {
            category = getCategoryByName(nameSelect.value);
        }
        
        if (category) {
            idSelect.value = category.id;
            numSelect.value = category.number;
            nameSelect.value = category.name;
        }
    }

    // ── Post-render state sync ─────────────────────────────────────────
    // Called immediately after responseBox.innerHTML is set.
    // <script> tags inside innerHTML are NEVER executed by the browser, so
    // we use a hidden data-* sentinel element instead and read it here.
    function _pfPostRenderSetup() {
        const sentinel = document.getElementById('pf_search_init');
        if (!sentinel) return;
        const mode = sentinel.dataset.mode;
        if (mode === 'update') {
            pf_mode = 'update';

    // ── Typeahead Initializer ──────────────────────────────────────────
    function _pfInitTypeahead() {
        const input    = document.getElementById('pf_product_search');
        const wrapper  = document.getElementById('pf_typeahead_wrapper');
        const dropdown = document.getElementById('pf_dropdown');
        if (!input) return;

        input.addEventListener('input', () => {
            const q = input.value.trim();
            clearTimeout(pf_searchDebounceTimer);
            dropdown.innerHTML = '';
            dropdown.classList.remove('visible');
            wrapper.classList.remove('pf-loading');  // hide spinner, show icon (v15c)

            // If user clears the search, go back to Add Mode
            if (q.length === 0 && pf_mode === 'update') {
                _pfClearProduct();
                return;
            }
            if (q.length < 2) return;

            wrapper.classList.add('pf-loading');  // show left spinner, hide icon (v15c)
            pf_searchDebounceTimer = setTimeout(() => _pfSearchProducts(q), 400);
        });

        // Arrow-key navigation + Enter to select
        input.addEventListener('keydown', (e) => {
            const items = dropdown.querySelectorAll('.pf-dropdown-item');
            if (!items.length) return;
            const active = dropdown.querySelector('.pf-dropdown-item.active');
            let idx = Array.from(items).indexOf(active);
            if (e.key === 'ArrowDown') { e.preventDefault(); idx = Math.min(idx + 1, items.length - 1); }
            else if (e.key === 'ArrowUp')   { e.preventDefault(); idx = Math.max(idx - 1, 0); }
            else if (e.key === 'Enter' && active) { e.preventDefault(); active.click(); return; }
            else if (e.key === 'Escape') { dropdown.classList.remove('visible'); return; }
            else return;
            items.forEach(i => i.classList.remove('active'));
            items[idx]?.classList.add('active');
            items[idx]?.scrollIntoView({ block: 'nearest' });
        });

        // Close on outside click
        document.addEventListener('click', (e) => {
            if (!document.getElementById('pf_typeahead_wrapper')?.contains(e.target)) {
                dropdown?.classList.remove('visible');
            }
        }, { capture: true });
    }

    // ── Typeahead search — unified MODE:list path ──────────────────────
    // Sends "Search products by name <query>" → pre-router routes to
    // MODE:list (pageSize 20) → Build SQL Query → sp_products → formatter.
    // Response arrives as [MODE:list] numbered-block markdown; parsed by
    // _pfRenderProductDropdown parser #2.
    // Note: MODE:product_search is retired (Option A unification).
    async function _pfSearchProducts(query) {
        const wrapper  = document.getElementById('pf_typeahead_wrapper');
        const dropdown = document.getElementById('pf_dropdown');
        if (!wrapper || !dropdown) return;

        try {
            const res = await fetch(WEBHOOK_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chatInput: { message: `Search products by name ${query}` },
                    sessionId
                })
            });

            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const data = await res.json();

            const text = typeof data === 'string' ? data
                : (Array.isArray(data) ? data[0]?.output : null)
                || data?.output || data?.response || data?.text || JSON.stringify(data);

            wrapper.classList.remove('pf-loading');   // hide spinner, restore icon (v15c)
            _pfRenderProductDropdown(text, dropdown);
        } catch (err) {
            console.error('Product search failed:', err);
            wrapper.classList.remove('pf-loading');
            if (dropdown) {
                dropdown.innerHTML = `<div class="pf-dropdown-msg" style="color:#dc3545;">⚠️ Search failed. Check console.</div>`;
                dropdown.classList.add('visible');
            }
        }
    }

    // ── Parse Search Response → Dropdown ──────────────────────────────
    // Handles four response shapes (tried in order):
    //   1. JSON array / {products:[]} — raw SP or future direct-JSON path
    //   2. [MODE:list] formatter blocks — **N. Name** (Product ID: uuid)
    //      This is the primary path: typeahead sends "Search products by name X",
    //      pre-router routes to MODE:list, formatter returns numbered bold blocks.
    //   3. Markdown table — | Name | ID | SKU | Category |
    //   4. Inline "Name — (Product ID: uuid)" fallback
    function _pfRenderProductDropdown(text, dropdown) {
        const rows = [];

        // ── 1. Fast-path: JSON / {products:[]} ────────────────────────
        try {
            const parsed = JSON.parse(text);
            const arr = Array.isArray(parsed) ? parsed : parsed?.products || parsed?.data;
            if (Array.isArray(arr)) {
                arr.slice(0, 20).forEach(p => {
                    const id = p.product_id || p.id || '';
                    if (id) rows.push({ id, name: p.name || p.product_name || '', sku: p.sku || '', category: p.category || '' });
                });
            }
        } catch (_) {}

        // ── 2. [MODE:list] formatter output (PRIMARY) ─────────────────
        // Format per product:
        //   **N. Product Name** (Product ID: uuid)
        //      Product#: 138
        //      SKU: ELC-HUB-UC10
        //      Category: Electronics
        //      ...
        if (rows.length === 0) {
            // Split on the numbered bold header that starts each product block
            const blocks = text.split(/(?=\*\*\d+\.)/);
            for (const block of blocks) {
                const headerMatch = block.match(
                    /\*\*\d+\.\s+(.+?)\*\*\s+\(Product ID:\s*([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})\)/i
                );
                if (!headerMatch) continue;
                const name = headerMatch[1].trim();
                const id   = headerMatch[2];
                // "Category:" — careful not to match "Category#:"
                const skuMatch = block.match(/SKU:\s*(\S+)/i);
                const catMatch = block.match(/^\s*Category:\s*([^\n]+)/im);
                rows.push({
                    id,
                    name,
                    sku:      skuMatch ? skuMatch[1].trim() : '',
                    category: catMatch ? catMatch[1].trim() : ''
                });
            }
        }

        // ── 3. Markdown table fallback ────────────────────────────────
        // | Product Name | Product ID | SKU | Category |
        if (rows.length === 0) {
            const lines = text.split('\n');
            let nameCol = -1, idCol = -1, skuCol = -1, catCol = -1, headerFound = false;
            for (const line of lines) {
                if (!line.includes('|')) continue;
                const cells = line.split('|').map(c => c.trim()).filter((c, i, a) => i > 0 && i < a.length - 1);
                if (cells.length === 0) continue;
                if (!headerFound) {
                    const lower = cells.map(c => c.toLowerCase());
                    nameCol = lower.findIndex(c => c.includes('name'));
                    idCol   = lower.findIndex(c => c.includes('id'));
                    skuCol  = lower.findIndex(c => c.includes('sku'));
                    catCol  = lower.findIndex(c => c.includes('category'));
                    if (nameCol >= 0 || idCol >= 0) { headerFound = true; }
                    continue;
                }
                if (/^[\s|:-]+$/.test(line)) continue;
                const uuidRe = /[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}/i;
                let uuid = '';
                if (idCol >= 0) uuid = (cells[idCol] || '').match(uuidRe)?.[0] || '';
                if (!uuid) {
                    for (const c of cells) { const m = c.match(uuidRe); if (m) { uuid = m[0]; break; } }
                }
                if (!uuid) continue;
                const name = nameCol >= 0 ? cells[nameCol] : cells.find(c => c && !uuidRe.test(c) && !/^\d+$/.test(c) && !/^[-|]+$/.test(c)) || '';
                rows.push({
                    id: uuid,
                    name: name.replace(/\*\*/g, ''),
                    sku: skuCol >= 0 ? cells[skuCol] || '' : '',
                    category: catCol >= 0 ? cells[catCol] || '' : ''
                });
            }
        }

        // ── 4. "Name — (Product ID: uuid)" inline fallback ────────────
        if (rows.length === 0) {
            const re = /([A-Za-z][A-Za-z0-9 ,.'&()\-]{1,60}?)\s*[—–|-]\s*\(?(?:Product ID:\s*)?([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})\)?/gi;
            for (const m of text.matchAll(re)) rows.push({ id: m[2], name: m[1].trim(), sku: '', category: '' });
        }

        if (rows.length === 0) {
            dropdown.innerHTML = `<div class="pf-dropdown-msg">No products found. Try a different search.</div>`;
            dropdown.classList.add('visible');
            return;
        }

        dropdown.innerHTML = rows.slice(0, 20).map(r => `
            <div class="pf-dropdown-item"
                data-id="${escapeHTML(r.id)}"
                data-name="${escapeHTML(r.name)}"
                data-sku="${escapeHTML(r.sku)}"
                data-category="${escapeHTML(r.category)}">
                <div class="prod-name">${escapeHTML(r.name)}</div>
                <div class="prod-sub">${r.id}${r.sku ? ' · SKU: ' + r.sku : ''}${r.category ? ' · ' + r.category : ''}</div>
            </div>
        `).join('');
        dropdown.classList.add('visible');

        dropdown.querySelectorAll('.pf-dropdown-item').forEach(item => {
            item.addEventListener('click', () => {
                dropdown.classList.remove('visible');
                _pfSelectProduct(item.dataset.id, item.dataset.name, item.dataset.sku, item.dataset.category);
            });
        });
    }

    // ── Product Selected → Switch to Update Mode ───────────────────────
    async function _pfSelectProduct(id, name, sku, category) {
        pf_selectedProduct = { id, name, sku };
        pf_mode = 'update';

        // Show chip + loading state
        _pfShowProductChip(name, id, sku);
        _pfSetModeBadge('update');

        // Show loading overlay on form
        const formCard = document.querySelector('#pf_unified_root .pf-card:last-of-type');
        if (formCard) {
            formCard.style.opacity = '0.5';
            formCard.style.pointerEvents = 'none';
        }

        // Fetch full product details
        try {
            const res = await fetch(WEBHOOK_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chatInput: { message: `Show product details for ${id}` },
                    sessionId
                })
            });

            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const data = await res.json();
            const text = typeof data === 'string' ? data
                : (Array.isArray(data) ? data[0]?.output : null)
                || data?.output || data?.response || data?.text || '';

            _pfPopulateFormFromText(text, id);
        } catch (err) {
            console.error('Fetch product details failed:', err);
            // Still switch to Update Mode with available data
            _pfPopulateFormFromText('', id);
        } finally {
            if (formCard) {
                formCard.style.opacity = '';
                formCard.style.pointerEvents = '';
            }
        }
    }

    // ── Parse detail text → populate form fields in-place ─────────────
    function _pfPopulateFormFromText(text, productId) {
        const clean = text.replace(/\*\*/g, '');
        const getField = (re) => { const m = clean.match(re); return m ? m[1].trim() : ''; };

        // Extract fields
        let name = getField(/Product Name[:\s]+([^\n]+)/i) || getField(/^([^\n\[*]+)\n+Product ID:/im) || '';
        const sku = getField(/SKU[:\s]+([^\n|]+)/i);
        const category = getField(/Category[:\s]+([^\n]+)/i);
        const categoryNum = getField(/Category#[:\s]+([^\n]+)/i);
        const categoryId = getField(/Category ID[:\s]+([a-f0-9-]+)/i);
        const retail = getField(/Retail[:\s]+\$?([0-9,.]+)/i).replace(/,/g,'');
        const promo  = getField(/Promo[:\s]+\$?([0-9,.]+)/i).replace(/,/g,'');
        const wholesale = getField(/Wholesale[:\s]+\$?([0-9,.]+)/i).replace(/,/g,'');
        const stock  = getField(/Stock[:\s]+[^\d]*(\d+)/i);
        const description = getField(/Description[:\s]+([^\n]+)/i);
        const status  = /Status[:\s]*Active/i.test(clean) ? 'Active' : (/Status[:\s]*Inactive/i.test(clean) ? 'Inactive' : 'Active');
        const created = getField(/Created[:\s]+([^\n]+)/i);
        const updated = getField(/Updated[:\s]+([^\n]+)/i);

        // Set form field values
        const setVal = (id, val) => { const el = document.getElementById(id); if (el && val) el.value = val; };

        setVal('edit-name', name);
        setVal('edit-sku', sku);
        setVal('edit-retail-price', retail);
        setVal('edit-promo-price', promo);
        setVal('edit-wholesale-price', wholesale);
        setVal('edit-stock', stock);
        setVal('edit-description', description);
        setVal('edit-status', status);

        // Category dropdowns
        const catEl = document.getElementById('edit-category-name');
        const catNumEl = document.getElementById('edit-category-num');
        const catIdEl = document.getElementById('edit-category-id');
        if (categoryId && catIdEl) { catIdEl.value = categoryId; syncCategoryDropdowns('id'); }
        else if (categoryNum && catNumEl) { catNumEl.value = categoryNum; syncCategoryDropdowns('num'); }
        else if (category && catEl) { catEl.value = category; syncCategoryDropdowns('name'); }

        // Update form header to show we're editing
        const cardTitle = document.querySelector('#pf_unified_root .pf-card:last-of-type .pf-card-title');
        const cardSub   = document.querySelector('#pf_unified_root .pf-card:last-of-type .pf-card-subtitle');
        if (cardTitle) cardTitle.innerHTML = '<span>✎</span> Edit Product';
        if (cardSub) cardSub.textContent = `Editing: ${name || pf_selectedProduct?.name || 'Product'}`;

        // Update the Product ID read-only field
        const idValEl = document.querySelector('#pf_unified_root .field-value.product-id.pf-mono');
        if (idValEl) idValEl.textContent = productId;

        // Swap action footer buttons
        _pfUpdateActionBar(productId);
    }

    // =========================================================================
    // === DIRECT FORM SUBMIT — v11.0 ==========================================
    // Bypasses AI Agent entirely. Sends structured JSON to pre-router which
    // routes directly to Build SQL Query → sp_products stored procedure.
    // Mirrors order_direct_operation / context pattern from order_v5.
    // =========================================================================

    // ── Shared async handler ─────────────────────────────────────────────────
    async function _pfDirectOperation(productData, opLabel) {
        // 1. Show loading overlay on the form card
        const formRoot = document.getElementById('pf_unified_root');
        const submitBtn = formRoot
            ? formRoot.querySelector('.pf-actions .pf-btn-save:last-of-type')
            : null;

        if (submitBtn) {
            submitBtn.disabled = true;
            submitBtn.dataset._origText = submitBtn.innerHTML;
            submitBtn.innerHTML = `<span class="pf-spinner"></span> ${opLabel}`;
        }

        const overlayCard = formRoot
            ? formRoot.querySelector('.pf-card:last-of-type')
            : null;
        if (overlayCard) {
            overlayCard.style.opacity    = '0.6';
            overlayCard.style.pointerEvents = 'none';
        }

        try {
            // 2. POST structured payload — pre-router detects 'product_direct_operation'
            //    and routes by productData.context without touching the AI Agent.
            const res = await fetch(WEBHOOK_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    sessionId,
                    chatInput: {
                        message:     'product_direct_operation',  // ← pre-router trigger
                        productData                               // ← structured payload
                    }
                })
            });

            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const data = await res.json();

            // 3. Extract text from whatever shape the SP returns
            const text = typeof data === 'string' ? data
                : (Array.isArray(data) ? data[0]?.output : null)
                || data?.output || data?.response || data?.text
                || JSON.stringify(data);

            // 4. Display confirmation in the response box
            responseBox.innerHTML = buildProductResponseHTML(text);

        } catch (err) {
            console.error(`_pfDirectOperation error [${opLabel}]:`, err);
            responseBox.innerHTML = buildErrorHTML(
                `❌ ${opLabel} failed — ${err.message}. Check console for details.`
            );
        } finally {
            // 5. Restore button / overlay regardless of success/failure
            if (submitBtn) {
                submitBtn.disabled  = false;
                submitBtn.innerHTML = submitBtn.dataset._origText || opLabel;
                delete submitBtn.dataset._origText;
            }
            if (overlayCard) {
                overlayCard.style.opacity      = '';
                overlayCard.style.pointerEvents = '';
            }
        }
    }

    // === Voice Input ===
    let recognition = null;
    let isListening = false;
    let voiceInputBaseline = '';
    let voiceFinalTranscript = '';
    
    function toggleVoiceInput() {
        if (isListening) {
            stopVoiceInput();
        } else {
            startVoiceInput();
        }
    }
    
    function startVoiceInput() {
        if (!recognition) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            
            if (!SpeechRecognition) {
                alert('Speech recognition is not supported in your browser. Please use Chrome, Edge, or Safari.');
                return;
            }
            
            recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = 'en-US';
            
            recognition.onresult = (event) => {
                let interimTranscript = '';
                let newFinalTranscript = '';
                
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    const transcript = event.results[i][0].transcript;
                    if (event.results[i].isFinal) {
                        newFinalTranscript += transcript + ' ';
                    } else {
                        interimTranscript += transcript;
                    }
                }
                
                if (newFinalTranscript) {
                    voiceFinalTranscript += newFinalTranscript;
                }
                
                const input = document.getElementById('message');
                input.value = voiceInputBaseline + voiceFinalTranscript + interimTranscript;
            };
            
            recognition.onerror = (event) => {
                console.error('Speech recognition error:', event.error);
                if (event.error === 'not-allowed' || event.error === 'permission-denied') {
                    alert('Microphone permission denied. Please allow microphone access in your browser settings.');
                }
                stopVoiceInput();
            };
            
            recognition.onend = () => {
                if (isListening) {
                    try {
                        recognition.start();
                    } catch (e) {
                        console.log('Recognition restart failed');
                        stopVoiceInput();
                    }
                }
            };
        }
        
        const input = document.getElementById('message');
        voiceInputBaseline = input.value;
        voiceFinalTranscript = '';
        
        try {
            recognition.start();
            isListening = true;
            
            document.getElementById('voiceBtn').classList.add('listening');
            document.getElementById('voiceStatus').classList.add('active');
            
            console.log('🎤 Voice input started');
            
            const handleTextareaClick = () => {
                if (isListening) stopVoiceInput();
            };
            
            const handleTextareaInput = () => {
                if (isListening) stopVoiceInput();
            };
            
            input.addEventListener('click', handleTextareaClick, { once: true });
            input.addEventListener('input', handleTextareaInput, { once: true });
            input.addEventListener('keydown', handleTextareaInput, { once: true });
            
            input._voiceClickHandler = handleTextareaClick;
            input._voiceInputHandler = handleTextareaInput;
            
        } catch (error) {
            console.error('Error starting voice input:', error);
        }
    }

    function stopVoiceInput() {
        if (recognition) {
            try {
                recognition.stop();
            } catch (e) {
                console.log('Recognition already stopped');
            }
        }
        
        isListening = false;
        
        document.getElementById('voiceBtn').classList.remove('listening');
        document.getElementById('voiceStatus').classList.remove('active');
        
        const input = document.getElementById('message');
        if (input._voiceClickHandler) {
            input.removeEventListener('click', input._voiceClickHandler);
            input.removeEventListener('input', input._voiceInputHandler);
            input.removeEventListener('keydown', input._voiceInputHandler);
            delete input._voiceClickHandler;
            delete input._voiceInputHandler;
        }
        
        voiceInputBaseline = '';
        voiceFinalTranscript = '';
        
        console.log('🎤 Voice input stopped');
    }
</script>
