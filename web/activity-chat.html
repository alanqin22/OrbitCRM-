<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>Activity Management - CRM AI Agent</title>
    <!-- 
      ACTIVITY MANAGEMENT SYSTEM v5.0 - FULL-PAGE WORKFLOW
      
      CHANGELOG v5.0:
      - Removed "Need anything else? Just ask!" footer block from all pages
      - [ACTION:] and [CREATEFORM:] markers suppressed in renderMarkdown
      - Added Back Home button (green, matching unified-action-btn style) to all views
      - Activity List: beautiful Inter font title, smaller meta line (Time/Page/Total), Back Home top & bottom
      - Activity Detail: Back Home + Back to List side-by-side at page end
      - Timeline, Overdue, Upcoming, Summary, Create Form, Update Form: Back Home added
      - Added CSS classes: .activity-title, .mode-title, .activity-meta, .back-home-btn, .back-home-btns
      
      CHANGELOG v3.0:
      - Activity ID column replaced with "Details" button in list/overdue/upcoming tables
      - Score column moved immediately before Details button
      - Full activity_id preserved for stored procedure calls
      - Footer actions now clickable: first 3 call AI Agent, "Log a call or email" opens Create Form
      - Details button calls AI Agent with full activity_id
      - [DETAILS:uuid], [ACTION:text], [CREATEFORM:text] markers parsed from Format Response
      
      FEATURES:
      - ✅ Full-page activity details view with related entity info
      - ✅ List → Details (read-only) → Update Form workflow
      - ✅ Unified Create Form supports all activity types
      - ✅ Timeline view with unified events (activities, orders, invoices, payments)
      - ✅ Overdue and Upcoming activity views
      - ✅ Activity Summary statistics
      - ✅ Voice input enabled
      - ✅ Quick action buttons for common operations
      - ✅ Details buttons with full activity_id for stored procedure
      - ✅ Clickable footer actions
      
      SUPPORTED MODES (16 - Unified):
      - list: Paginated activity listing with search/filters
      - get: Single activity details
      - create: Create activity (unified)
      - log_call: Log a call (wrapper for create)
      - log_email: Log an email (wrapper for create)
      - schedule_meeting: Schedule a meeting (wrapper for create)
      - create_task: Create a task (wrapper for create)
      - add_note: Add a note (wrapper for create)
      - update: Update activity (PATCH-style)
      - complete: Mark activity complete (wrapper for update)
      - reopen: Reopen activity (wrapper for update)
      - delete: Delete activity
      - timeline: Unified timeline events
      - overdue: Overdue activities
      - upcoming: Upcoming activities
      - summary: Activity summary statistics
      
      BACKEND: n8n Workflow + PostgreSQL 17
      API ENDPOINT: 'https://orbitcrm-production.up.railway.app/activity-chat';
    -->
    <style>
        /* ========================================================
           HOMEPAGE ZONES v6.0 — 4-Zone Dashboard Layout
           ======================================================== */

        /* Zone 1 — Live Status Strip — 128px cards (20% narrower than 160px green buttons) */
        .stat-strip {
            display: flex;
            justify-content: center;
            gap: 0.65rem;
            margin: 1rem auto 0;
            max-width: 580px;
            flex-wrap: nowrap;
        }
        .stat-card {
            background: rgba(255,255,255,0.10);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid rgba(255,255,255,0.18);
            border-radius: 8px;
            padding: 0.38rem 0.4rem;
            text-align: center;
            cursor: pointer;
            transition: transform 0.18s, box-shadow 0.18s, background 0.18s;
            width: 128px;
            flex: none;
        }
        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 18px rgba(0,0,0,0.35);
            background: rgba(255,255,255,0.16);
        }
        .stat-card-value {
            font-size: 1.05rem;
            font-weight: 700;
            line-height: 1;
            margin-bottom: 0.1rem;
        }
        .stat-card-label {
            font-size: 0.58rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            opacity: 0.82;
        }
        .stat-card-icon {
            font-size: 0.78rem;
            margin-bottom: 0.1rem;
            display: block;
        }
        .stat-card.overdue  { border-color: rgba(255,90,90,0.45);  }
        .stat-card.overdue .stat-card-value  { color: #ff6b6b; }
        .stat-card.pending  { border-color: rgba(255,180,50,0.45); }
        .stat-card.pending  .stat-card-value  { color: #ffd166; }
        .stat-card.upcoming { border-color: rgba(80,180,255,0.45); }
        .stat-card.upcoming .stat-card-value { color: #74c0fc; }
        .stat-card.done     { border-color: rgba(80,230,160,0.45); }
        .stat-card.done     .stat-card-value { color: #69db7c; }
        .stat-card-value.loading-val {
            opacity: 0.35;
            animation: pulse-opacity 1.2s ease-in-out infinite;
        }
        @keyframes pulse-opacity {
            0%, 100% { opacity: 0.25; }
            50%       { opacity: 0.6; }
        }

        /* Zone 2 — Primary Actions (green, equal-width, matches unified-action-btn) */
        .primary-actions {
            display: flex;
            justify-content: center;
            gap: 0.65rem;
            margin: 1rem auto 0;
            max-width: 860px;
            flex-wrap: wrap;
        }
        .primary-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
            width: 160px;
            height: 40px;
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 0.82rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(40,167,69,0.4), 0 0 15px rgba(32,201,151,0.3);
            transition: all 0.3s ease;
            white-space: nowrap;
            text-align: center;
        }
        .primary-btn:hover {
            background: linear-gradient(135deg, #218838 0%, #1ba67a 100%);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(40,167,69,0.6), 0 0 25px rgba(32,201,151,0.5);
        }
        .primary-btn:active { transform: translateY(0); }

        /* Zone 3 — Quick Create Bar */
        .quick-create-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.55rem;
            margin: 0.85rem auto 0;
            max-width: 860px;
            flex-wrap: wrap;
        }
        .qc-label {
            font-size: 0.78rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.07em;
            color: rgba(255,255,255,0.5);
            margin-right: 0.15rem;
        }
        .qc-chip {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            padding: 0.42rem 1rem;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 50px;
            color: rgba(255,255,255,0.9);
            font-size: 0.88rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.15s, border-color 0.15s, transform 0.12s;
            white-space: nowrap;
        }
        .qc-chip .chip-icon {
            font-size: 1.25rem;
            line-height: 1;
        }
        .qc-chip:hover {
            background: rgba(255,255,255,0.16);
            border-color: rgba(255,255,255,0.4);
            transform: translateY(-1px);
        }
        .qc-chip.dev-chip {
            border-color: rgba(100,180,255,0.35);
            color: rgba(160,210,255,0.85);
        }
        .qc-chip.dev-chip:hover {
            background: rgba(100,180,255,0.12);
            border-color: rgba(100,180,255,0.55);
        }

        /* ── Google-Style Activity Search ─────────────────────── */
        .gs-search-section {
            margin-bottom: 1.4rem;
        }
        .gs-search-section h4 {
            font-size: 0.8rem;
            font-weight: 600;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin: 0 0 0.75rem 0;
        }
        /* Row 1: keyword + type + search button */
        .gs-row1 {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        .gs-keyword-wrap {
            position: relative;
            width: 420px;
            flex-shrink: 1;
        }
        .gs-keyword-icon {
            position: absolute;
            left: 0.9rem;
            top: 50%;
            transform: translateY(-50%);
            color: #9aa0a6;
            font-size: 1rem;
            pointer-events: none;
        }
        .gs-keyword-input {
            width: 100%;
            padding: 0.65rem 1rem 0.65rem 2.5rem;
            border: 1.5px solid #dfe1e5;
            border-radius: 24px;
            font-size: 0.9rem;
            background: #fff;
            box-sizing: border-box;
            transition: border-color 0.2s, box-shadow 0.2s;
            color: #202124;
        }
        .gs-keyword-input:focus {
            outline: none;
            border-color: #4285f4;
            box-shadow: 0 1px 6px rgba(32,33,36,0.18);
        }
        .gs-type-select {
            padding: 0.62rem 0.75rem;
            border: 1.5px solid #dfe1e5;
            border-radius: 8px;
            font-size: 0.85rem;
            background: #fff;
            color: #202124;
            cursor: pointer;
            transition: border-color 0.2s;
            min-width: 120px;
        }
        .gs-type-select:focus { outline: none; border-color: #4285f4; }
        .gs-search-btn {
            padding: 0.62rem 1.2rem;
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: bold;
            cursor: pointer;
            white-space: nowrap;
            box-shadow: 0 2px 6px rgba(40,167,69,0.35);
            transition: all 0.2s;
        }
        .gs-search-btn:hover {
            background: linear-gradient(135deg, #218838 0%, #1ba67a 100%);
            box-shadow: 0 4px 12px rgba(40,167,69,0.5);
        }
        /* Row 2: date filters */
        .gs-row2 {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 0.55rem;
            flex-wrap: wrap;
        }
        .gs-date-label {
            font-size: 0.78rem;
            color: #5f6368;
            font-weight: 500;
        }
        .gs-date-input {
            padding: 0.42rem 0.65rem;
            border: 1.5px solid #dfe1e5;
            border-radius: 6px;
            font-size: 0.82rem;
            color: #202124;
            background: #fff;
            cursor: pointer;
            transition: border-color 0.2s;
        }
        .gs-date-input:focus { outline: none; border-color: #4285f4; }
        .gs-date-sep {
            font-size: 0.78rem;
            color: #9aa0a6;
        }
        .gs-clear-dates {
            font-size: 0.75rem;
            color: #1a73e8;
            background: none;
            border: none;
            cursor: pointer;
            padding: 0.2rem 0.4rem;
            text-decoration: underline;
            transition: color 0.15s;
        }
        .gs-clear-dates:hover { color: #1557b0; }
        /* Filter summary pill */
        .gs-filter-summary {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
            margin-top: 0.55rem;
            flex-wrap: wrap;
        }
        .gs-filter-pill {
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
            padding: 0.2rem 0.65rem;
            background: #e8f0fe;
            border-radius: 12px;
            font-size: 0.75rem;
            color: #1a73e8;
            font-weight: 500;
        }
        /* Results list */
        .gs-results {
            margin-top: 0.75rem;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            background: #fff;
            overflow: hidden;
        }
        .gs-results-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem 0.9rem;
            background: #f8f9fa;
            border-bottom: 1px solid #e9ecef;
            font-size: 0.78rem;
            color: #5f6368;
            font-weight: 500;
        }
        .gs-result-item {
            display: flex;
            align-items: flex-start;
            gap: 0.7rem;
            padding: 0.65rem 0.9rem;
            border-bottom: 1px solid #f1f3f5;
            cursor: pointer;
            transition: background 0.12s;
        }
        .gs-result-item:last-child { border-bottom: none; }
        .gs-result-item:hover { background: #f0fff4; }
        .gs-result-icon { font-size: 1.15rem; padding-top: 1px; flex-shrink: 0; }
        .gs-result-body { flex: 1; min-width: 0; }
        .gs-result-subject {
            font-size: 0.88rem;
            font-weight: 600;
            color: #1a73e8;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 2px;
        }
        .gs-result-meta {
            font-size: 0.75rem;
            color: #5f6368;
        }
        .gs-result-meta span { margin-right: 0.5rem; }
        .gs-no-results {
            padding: 1.2rem;
            text-align: center;
            font-size: 0.85rem;
            color: #9aa0a6;
        }
        .gs-searching {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 1rem;
            font-size: 0.85rem;
            color: #5f6368;
        }
        .gs-spinner {
            width: 16px; height: 16px;
            border: 2px solid #ddd;
            border-top-color: #28a745;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            display: inline-block;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Owner Typeahead Dropdown */
        .owner-field-wrap {
            position: relative;
        }
        .owner-search-input {
            width: 100%;
            padding: 0.45rem 2rem 0.45rem 0.75rem;
            border: 1.5px solid #ced4da;
            border-radius: 6px;
            font-size: 0.88rem;
            background: #fff;
            box-sizing: border-box;
            transition: border-color 0.2s, box-shadow 0.2s;
            color: #202124;
        }
        .owner-search-input:focus {
            outline: none;
            border-color: #20c997;
            box-shadow: 0 0 0 3px rgba(32,201,151,0.12);
        }
        .owner-search-input.has-error {
            border-color: #dc3545;
        }
        .owner-dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: #fff;
            border: 1px solid #dee2e6;
            border-radius: 6px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.12);
            z-index: 300;
            max-height: 200px;
            overflow-y: auto;
            display: none;
        }
        .owner-dropdown.open { display: block; }
        .owner-opt {
            padding: 0.45rem 0.75rem;
            font-size: 0.85rem;
            color: #212529;
            cursor: pointer;
            border-bottom: 1px solid #f8f9fa;
            transition: background 0.1s;
        }
        .owner-opt:last-child { border-bottom: none; }
        .owner-opt:hover, .owner-opt.highlighted { background: #f0fff4; }
        .owner-opt-role {
            font-size: 0.72rem;
            color: #868e96;
            margin-left: 0.4rem;
        }
        .owner-no-match {
            padding: 0.5rem 0.75rem;
            font-size: 0.82rem;
            color: #9aa0a6;
            font-style: italic;
        }
        .owner-hidden { display: none; }

        /* Zone divider */
        .zone-divider {
            border: none;
            border-top: 1px solid rgba(255,255,255,0.07);
            margin: 1rem auto;
            max-width: 860px;
        }

        /* Dev mode toggle */
        .dev-toggle {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            font-size: 0.72rem;
            color: rgba(255,255,255,0.3);
            cursor: pointer;
            border: none;
            background: transparent;
            margin-top: 0.6rem;
            transition: color 0.15s;
        }
        .dev-toggle:hover { color: rgba(255,255,255,0.6); }
        .dev-section {
            display: none;
            margin-top: 0.6rem;
            padding: 0.6rem 1rem;
            background: rgba(0,0,0,0.25);
            border: 1px dashed rgba(255,255,255,0.15);
            border-radius: 8px;
            max-width: 860px;
            margin-left: auto;
            margin-right: auto;
        }
        .dev-section.visible { display: block; }

        /* === Galaxy Background === */
        .galaxy-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
            background: radial-gradient(ellipse at center, #1a0933 0%, #0a0118 100%);
        }
        
        .galaxy-background::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(ellipse at 30% 40%, rgba(255, 20, 147, 0.4) 0%, transparent 40%),
                radial-gradient(ellipse at 70% 60%, rgba(0, 191, 255, 0.4) 0%, transparent 40%),
                radial-gradient(ellipse at 50% 50%, rgba(138, 43, 226, 0.3) 0%, transparent 50%);
            animation: galaxy-rotate 120s linear infinite;
        }
        
        .galaxy-background::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(2px 2px at 20% 30%, white, transparent),
                radial-gradient(2px 2px at 60% 70%, white, transparent),
                radial-gradient(1px 1px at 50% 50%, white, transparent),
                radial-gradient(1px 1px at 80% 10%, white, transparent),
                radial-gradient(2px 2px at 90% 60%, white, transparent),
                radial-gradient(1px 1px at 33% 50%, white, transparent),
                radial-gradient(1px 1px at 66% 33%, white, transparent);
            background-size: 200% 200%, 200% 200%, 300% 300%, 250% 250%, 200% 200%, 280% 280%, 220% 220%;
            background-position: 0% 0%, 100% 100%, 50% 50%, 80% 20%, 10% 90%, 40% 60%, 70% 30%;
            animation: stars-twinkle 8s ease-in-out infinite;
        }
        
        .nebula-cloud {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.6;
            animation: nebula-float 20s ease-in-out infinite;
        }
        
        .nebula-cloud:nth-child(1) {
            top: 10%;
            left: 20%;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(255, 20, 147, 0.6) 0%, transparent 70%);
            animation-delay: 0s;
        }
        
        .nebula-cloud:nth-child(2) {
            top: 50%;
            right: 15%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(0, 191, 255, 0.5) 0%, transparent 70%);
            animation-delay: -7s;
        }
        
        .nebula-cloud:nth-child(3) {
            bottom: 15%;
            left: 35%;
            width: 450px;
            height: 450px;
            background: radial-gradient(circle, rgba(138, 43, 226, 0.5) 0%, transparent 70%);
            animation-delay: -14s;
        }
        
        @keyframes galaxy-rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        @keyframes stars-twinkle {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        @keyframes nebula-float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -30px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
        }
        
        /* === Base Layout === */
        body {
            font-family: "Segoe UI", Tahoma, sans-serif;
            background: transparent;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            position: relative;
        }
        
        header {
            background: linear-gradient(135deg, rgba(0, 120, 215, 0.95) 0%, rgba(88, 86, 214, 0.95) 100%);
            color: white;
            padding: 0.5rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 20px rgba(138, 43, 226, 0.5);
            backdrop-filter: blur(10px);
            position: relative;
            z-index: 10;
        }
        
        header h1 { 
            font-size: 1.2rem; 
            font-weight: bold; 
            margin: 0;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5), 0 0 40px rgba(138, 43, 226, 0.5);
        }
        
        .session-info { font-size: 0.8rem; display: flex; align-items: center; gap: 0.5rem; }
        .session-info button {
            background: #fff; color: #0078d7; border: none; border-radius: 4px;
            padding: 0.25rem 0.5rem; cursor: pointer; font-size: 0.7rem; font-weight: bold;
        }
        .session-info button:hover { background: #cce0ff; }

        .response {
            flex: 1; 
            overflow-y: auto; 
            padding: 1rem; 
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(138, 43, 226, 0.3);
            position: relative;
            z-index: 5;
        }

        /* === Input Bar === */
        .input-bar {
            display: flex;
            flex-direction: column;
            padding: 0.2rem 1rem;
            background: linear-gradient(180deg, rgba(200, 150, 255, 0.25) 0%, rgba(150, 220, 255, 0.25) 100%);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(200, 150, 255, 0.4);
            position: relative;
            z-index: 10;
        }
        
        .input-bar form {
            display: flex;
            flex-direction: row;
            align-items: center;
            position: relative;
            width: 100%;
        }
        
        .search-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            width: 1.5rem;
            height: 1.5rem;
            color: #666;
            pointer-events: none;
            z-index: 2;
            transition: color 0.3s ease;
        }
        
        .search-icon svg {
            width: 100%;
            height: 100%;
            display: block;
        }
        
        .input-wrapper {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
        }
        
        textarea {
            flex: 1;
            width: 100%;
            padding: 0.5rem 3rem 0.5rem 3.5rem;
            border: 1px solid rgba(200, 150, 255, 0.4);
            border-radius: 24px;
            font-family: monospace;
            resize: none;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(5px);
            box-shadow: 0 1px 6px rgba(138, 43, 226, 0.2);
            transition: all 0.3s ease;
            height: 1.5rem;
        }
        
        textarea:hover {
            height: 2.5rem;
            box-shadow: 0 2px 8px rgba(138, 43, 226, 0.3);
        }
        
        textarea:focus {
            height: 2.5rem;
            outline: none;
            box-shadow: 0 2px 12px rgba(138, 43, 226, 0.5);
            border-color: rgba(138, 43, 226, 0.6);
        }
        
        button.send { display: none; }

        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Voice Input Button */
        .voice-btn-google {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: none;
            background: #f1f3f4;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            color: #5f6368;

        .voice-btn-google:hover {

            color: #202124;

        .voice-btn-google.listening {
            background: #d93025;
            color: white;
            animation: pulse-mic 1.5s ease-in-out infinite;

        @keyframes pulse-mic {
            0%, 100% { transform: translateY(-50%) scale(1); box-shadow: 0 0 0 0 rgba(217, 48, 37, 0.4); }

        .voice-status {

        /* === Quick Actions Button Styling === */
        .unified-action-btn {
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);

            border: none;
            padding: 0.45rem 1rem;
            font-size: 0.82rem;

            width: 160px;
            height: 40px;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;

        .unified-action-btn:hover {
            background: linear-gradient(135deg, #218838 0%, #1ba67a 100%);
            transform: translateY(-2px);

        .action-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 0.75rem;
            padding-top: 0.75rem;
            border-top: 1px solid #e0e6ed;

        /* Record styling */
        .audit-record {
            border: 2px solid #0078d7;
            background: #f4f9ff;
            border-radius: 8px;
            padding: 1rem;
            margin: 1rem 0;
        }

        .success-record {
            border: 2px solid #28a745;
            background: #f0fff4;
            border-radius: 8px;
            padding: 1rem;
            margin: 1rem 0;
        }

        .error-record {
            border: 2px solid #dc3545;
            background: #fff3f3;
            border-radius: 8px;
            padding: 1rem;
            margin: 1rem 0;
        }

        .warning-record {
            border: 2px solid #fd7e14;
            background: #fff8e6;
            border-radius: 8px;
            padding: 1rem;
            margin: 1rem 0;
        }

        /* Loading indicator */
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #e0e6ed;
            border-top-color: #0078d7;
            border-radius: 50%;

        }

        /* Keyboard shortcut styling */
        kbd {
            background: #fff;
            padding: 2px 6px;
            border: 1px solid #ccc;
            border-radius: 3px;
            font-family: monospace;
            font-size: 0.85em;

        /* Create/Update Form Styling */
        .create-form {
            background: #f9fbfd;
            border: 2px solid #0078d7;
            border-radius: 8px;
            padding: 1.5rem;
            margin: 1rem 0;
        }

            margin: 0 0 1rem 0;
            color: #0078d7;
        }
        
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1rem;
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }
        
        .form-group label {
            font-weight: 600;
            font-size: 0.9rem;
            color: #333;
        }
        
        .form-group input,
        .form-group select,
        .form-group textarea.form-textarea {
            padding: 0.5rem;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 0.95rem;

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea.form-textarea:focus {
            border-color: #0078d7;

            box-shadow: 0 0 3px rgba(0, 120, 215, 0.3);

        .form-section {

            padding-top: 1rem;
            border-top: 1px solid #e0e6ed;

        .form-section h4 {

        }

            grid-column: 1 / -1;
        }
        
        .form-row-wide input,
        .form-row-wide textarea.form-textarea {
            width: 100%;
        }

        /* Fade in animation */
        .fade-in {
            animation: fadeIn 0.5s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* === Activity Card Styling === */
        .activity-card {
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 6px;
            padding: 1rem 1.25rem;
            padding-bottom: 0.75rem;

        .activity-card .card-line {
            margin: 0.5rem 0;
            font-size: 0.9rem;

        }
        
        .activity-card .card-line .separator {

        .activity-card .card-line-timestamps {

        }
        
        .activity-card .field-label {
            color: #666;
            font-weight: 500;
            margin-right: 0.5rem;
        }
        
        .activity-card .field-value {
            font-weight: 600;
            margin-right: 0.25rem;
        }
        
        .activity-card .field-value.subject { color: #0078d7; }
        .activity-card .field-value.id { color: #d17b00; font-size: 0.85em; font-family: monospace; }
        .activity-card .field-value.type { color: #6f42c1; }
        .activity-card .field-value.related { color: #e83e8c; }
        .activity-card .field-value.due { color: #17a2b8; }
        .activity-card .field-value.completed { color: #28a745; }
        .activity-card .field-value.direction { color: #fd7e14; }
        
        .activity-card .card-actions-bottom-right {
            display: flex;
            justify-content: flex-end;
            gap: 0.5rem;
            margin-top: 0.6rem;
        }
        
        .activity-card .card-actions-bottom-right .unified-action-btn {
            width: auto;
            padding: 0.4rem 1rem;
            font-size: 0.8rem;
            height: 36px;
        }

        /* === Full-Page Activity Details View === */
        .activity-360-fullpage {
            background: #fff;
            border-radius: 12px;
            padding: 1.5rem 2rem;
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);

        .activity-360-header {

            align-items: flex-start;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid #0078d7;
        }
        
        .activity-360-title {
            font-size: 1.5rem;
            font-weight: bold;
            color: #0078d7;
            margin: 0;
        }
        
        .activity-360-subtitle {
            font-size: 0.95rem;
            color: #666;
            margin: 0.25rem 0 0 0;
        }
        
        .activity-360-actions {
            display: flex;
            gap: 0.5rem;
        }
        
        .activity-360-section {
            margin-bottom: 1.5rem;
        }
        
        .activity-360-section h4 {
            font-size: 1rem;
            font-weight: 600;
            color: #333;
            margin: 0 0 0.75rem 0;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid #e0e6ed;
        }
        
        .activity-360-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 0.75rem 1.5rem;
        }
        
        .activity-360-field {

        }
        
        .activity-360-field .label {

            color: #888;

        }
        
        .activity-360-field .value {

            color: #333;
            font-weight: 600;
            margin-top: 0.1rem;
        }
        
        .activity-360-field .value.highlight { color: #0078d7; }
        .activity-360-field .value.type { color: #6f42c1; font-size: 1.1rem; }
        .activity-360-field .value.completed { color: #28a745; }

        /* Type Badge Styling */
        .type-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.35rem 0.75rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }
        
        .type-badge.call { background: #e3f2fd; color: #1976d2; }
        .type-badge.email { background: #fff3e0; color: #f57c00; }
        .type-badge.meeting { background: #e8f5e9; color: #388e3c; }
        .type-badge.task { background: #fce4ec; color: #c2185b; }
        .type-badge.note { background: #f3e5f5; color: #7b1fa2; }

        /* Direction Badge */
        .direction-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            padding: 0.25rem 0.5rem;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 500;
        }
        
        .direction-badge.inbound { background: #e8f5e9; color: #2e7d32; }
        .direction-badge.outbound { background: #e3f2fd; color: #1565c0; }

        /* Timeline Styling */
        .timeline-container {
            position: relative;
            padding-left: 2rem;
            margin-top: 1rem;
        }
        
        .timeline-container::before {
            content: '';
            position: absolute;
            left: 0.5rem;
            top: 0;
            bottom: 0;
            width: 2px;
            background: linear-gradient(to bottom, #0078d7, #28a745);
        }
        
        .timeline-item {
            position: relative;
            margin-bottom: 1.25rem;
            padding-left: 1.5rem;
            background: #fff;
            border: 1px solid #e0e6ed;
            border-radius: 8px;
            padding: 1rem;
            padding-left: 1.5rem;
        }
        
        .timeline-item::before {
            content: '';
            position: absolute;
            left: -2rem;
            top: 1.2rem;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #0078d7;
            border: 2px solid white;
            box-shadow: 0 0 0 2px #0078d7;
        }
        
        .timeline-item.activity::before { background: #6f42c1; box-shadow: 0 0 0 2px #6f42c1; }
        .timeline-item.order::before { background: #fd7e14; box-shadow: 0 0 0 2px #fd7e14; }
        .timeline-item.invoice::before { background: #17a2b8; box-shadow: 0 0 0 2px #17a2b8; }
        .timeline-item.payment::before { background: #28a745; box-shadow: 0 0 0 2px #28a745; }
        
        .timeline-item .timeline-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }
        
        .timeline-item .timeline-title {
            font-weight: 600;
            color: #333;
        }
        
        .timeline-item .timeline-time {
            font-size: 0.8rem;
            color: #888;
        }
        
        .timeline-item .timeline-details {
            font-size: 0.9rem;
            color: #555;
        }

        /* Summary Cards */
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
            margin: 1rem 0;
        }
        
        .summary-card {
            background: white;
            border-radius: 10px;
            padding: 1.25rem;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            border-left: 4px solid #0078d7;
        }
        
        .summary-card .summary-value {
            font-size: 2rem;
            font-weight: 700;
            color: #0078d7;
        }
        
        .summary-card .summary-label {
            font-size: 0.85rem;
            color: #666;
            margin-top: 0.25rem;
        }
        
        .summary-card.completed { border-left-color: #28a745; }
        .summary-card.completed .summary-value { color: #28a745; }
        
        .summary-card.pending { border-left-color: #fd7e14; }
        .summary-card.pending .summary-value { color: #fd7e14; }
        
        .summary-card.overdue { border-left-color: #dc3545; }
        .summary-card.overdue .summary-value { color: #dc3545; }

        /* Type Stats */
        .type-stats {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            margin: 1rem 0;
        }
        
        .type-stat {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: #f8f9fa;
            border-radius: 20px;

        .type-stat .icon {
            font-size: 1.1rem;

        .type-stat .count {

            color: #333;
        }

        /* Overdue/Upcoming Table */
        .activities-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 0.75rem;

        .activities-table th,
        .activities-table td {
            padding: 0.75rem 1rem;
            text-align: left;
            border-bottom: 1px solid #e0e6ed;

            font-weight: 600;

        }
        
        .activities-table tr:last-child td {
            border-bottom: none;

        .activities-table tr:hover {
            background: #f8f9ff;
        }
        
        /* ========================================================================
           MARKDOWN RENDERING STYLES (v2.0)
           Beautiful styling for markdown tables, lists, and formatted content
           ======================================================================== */
        
        /* Markdown Table Container */
        .md-table-container {
            overflow-x: auto;
            margin: 1rem 0;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        
        /* Markdown Table */
        .md-table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            font-size: 0.9rem;
        }
        
        .md-table th {
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            padding: 0.75rem 1rem;
            text-align: left;
            font-weight: 600;
            color: #333;
            border-bottom: 2px solid #dee2e6;

        }
        
        .md-table td {
            padding: 0.65rem 1rem;
            border-bottom: 1px solid #e9ecef;
            color: #555;
        }
        
        .md-table tbody tr:hover {
            background: #f8f9ff;
        }
        
        .md-table tbody tr:last-child td {
            border-bottom: none;
        }
        
        /* Markdown Headers */
        .md-h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: #0078d7;
            margin: 1.5rem 0 1rem 0;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid #0078d7;
        }
        
        .md-h2 {
            font-size: 1.25rem;
            font-weight: 600;
            color: #0078d7;
            margin: 1.25rem 0 0.75rem 0;
        }
        
        .md-h3 {
            font-size: 1.1rem;
            font-weight: 600;
            color: #333;
            margin: 1rem 0 0.5rem 0;
        }
        
        /* Markdown Paragraphs */
        .md-p {
            margin: 0.5rem 0;
            line-height: 1.6;
            color: #444;
        }
        
        /* Markdown Code */
        .md-code {
            background: #f4f4f4;
            padding: 0.15rem 0.4rem;
            border-radius: 4px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 0.9em;

        /* Markdown List */
        .md-list {
            margin: 0.75rem 0;

        .md-list li:hover {
            color: #0078d7;
            cursor: pointer;
        }
        
        /* Footer Action Buttons (clickable action items) */
        .footer-action {
            transition: all 0.2s ease;
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
        }
        
        .footer-action:hover {
            background: #e8f4fd;

        .days-badge {

            font-weight: 600;

        /* Quick Examples Row */
        .quick-examples {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            justify-content: center;
            margin: 1rem 0;
            padding: 0.75rem;
            background: rgba(0, 120, 215, 0.05);

            background: white;
            border: 1px solid #ddd;
            border-radius: 20px;

            font-size: 0.8rem;
            color: #555;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .quick-example:hover {
            background: #0078d7;

        /* Pagination */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
            margin-top: 1.5rem;

    // Live owners list — populated by loadOwners() on form open; falls back to OWNERS_FALLBACK
    let _owners = [];

    /**
     * loadOwners — fetches live owner list via "get owners:" → pre-router → sp_activities(get_owners).
     *
     * ROOT CAUSE NOTE (fixed v10):
     *   The n8n webhook Format Response node returns an ARRAY envelope:
     *     [{output, owners, success, mode, reportMode}]
     *   Previous code read `data.owners` treating `data` as the object — always undefined.
     *   Fix: unwrap `Array.isArray(data) ? data[0] : data` before reading `.owners`.
     *
     * @param {Function} callback — called with the final owner array when ready
     */
    function loadOwners(callback) {
        fetch(API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ chatInput: { message: 'get owners:' }, sessionId })
        })
        .then(r => r.json())
        .then(data => {
            // ── Unwrap n8n array envelope ──────────────────────────────────────
            // Format Response returns: [{output, owners[], success, mode, reportMode}]
            // Normalise to the inner object regardless of whether it's wrapped or not.
            const envelope = Array.isArray(data) ? data[0] : data;

            // owners[] is emitted directly by Format Response v3.3 get_owners block
            const raw = (envelope && envelope.owners) || [];

            if (Array.isArray(raw) && raw.length > 0) {
                // SP already sorts by last_name/first_name; re-sort here as defensive measure
                _owners = raw
                    .filter(o => o.is_active !== false)
                    .sort((a, b) => {
                        const la = (a.last_name  || '').toLowerCase();
                        const lb = (b.last_name  || '').toLowerCase();
                        const fa = (a.first_name || '').toLowerCase();
                        const fb = (b.first_name || '').toLowerCase();
                        return la !== lb ? la.localeCompare(lb) : fa.localeCompare(fb);
                    });
                console.log('[loadOwners] Live owners loaded from DB:', _owners.length);
            } else {
                console.warn('[loadOwners] Empty/unexpected response — using fallback dataset');
                _owners = OWNERS_FALLBACK;
            }
            callback(_owners);
        })
        .catch(err => {
            // n8n offline or network error — silently use fallback, no UI disruption
            console.warn('[loadOwners] Fetch failed (n8n offline?) — using fallback dataset');
            _owners = OWNERS_FALLBACK;
            callback(_owners);
        });
    }

    /**
     * buildOwnerWidget — renders the owner typeahead input + hidden UUID field into the
     * given container element. Pre-selects owner by UUID if preselectedId is provided.

     * @param {string} containerId   — id of the wrapper div
     * @param {string} inputId       — id for the visible text input
     * @param {string} hiddenId      — id for the hidden UUID field
     * @param {string} [preselectedId] — UUID to pre-select (update form)
     */
    function buildOwnerWidget(containerId, inputId, hiddenId, preselectedId) {
        const container = document.getElementById(containerId);
        if (!container) return;

        // Pre-select display name
        let preselectedName = '';
        if (preselectedId && _owners.length > 0) {
            const match = _owners.find(o => o.owner_id === preselectedId);
            if (match) preselectedName = match.first_name + ' ' + match.last_name;
        }

        container.innerHTML = `
            <div class="owner-field-wrap">
                <input type="text"
                       id="${inputId}"
                       class="owner-search-input"
                       placeholder="Search owner name…"
                       value="${escapeHTML(preselectedName)}"
                       autocomplete="off"
                       oninput="filterOwnerDropdown('${inputId}','${hiddenId}')"
                       onfocus="openOwnerDropdown('${inputId}')"
                       onblur="setTimeout(()=>closeOwnerDropdown('${inputId}'),160)"
                       onkeydown="ownerKeyNav(event,'${inputId}','${hiddenId}')">
                <input type="hidden" id="${hiddenId}" value="${escapeHTML(preselectedId || '')}">
                <div class="owner-dropdown" id="${inputId}-dd"></div>
            </div>`;
    }

    /** Populate dropdown with filtered owner list */
    function openOwnerDropdown(inputId) {
        const input = document.getElementById(inputId);
        if (!input) return;
        filterOwnerDropdown(inputId, inputId.replace('-name', '-id'));
    }

    function filterOwnerDropdown(inputId, hiddenId) {
        const input  = document.getElementById(inputId);
        const dd     = document.getElementById(inputId + '-dd');
        if (!input || !dd) return;
        const q = input.value.toLowerCase().trim();

        const filtered = q
            ? _owners.filter(o =>
                (o.first_name + ' ' + o.last_name).toLowerCase().includes(q) ||
                (o.role || '').toLowerCase().includes(q))
            : _owners;

        if (filtered.length === 0) {
            dd.innerHTML = `<div class="owner-no-match">No owners match "${escapeHTML(q)}"</div>`;
        } else {
            dd.innerHTML = filtered.map((o, i) => `
                <div class="owner-opt" data-uuid="${escapeHTML(o.owner_id)}"
                     onmousedown="selectOwner('${inputId}','${hiddenId}','${escapeHTML(o.owner_id)}','${escapeHTML(o.first_name + ' ' + o.last_name)}')">
                    ${escapeHTML(o.first_name)} ${escapeHTML(o.last_name)}
                    <span class="owner-opt-role">${escapeHTML(o.role || '')}</span>
                </div>`).join('');
        }
        dd.classList.add('open');
    }

    function selectOwner(inputId, hiddenId, uuid, displayName) {
        const input  = document.getElementById(inputId);
        const hidden = document.getElementById(hiddenId);
        if (input)  input.value  = displayName;
        if (hidden) hidden.value = uuid;
        closeOwnerDropdown(inputId);
        // Remove any error styling
        if (input) input.classList.remove('has-error');
    }

    function closeOwnerDropdown(inputId) {
        const dd = document.getElementById(inputId + '-dd');
        if (dd) dd.classList.remove('open');
    }

    /** Arrow-key + Enter navigation */
    function ownerKeyNav(e, inputId, hiddenId) {
        const dd = document.getElementById(inputId + '-dd');
        if (!dd) return;
        const opts = dd.querySelectorAll('.owner-opt');
        const cur  = dd.querySelector('.owner-opt.highlighted');
        if (e.key === 'ArrowDown') {
            e.preventDefault();
            const next = cur ? (cur.nextElementSibling || opts[0]) : opts[0];
            if (cur) cur.classList.remove('highlighted');
            if (next) next.classList.add('highlighted');
        } else if (e.key === 'ArrowUp') {
            e.preventDefault();
            const prev = cur ? (cur.previousElementSibling || opts[opts.length - 1]) : opts[opts.length - 1];
            if (cur) cur.classList.remove('highlighted');
            if (prev) prev.classList.add('highlighted');
        } else if (e.key === 'Enter' && cur) {
            e.preventDefault();
            selectOwner(inputId, hiddenId, cur.dataset.uuid, cur.textContent.split('\n')[0].trim());
        } else if (e.key === 'Escape') {
            closeOwnerDropdown(inputId);
        }
    }

    // ========================================================================
    // UTILITY FUNCTIONS
    // ========================================================================
    
    function escapeHTML(str) {
        if (!str) return '';
        return String(str)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#039;');
    }

    function formatDateTime(value) {
        if (!value) return 'N/A';
        const d = new Date(value);
        if (isNaN(d.getTime())) return 'N/A';
        return d.toLocaleString('en-US', {
            year: 'numeric',
            month: 'short',
            day: 'numeric',
            hour: '2-digit',
            minute: '2-digit'
        });
    }

    function formatDate(value) {
        if (!value) return 'N/A';
        const d = new Date(value);
        if (isNaN(d.getTime())) return 'N/A';
        return d.toLocaleDateString('en-US', {
            year: 'numeric',
            month: 'short',
            day: 'numeric'
        });
    }

    function truncateUuid(uuid) {
        if (!uuid) return 'N/A';
        const str = uuid.toString();
        return str.length > 8 ? `${str.substring(0, 8)}...` : str;
    }

    function getTypeBadge(type) {
        const badges = {
            call: '<span class="type-badge call">📞 Call</span>',
            email: '<span class="type-badge email">📧 Email</span>',
            meeting: '<span class="type-badge meeting">🤝 Meeting</span>',
            task: '<span class="type-badge task">✅ Task</span>',
            note: '<span class="type-badge note">📝 Note</span>'
        };
        return badges[type] || `<span class="type-badge">${escapeHTML(type)}</span>`;
    }

    function getTypeIcon(type) {
        const icons = { call: '📞', email: '📧', meeting: '🤝', task: '✅', note: '📝' };
        return icons[type] || '•';
    }

    function getDirectionBadge(direction) {
        if (!direction) return '';
        if (direction === 'inbound') {
            return '<span class="direction-badge inbound">← Inbound</span>';
        } else if (direction === 'outbound') {
            return '<span class="direction-badge outbound">→ Outbound</span>';
        }
        return `<span class="direction-badge">${escapeHTML(direction)}</span>`;
    }

    function getDaysBadge(days, type) {
        if (type === 'overdue') {
            return `<span class="days-badge overdue">${days} days overdue</span>`;
        } else {
            if (days === 0) return '<span class="days-badge today">TODAY</span>';
            if (days === 1) return '<span class="days-badge tomorrow">TOMORROW</span>';
            return `<span class="days-badge upcoming">${days} days</span>`;
        }
    }

    /**
     * sendStructured — Direct SP path (bypasses AI Agent via pre-router)
     * Sends a structured chatInput object with a trigger-prefix message.
     * The pre-router detects the prefix and routes straight to Build SQL Query.
     *
     * @param {Object} chatInputObj  — must include `message` (the trigger prefix)
     *                                 plus any SP params as additional properties
     * @param {Function} [callback] — optional; if supplied, response goes here
     *                                 instead of the responseArea (silent mode)
     */
    async function sendStructured(chatInputObj, callback = null) {
        if (!callback) {
            hideQuickUI();
            const responseArea = document.getElementById('responseArea');
            responseArea.innerHTML = '<div style="text-align:center;padding:2rem;"><div class="loading"></div><p style="margin-top:1rem;color:#666;">Processing…</p></div>';
        }
        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chatInput: chatInputObj, sessionId })
            });
            const data = await response.json();
            if (callback) {
                callback(data);
            } else {
                handleResponse(data);
            }
        } catch (error) {
            if (callback) {
                // Silent path (fetchStatsSilent) — n8n offline, stats unavailable, no console noise
                callback(null);
            } else {
                console.error('[sendStructured] Error:', error);
                document.getElementById('responseArea').innerHTML = `
                    <div class="error-record">
                        <h3>❌ Connection Error</h3>
                        <p>Failed to connect to the Activity API.</p>
                        <p><strong>Error:</strong> ${escapeHTML(error.message)}</p>
                        <p>Please ensure the n8n workflow is running at: <code>${API_URL}</code></p>
                    </div>`;
            }
        }
    }

    /**
     * fetchStatsSilent — loads activity summary on page load to populate Zone 1 stat cards.
     * Never touches responseArea — purely updates the 4 stat card values.
     */
    function fetchStatsSilent() {
        sendStructured({ message: 'activity summary:' }, function(data) {
            // data is null when n8n is offline — silently show dash, no ? marks
            if (!data) {
                ['stat-overdue','stat-pending','stat-upcoming','stat-completed'].forEach(id => {
                    const el = document.getElementById(id);
                    if (el) { el.textContent = '—'; el.classList.remove('loading-val'); }
                });
                return;
            }
            let summary = null;
            if (data.summary) summary = data.summary;
            else if (data.output) {
                try { const m = data.output.match(/\{[\s\S]*\}/); if (m) summary = JSON.parse(m[0]).summary; } catch(e) {}
            }
            if (!summary) {
                ['stat-overdue','stat-pending','stat-upcoming','stat-completed'].forEach(id => {
                    const el = document.getElementById(id);
                    if (el) { el.textContent = '—'; el.classList.remove('loading-val'); }
                });
                return;
            }
            const counts = summary.counts || {};
            const setVal = (id, val) => {
                const el = document.getElementById(id);
                if (el) { el.textContent = (val != null && val !== '') ? val : '0'; el.classList.remove('loading-val'); }
            };
            setVal('stat-overdue',   counts.overdue    ?? 0);
            setVal('stat-pending',   counts.pending    ?? 0);
            setVal('stat-upcoming',  summary.this_week ?? 0);
            setVal('stat-completed', counts.completed  ?? 0);
        });
    }

    async function sendMessage(event) {
        event.preventDefault();
        const messageBox = document.getElementById('message');
        const message = messageBox.value.trim();
        
        if (!message) return false;
        
        hideQuickUI();
        const responseArea = document.getElementById('responseArea');
        responseArea.innerHTML = '<div style="text-align: center; padding: 2rem;"><div class="loading"></div><p style="margin-top: 1rem; color: #666;">Processing your request...</p></div>';
        
        try {
            // Send via chatInput envelope so pre-router v2.0 can inspect structured props
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chatInput: { message },
                    sessionId
                })
            });
            
            const data = await response.json();
            handleResponse(data);
        } catch (error) {
            console.error('Error:', error);
            responseArea.innerHTML = `
                <div class="error-record">
                    <h3>❌ Connection Error</h3>
                    <p>Failed to connect to the Activity API.</p>
                    <p><strong>Error:</strong> ${escapeHTML(error.message)}</p>
                    <p>Please ensure the n8n workflow is running at: <code>${API_URL}</code></p>
                </div>
            `;
        }
        
        messageBox.value = '';
        return false;
    }

    function handleResponse(data) {
        const responseArea = document.getElementById('responseArea');
        
        // Check if we have formatted output from the n8n workflow
        if (data.output) {
            // Render markdown-style output
            responseArea.innerHTML = `<div class="fade-in">${renderMarkdown(data.output)}</div>`;
            return;
        }
        
        // Handle raw JSON responses
        if (data.metadata) {
            if (data.metadata.status === 'error') {
                responseArea.innerHTML = `
                    <div class="error-record fade-in">
                        <h3>❌ Error</h3>
                        <p><strong>Code:</strong> ${data.metadata.code}</p>
                        <p><strong>Message:</strong> ${escapeHTML(data.metadata.message)}</p>
                    </div>
                `;
                return;
            }
        }
        
        // Handle different response types
        if (data.activities) {
            renderActivityList(data);
        } else if (data.activity) {
            renderActivityDetail(data.activity);
        } else if (data.timeline) {
            renderTimeline(data.timeline);
        } else if (data.overdue) {
            renderOverdue(data.overdue);
        } else if (data.upcoming) {
            renderUpcoming(data.upcoming);
        } else if (data.summary) {
            renderSummary(data.summary);
        } else {
            // Generic JSON display
            responseArea.innerHTML = `
                <div class="audit-record fade-in">
                    <h3>📄 Response</h3>
                    <pre style="white-space: pre-wrap; word-break: break-word;">${JSON.stringify(data, null, 2)}</pre>
                </div>
            `;
        }
    }

    // ========================================================================
    // ENHANCED MARKDOWN RENDERING (v2.0)
    // Properly handles tables, headers, lists, and formatted content
    // ========================================================================
    
    function renderMarkdown(text) {
        const lines = text.split('\n');
        let html = '';
        let inTable = false;
        let tableHeaders = [];
        let tableRows = [];
        let inList = false;
        let listItems = [];
        
        for (let i = 0; i < lines.length; i++) {
            const line = lines[i];
            const trimmed = line.trim();
            
            // [ACTION:text] and [CREATEFORM:text] markers are suppressed — replaced by Back Home buttons
            if (trimmed.match(/^\[ACTION:[^\]]+\]$/) || trimmed.match(/^\[CREATEFORM:[^\]]+\]$/)) {
                continue;
            }
            
            // Suppress "Need anything else" footer prompts
            if (trimmed.toLowerCase().includes('need anything else') || trimmed.toLowerCase().includes('just ask')) {
                continue;
            }
            
            // Handle table separator line (skip it but mark we're in table body)
            if (trimmed.match(/^\|[\s-:|]+\|$/)) {
                inTable = true;
                continue;
            }
            
            // Handle table header row (first pipe-delimited row before separator)
            if (trimmed.startsWith('|') && trimmed.endsWith('|') && !inTable) {
                tableHeaders = trimmed.split('|').filter(c => c.trim()).map(c => c.trim());
                inTable = 'header';
                continue;
            }
            
            // Handle table data rows
            if (trimmed.startsWith('|') && trimmed.endsWith('|') && inTable) {
                tableRows.push(trimmed.split('|').filter(c => c.trim()).map(c => c.trim()));
                continue;
            }
            
            // End of table - render it
            if (inTable && !trimmed.startsWith('|') && (tableHeaders.length > 0 || tableRows.length > 0)) {
                html += renderMarkdownTable(tableHeaders, tableRows);
                tableHeaders = [];
                tableRows = [];
                inTable = false;
            }
            
            // Handle bullet list items
            if (trimmed.startsWith('• ') || trimmed.startsWith('* ') || trimmed.startsWith('- ')) {
                if (!inList) {
                    inList = true;
                    listItems = [];
                }
                const itemText = trimmed.replace(/^[•*-]\s*/, '');
                listItems.push(parseMarkdownInline(itemText));
                continue;
            }
            
            // End of list - render it
            if (inList && !trimmed.startsWith('• ') && !trimmed.startsWith('* ') && !trimmed.startsWith('- ')) {
                html += '<ul class="md-list">' + listItems.map(item => `<li>${item}</li>`).join('') + '</ul>';
                listItems = [];
                inList = false;
            }
            
            // Headers
            if (trimmed.startsWith('### ')) {
                html += `<h3 class="md-h3">${parseMarkdownInline(trimmed.replace(/^###\s*/, ''))}</h3>`;
                continue;
            }
            if (trimmed.startsWith('## ')) {
                html += `<h2 class="md-h2">${parseMarkdownInline(trimmed.replace(/^##\s*/, ''))}</h2>`;
                continue;
            }
            if (trimmed.startsWith('# ')) {
                html += `<h1 class="md-h1">${parseMarkdownInline(trimmed.replace(/^#\s*/, ''))}</h1>`;
                continue;
            }
            
            // Horizontal rule
            if (trimmed === '---' || trimmed === '***' || trimmed === '___') {
                html += '<hr class="md-hr">';
                continue;
            }
            
            // Empty line
            if (!trimmed) {
                html += '<div class="md-spacer"></div>';
                continue;
            }
            
            // Regular paragraph
            html += `<p class="md-p">${parseMarkdownInline(trimmed)}</p>`;
        }
        
        // Handle remaining table at end of text
        if (tableHeaders.length > 0 || tableRows.length > 0) {
            html += renderMarkdownTable(tableHeaders, tableRows);
        }
        
        // Handle remaining list at end of text
        if (listItems.length > 0) {
            html += '<ul class="md-list">' + listItems.map(item => `<li>${item}</li>`).join('') + '</ul>';
        }
        
        return html + `<div class="back-home-btns"><button class="back-home-btn" onclick="showQuickUI()">🏠 Back Home</button></div>`;
    }
    
    function parseMarkdownInline(text) {
        if (!text) return '';
        return text
            .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
            .replace(/_([^_]+)_/g, '<em>$1</em>')
            .replace(/`([^`]+)`/g, '<code class="md-code">$1</code>');
    }
    
    function renderMarkdownTable(headers, rows) {
        if (headers.length === 0 && rows.length === 0) return '';
        
        let html = '<div class="md-table-container"><table class="md-table">';
        
        // Render headers
        if (headers.length > 0) {
            html += '<thead><tr>';
            headers.forEach(h => {
                html += `<th>${parseMarkdownInline(h)}</th>`;
            });
            html += '</tr></thead>';
        }
        
        // Render body
        if (rows.length > 0) {
            html += '<tbody>';
            rows.forEach(row => {
                html += '<tr>';
                row.forEach(cell => {
                    // Check for Details button marker [DETAILS:uuid]
                    const detailsMatch = cell.match(/^\[DETAILS:([^\]]+)\]$/);
                    if (detailsMatch) {
                        const activityId = detailsMatch[1];
                        if (activityId && activityId !== '') {
                            html += `<td><button class="unified-action-btn" style="width: auto; min-width: 85px; height: 30px; font-size: 0.75rem; padding: 0.25rem 0.75rem; white-space: nowrap;" onclick="viewActivityDetail('${escapeHTML(activityId)}')" title="View details (ID: ${escapeHTML(activityId)})">📄 Details</button></td>`;
                        } else {
                            html += '<td>N/A</td>';
                        }
                    } else {
                        html += `<td>${parseMarkdownInline(cell)}</td>`;
                    }
                });
                html += '</tr>';
            });
            html += '</tbody>';
        }
        
        html += '</table></div>';
        return html;
    }

    /**
     * Parse the markdown table from the format-response `output` string.
     * Columns (from format response): Type | Subject | Owner | Due Date | Created | Related | Related Type | Score | Details
     * Returns array of activity objects compatible with selectGsResult().
     */
    function parseMarkdownActivities(outputStr) {
        if (!outputStr || typeof outputStr !== 'string') return [];
        const results = [];
        const lines = outputStr.split('\n');
        let inTable = false;
        let headers = [];

        for (const raw of lines) {
            const line = raw.trim();
            // Detect header row
            if (!inTable && line.startsWith('|') && line.includes('Subject') && line.includes('Type')) {
                headers = line.split('|').map(h => h.trim().toLowerCase()).filter(Boolean);
                inTable = true;
                continue;
            }
            // Skip separator row
            if (inTable && line.match(/^\|[\s\-:|]+\|$/)) continue;
            // Parse data rows
            if (inTable && line.startsWith('|') && line.endsWith('|')) {
                const cells = line.split('|').map(c => c.trim()).filter((c, i, a) => i > 0 && i < a.length - 1);
                if (cells.length < 4) continue;

                const get = (key) => {
                    const idx = headers.indexOf(key);
                    return idx >= 0 && idx < cells.length ? cells[idx] : '';
                };

                // Strip emoji + bold markdown from type and subject
                const rawType    = get('type').replace(/\*\*/g, '').replace(/✅|📞|📧|🤝|📝/g, '').trim().toLowerCase();
                const rawSubject = get('subject').replace(/\*\*/g, '').trim();

                // Extract activity_id from [DETAILS:uuid]
                const detailsCell = get('details');
                const uuidMatch   = detailsCell.match(/\[DETAILS:([0-9a-f\-]{36})\]/i);
                const activityId  = uuidMatch ? uuidMatch[1] : '';

                if (!activityId) continue; // skip rows without valid UUID

                results.push({
                    activity_id:  activityId,
                    type:         rawType,
                    subject:      rawSubject,
                    owner:        get('owner'),
                    due_date:     get('due date'),
                    related_name: get('related'),
                    related_type: get('related type'),
                    score:        get('score')
                });
            } else if (inTable && !line.startsWith('|')) {
                inTable = false; // table ended
            }
        }
        return results;
    }

    async function runGsSearch() {
        const keyword = (document.getElementById('gs-keyword')?.value || '').trim();
        const type    = document.getElementById('gs-type')?.value    || '';
        const start   = document.getElementById('gs-start')?.value   || '';
        const end     = document.getElementById('gs-end')?.value     || '';

        buildGsFilterSummary();

        const panel = document.getElementById('gs-results-panel');
        if (!panel) return;
        panel.innerHTML = `<div class="gs-searching"><span class="gs-spinner"></span> Searching…</div>`;

        // Build params — AND logic: all filters applied together
        const params = { message: 'list activities:', pageSize: 20, includeCompleted: true };
        if (keyword) params.search   = keyword;
        if (type)    params.type     = type;     // pre-router passes to SP p_type filter
        if (start)   params.dateFrom = start;
        if (end)     params.dateTo   = end;

        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chatInput: params, sessionId })
            });
            const data = await response.json();

            // ── Resolve activities from all possible response shapes ──────────
            // Shape 1: direct JSON  → data.activities[]
            // Shape 2: format-resp  → data.output (markdown table string)
            let activities = [];
            if (Array.isArray(data.activities) && data.activities.length > 0) {
                activities = data.activities;
            } else if (data.output && typeof data.output === 'string') {
                activities = parseMarkdownActivities(data.output);
            }

            _gsResults = activities;
            renderGsResults(activities, keyword, type, start, end);

        } catch (e) {
            panel.innerHTML = `<div class="gs-no-results">⚠️ Could not reach the API. Please ensure n8n is running.</div>`;
        }
    }

    function renderGsResults(activities, keyword, type, start, end) {
        const panel = document.getElementById('gs-results-panel');
        if (!panel) return;

        if (activities.length === 0) {
            panel.innerHTML = `<div class="gs-results"><div class="gs-no-results">No activities found for the current filters.</div></div>`;
            return;
        }

        const countLabel = `${activities.length} result${activities.length !== 1 ? 's' : ''}`;
        const rows = activities.map((a, i) => `
            <div class="gs-result-item" onclick="selectGsResult(${i})">
                <span class="gs-result-icon">${getTypeIcon(a.type)}</span>
                <div class="gs-result-body">
                    <div class="gs-result-subject">${escapeHTML(a.subject || '(no subject)')}</div>
                    <div class="gs-result-meta">
                        <span>${escapeHTML(a.type || '')}</span>
                        ${a.related_name ? `<span>· ${escapeHTML(a.related_name)}</span>` : ''}
                        ${a.related_type ? `<span>(${escapeHTML(a.related_type)})</span>` : ''}
                        ${a.due_date     ? `<span>· Due ${escapeHTML(a.due_date)}</span>` : ''}
                        ${a.owner        ? `<span>· ${escapeHTML(a.owner)}</span>` : ''}
                    </div>
                </div>
            </div>`).join('');

        panel.innerHTML = `
            <div class="gs-results">
                <div class="gs-results-header">
                    <span>${countLabel}</span>
                    <span style="color:#9aa0a6;font-size:0.72rem;">Click a result to load it into the form below</span>
                </div>
                ${rows}
            </div>`;
    }

    function selectGsResult(index) {
        const activity = _gsResults[index];
        if (!activity) return;

        currentEditingActivity = activity;

        // Unlock form
        const fields = document.getElementById('update-form-fields');
        if (fields) { fields.style.opacity = '1'; fields.style.pointerEvents = 'auto'; }

        // Populate scalar fields
        const set = (id, val) => { const el = document.getElementById(id); if (el) el.value = val || ''; };
        set('update-id',          activity.activity_id || '');
        set('update-type',        activity.type        || '');
        set('update-subject',     activity.subject     || '');
        set('update-description', activity.description || '');

        // due_date: may come as "Feb 25, 2026" (formatted) or ISO — normalize to YYYY-MM-DD
        let dueDateVal = '';
        if (activity.due_date) {
            const parsed = new Date(activity.due_date);
            if (!isNaN(parsed.getTime())) dueDateVal = parsed.toISOString().split('T')[0];
            else dueDateVal = activity.due_date;
        }
        set('update-dueDate', dueDateVal);

        const dirEl  = document.getElementById('update-direction');
        if (dirEl)  dirEl.value = activity.direction || '';
        const chanEl = document.getElementById('update-channel');
        if (chanEl) chanEl.value = activity.channel || '';
        const compEl = document.getElementById('update-completed');
        if (compEl) compEl.checked = !!activity.completed_at;

        // Re-mount owner widget — pre-select by owner_id from the selected activity.
        // The activity.owner from the search result is a display name (e.g. "Steven Brahms")
        // but activity.owner_id may be absent in list rows. Try to resolve UUID from display name
        // via _owners fallback if needed.
        let resolvedOwnerId = activity.owner_id || '';
        if (!resolvedOwnerId && activity.owner && _owners.length > 0) {
            const match = _owners.find(o =>
                (o.first_name + ' ' + o.last_name).toLowerCase() === activity.owner.toLowerCase()
            );
            if (match) resolvedOwnerId = match.owner_id;
        }
        buildOwnerWidget('update-owner-widget', 'update-owner-name', 'update-owner-uuid', resolvedOwnerId);

        // Enable Save
        const saveBtn = document.getElementById('update-save-btn');
        if (saveBtn) { saveBtn.disabled = false; saveBtn.style.opacity = '1'; saveBtn.style.cursor = 'pointer'; }

        // Scroll to the form
        if (fields) fields.scrollIntoView({ behavior: 'smooth', block: 'start' });

        // Highlight selected row
        document.querySelectorAll('.gs-result-item').forEach((el, i) => {
            el.style.background  = i === index ? '#f0fff4' : '';
            el.style.borderLeft  = i === index ? '3px solid #28a745' : '';
            el.style.paddingLeft = i === index ? 'calc(0.9rem - 3px)' : '';
        });
    }
