    // ========================================================================
    // SUBMIT FUNCTIONS
    // ========================================================================
    
    function submitCreateActivity() {
        const relatedType = document.getElementById('create-relatedType').value;
        const relatedId   = document.getElementById('create-relatedId').value.trim();
        const type        = document.getElementById('create-type').value;
        const subject     = document.getElementById('create-subject').value.trim();
        const description = document.getElementById('create-description').value.trim();
        const dueDate     = document.getElementById('create-dueDate').value;
        const direction   = document.getElementById('create-direction').value;
        const channel     = document.getElementById('create-channel').value;
        // Owner: read from hidden UUID field populated by owner typeahead widget
        const ownerId     = (document.getElementById('create-owner-uuid')?.value || '').trim();

        // Validation
        if (!relatedType) { alert('Related Type is required!'); return; }
        if (!relatedId)   { alert('Related ID is required!'); return; }
        if (!type)        { alert('Activity Type is required!'); return; }
        if (type !== 'note' && !subject)  { alert('Subject is required for this activity type!'); return; }
        if (type === 'note' && !description) { alert('Description is required for notes!'); return; }
        if (!validateOwner('create-owner-name', 'create-owner-uuid')) {
            alert('Owner is required. Please select an owner from the dropdown.');
            return;
        }

        // ── DIRECT SP PATH — no AI Agent involved ──────────────────
        const chatInputObj = { message: 'create activity:' };
        chatInputObj.relatedType = relatedType;
        chatInputObj.relatedId   = relatedId;
        chatInputObj.type        = type;
        if (subject)     chatInputObj.subject     = subject;
        if (description) chatInputObj.description = description;
        if (dueDate)     chatInputObj.dueDate      = dueDate;
        if (direction)   chatInputObj.direction    = direction;
        if (channel)     chatInputObj.channel      = channel;
        chatInputObj.ownerId = ownerId; // always include (required)

        sendStructured(chatInputObj);
    }

    function submitUpdateActivity() {
        const activityId  = document.getElementById('update-id').value.trim();
        const subject     = document.getElementById('update-subject').value.trim();
        const description = document.getElementById('update-description').value.trim();
        const dueDate     = document.getElementById('update-dueDate').value;
        const direction   = document.getElementById('update-direction').value;
        const channel     = document.getElementById('update-channel').value;
        // Owner: read from hidden UUID field populated by owner typeahead widget
        const ownerId     = (document.getElementById('update-owner-uuid')?.value || '').trim();
        const completed   = document.getElementById('update-completed').checked;

        if (!activityId) { alert('Please select an activity to update using the search above.'); return; }
        if (!validateOwner('update-owner-name', 'update-owner-uuid')) {
            alert('Owner is required. Please select an owner from the dropdown.');
            return;
        }

        // ── DIRECT SP PATH — no AI Agent involved ──────────────────
        const chatInputObj = { message: 'update activity:', activityId };
        if (subject)     chatInputObj.subject     = subject;
        if (description) chatInputObj.description = description;
        if (dueDate)     chatInputObj.dueDate      = dueDate;
        if (direction)   chatInputObj.direction    = direction;
        if (channel)     chatInputObj.channel      = channel;
        chatInputObj.ownerId     = ownerId; // always include (required)
        chatInputObj.completedAt = completed ? new Date().toISOString() : null;

        sendStructured(chatInputObj);
    }

    // Single delegated listener — survives any innerHTML replacement, never needs re-attaching
    function attachQuickActionHandlers() { /* no-op: delegation is set up once at init below */ }

    document.addEventListener('click', function(e) {

    // ========================================================================
    // KEYBOARD SHORTCUTS
    // ========================================================================
    
    function handleKeyDown(event) {
        // Enter to submit (without Shift)
        if (event.key === 'Enter' && !event.shiftKey) {
            event.preventDefault();
            document.getElementById('chatForm').dispatchEvent(new Event('submit'));
        }
    }

    document.addEventListener('keydown', function(event) {
        // Ctrl+L: List activities
        if (event.ctrlKey && event.key === 'l') {
            event.preventDefault();
            actions.listActivities();
        }
        // Ctrl+O: Overdue
        if (event.ctrlKey && event.key === 'o') {
            event.preventDefault();
            actions.showOverdue();
        }
        // Ctrl+U: Upcoming
        if (event.ctrlKey && event.key === 'u') {
            event.preventDefault();
            actions.showUpcoming();
        }
        // Ctrl+S: Summary (only when not in input)
        if (event.ctrlKey && event.key === 's' && document.activeElement.id !== 'message') {
            event.preventDefault();
            actions.showSummary();
        }
    });

    // ========================================================================
    // VOICE INPUT
    // ========================================================================
    
    let recognition = null;
    let isListening = false;
    let voiceInputBaseline = '';
    let voiceFinalTranscript = '';
    
    function toggleVoiceInput() {
        if (isListening) {
            stopVoiceInput();
        } else {
            startVoiceInput();
        }
    }
    
    function startVoiceInput() {
        if (!recognition) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            
            if (!SpeechRecognition) {
                alert('Speech recognition is not supported in your browser. Please use Chrome, Edge, or Safari.');
                return;
            }
            
            recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = 'en-US';
            
            recognition.onresult = (event) => {
                let interimTranscript = '';
                let newFinalTranscript = '';
                
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    const transcript = event.results[i][0].transcript;
                    if (event.results[i].isFinal) {
                        newFinalTranscript += transcript + ' ';
                    } else {
                        interimTranscript += transcript;
                    }
                }
                
                if (newFinalTranscript) {
                    voiceFinalTranscript += newFinalTranscript;
                }
                
                const input = document.getElementById('message');
                input.value = voiceInputBaseline + voiceFinalTranscript + interimTranscript;
            };
            
            recognition.onerror = (event) => {
                console.error('Speech recognition error:', event.error);
                if (event.error === 'not-allowed' || event.error === 'permission-denied') {
                    alert('Microphone permission denied. Please allow microphone access.');
                }
                stopVoiceInput();
            };
            
            recognition.onend = () => {
                if (isListening) {
                    try {
                        recognition.start();
                    } catch (e) {
                        stopVoiceInput();
                    }
                }
            };
        }
        
        const input = document.getElementById('message');
        voiceInputBaseline = input.value;
        voiceFinalTranscript = '';
        
        try {
            recognition.start();
            isListening = true;
            
            document.getElementById('voiceBtn').classList.add('listening');
            document.getElementById('voiceStatus').classList.add('active');
            
            const handleStop = () => { if (isListening) stopVoiceInput(); };
            input.addEventListener('click', handleStop, { once: true });
            input.addEventListener('input', handleStop, { once: true });
            input.addEventListener('keydown', handleStop, { once: true });
            
        } catch (error) {
            console.error('Error starting voice input:', error);
        }
    }
    
    function stopVoiceInput() {
        if (recognition) {
            try { recognition.stop(); } catch (e) {}
        }
        
        isListening = false;
        document.getElementById('voiceBtn').classList.remove('listening');
        document.getElementById('voiceStatus').classList.remove('active');
        voiceInputBaseline = '';
        voiceFinalTranscript = '';
    }
