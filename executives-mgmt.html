<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Conscestra CRM — Executives</title>

<!-- CRM API auth shim (marker: crm-auth-shim): attaches the admin session token. -->
<script>
(function () {
    var KEY = 'orbit_auth_session';
    function tok() { try { return (JSON.parse(localStorage.getItem(KEY) || 'null') || {}).session_token || ''; } catch (e) { return ''; } }
    if (!window.fetch) return;
    var _fetch = window.fetch.bind(window);
    window.fetch = function (input, init) {
        init = init || {};
        var t = tok();
        if (t) {
            var src = (init && init.headers) || (typeof input === 'object' && input && input.headers) || {};
            var h = new Headers(src);
            if (!h.has('Authorization')) h.set('Authorization', 'Bearer ' + t);
            init.headers = h;
        }
        return _fetch(input, init);
    };
})();
</script>

<style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f1f5f9; color: #0f172a; }
    .topbar { background: linear-gradient(135deg, #8b5cf6 0%, #7c3aed 50%, #6d28d9 100%); color: #fff; padding: 0.9rem 1.5rem; display: flex; align-items: center; justify-content: space-between; }
    .topbar h1 { font-size: 1.15rem; font-weight: 700; display: flex; gap: .5rem; align-items: center; }
    .topbar a { color: #fff; text-decoration: none; background: rgba(255,255,255,.15); padding: .4rem .9rem; border-radius: 8px; font-size: .85rem; font-weight: 600; }
    .topbar a:hover { background: rgba(255,255,255,.28); }
    /* Connected indicator + Reset (matches the module home pages) */
    .session-info { font-size: .8rem; display: flex; align-items: center; gap: .6rem; }
    .polling-indicator { display: flex; align-items: center; gap: .5rem; font-size: .75rem; padding: .28rem .8rem; background: rgba(255,255,255,.22); border-radius: 20px; color: #fff; }
    .polling-dot { width: 8px; height: 8px; border-radius: 50%; background: #34d399; box-shadow: 0 0 0 0 rgba(52,211,153,.6); animation: pulse-dot 2s ease-in-out infinite; }
    .polling-dot.error { background: #f87171; animation: none; }
    @keyframes pulse-dot { 0%,100% { box-shadow: 0 0 0 0 rgba(52,211,153,.5); } 50% { box-shadow: 0 0 0 5px rgba(52,211,153,0); } }
    .session-info button { background: #fff; color: #6d28d9; border: none; border-radius: 20px; padding: .32rem .85rem; cursor: pointer; font-size: .75rem; font-weight: 700; }
    .session-info button:hover { background: #ede9fe; }
    .wrap { max-width: 1150px; margin: 1.4rem auto; padding: 0 1rem; }
    .card { background: #fff; border-radius: 12px; box-shadow: 0 1px 4px rgba(0,0,0,.06); padding: 1.1rem 1.2rem; margin-bottom: 1.2rem; }
    .card h2 { font-size: .95rem; color: #4c1d95; margin-bottom: .9rem; }
    .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: .75rem; }
    .grid .full { grid-column: 1 / -1; }
    label { display: block; font-size: .7rem; color: #64748b; font-weight: 600; text-transform: uppercase; letter-spacing: .03em; margin-bottom: .25rem; }
    input, select, textarea { width: 100%; padding: .55rem .75rem; border: 1px solid #cbd5e1; border-radius: 9px; font-size: .88rem; outline: none; font-family: inherit; }
    input:focus, select:focus, textarea:focus { border-color: #7c3aed; }
    .row-check { display: flex; gap: 1.5rem; align-items: center; margin-top: .4rem; }
    .row-check label { display: flex; align-items: center; gap: .4rem; text-transform: none; letter-spacing: 0; font-size: .85rem; color: #334155; margin: 0; }
    .row-check input { width: auto; }
    .actions { display: flex; gap: .6rem; margin-top: 1rem; }
    button { cursor: pointer; border: none; border-radius: 9px; padding: .55rem 1.1rem; font-size: .85rem; font-weight: 700; }
    .btn-save { background: linear-gradient(135deg, #7c3aed, #6d28d9); color: #fff; }
    .btn-ghost { background: #e2e8f0; color: #334155; }
    table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.06); }
    th, td { padding: .6rem .75rem; text-align: left; font-size: .82rem; border-bottom: 1px solid #eef2f7; vertical-align: top; }
    th { background: #f8fafc; color: #475569; font-weight: 600; text-transform: uppercase; letter-spacing: .03em; font-size: .68rem; }
    tr:hover td { background: #f8fafe; }
    .pill { display: inline-block; padding: .12rem .55rem; border-radius: 999px; font-size: .68rem; font-weight: 700; background: #ede9fe; color: #5b21b6; }
    .tag { display:inline-block; background:#eef2f7; color:#475569; border-radius:6px; padding:.05rem .4rem; font-size:.66rem; margin:1px; }
    .ok { color: #059669; font-weight: 700; } .no { color: #94a3b8; font-weight: 600; }
    .lnk { color: #6d28d9; font-weight: 600; cursor: pointer; }
    .lnk.del { color: #dc2626; }
    #toast { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%) translateY(20px); background: linear-gradient(135deg,#4c1d95,#2e1065); color: #fff; padding: .7rem 1.2rem; border-radius: 10px; opacity: 0; transition: .25s; font-size: .85rem; }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    #gate { display: none; flex-direction: column; align-items: center; gap: 1rem; padding: 3rem 1rem; text-align: center; }
    #gate a { text-decoration: none; background: linear-gradient(135deg, #7c3aed, #6d28d9); color: #fff; padding: .6rem 1.1rem; border-radius: 9px; font-weight: 600; min-width: 190px; text-align: center; }
    #gate a:hover { filter: brightness(1.08); }
    .hint { color:#94a3b8; font-size:.74rem; margin-top:.25rem; }
</style>
</head>
<body>
<div class="topbar">
    <h1>👔 Executives Console</h1>
    <div class="session-info">
        <div class="polling-indicator">
            <div class="polling-dot" id="pollingDot"></div>
            <span id="pollingStatus">Connected</span>
        </div>
        <button onclick="resetView()">Reset</button>
    </div>
</div>

<div id="gate">
    <div style="font-size:1.1rem;font-weight:700;">Admin access required</div>
    <div style="color:#64748b;">Sign in as an admin to manage executives.</div>
    <div style="display:flex;gap:.6rem">
        <a href="auth.html?redirect=executives-mgmt.html">Sign in as admin</a>
        <a href="index.html">Back to CRM</a>
    </div>
</div>

<div class="wrap" id="main" style="display:none">
    <div class="card">
        <h2 id="formTitle">Add Executive</h2>
        <input type="hidden" id="f_executive_id">
        <div class="grid">
            <div><label>Role code *</label>
                <select id="f_role_code">
                    <option>CEO</option><option>CFO</option><option>CRO</option>
                    <option>COO</option><option>CPO</option><option>CTO</option><option>OTHER</option>
                </select></div>
            <div><label>Full name *</label><input id="f_full_name" placeholder="Alan Qin"></div>
            <div><label>Title</label><input id="f_title" placeholder="Chief Executive Officer"></div>
            <div><label>Email *</label><input id="f_email" placeholder="ceo@company.com"></div>
            <div><label>Phone</label><input id="f_phone" placeholder="+1 …"></div>
            <div><label>Timezone</label><input id="f_timezone" value="America/New_York"></div>
            <div class="full"><label>Notification categories (comma-separated)</label>
                <input id="f_notification_categories" placeholder="ceo_briefing, revenue_risk, large_deals">
                <div class="hint">The CEO briefing is sent to executives whose categories include <b>ceo_briefing</b>.</div></div>
            <div><label>Approval authority limit ($)</label><input id="f_approval_authority_limit" type="number" placeholder="50000"></div>
            <div class="full"><label>Notes</label><textarea id="f_notes" rows="2"></textarea></div>
        </div>
        <div class="row-check">
            <label><input type="checkbox" id="f_is_active" checked> Active</label>
            <label><input type="checkbox" id="f_auto_email_enabled" checked> Auto-email enabled</label>
        </div>
        <div class="actions">
            <button class="btn-save" onclick="save()">💾 Save</button>
            <button class="btn-ghost" onclick="resetForm()">Clear</button>
        </div>
    </div>

    <div class="card" style="padding:0;overflow:hidden">
        <table>
            <thead><tr>
                <th>Role</th><th>Name</th><th>Email</th><th>Categories</th>
                <th>Auto-email</th><th>Active</th><th>Approval $</th><th></th>
            </tr></thead>
            <tbody id="rows"><tr><td colspan="8" style="padding:1.4rem;text-align:center;color:#94a3b8">Loading…</td></tr></tbody>
        </table>
    </div>
</div>

<div id="toast"></div>

<script>
    const _IS_LOCAL = location.hostname === 'localhost' || location.hostname === '127.0.0.1' || location.protocol === 'file:';
    const API = _IS_LOCAL ? 'http://localhost:8000' : 'https://orbitcrm-production.up.railway.app';

    function session() { try { return JSON.parse(localStorage.getItem('orbit_auth_session') || 'null'); } catch (e) { return null; } }
    (function gate() {
        const s = session();
        if (!s || !s.session_token) { document.getElementById('gate').style.display = 'flex'; return; }
        document.getElementById('main').style.display = 'block';
        load();
    })();

    let EXECS = [];
    function toast(m) { const t = document.getElementById('toast'); t.textContent = m; t.classList.add('show'); clearTimeout(toast._t); toast._t = setTimeout(() => t.classList.remove('show'), 2600); }
    function esc(s) { return String(s == null ? '' : s).replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c])); }
    function v(id) { return document.getElementById(id).value.trim(); }

    async function api(path, method, body) {
        const res = await fetch(API + path, { method: method || 'GET', headers: { 'Content-Type': 'application/json' }, body: body ? JSON.stringify(body) : undefined });
        const data = await res.json().catch(() => ({}));
        if (res.status === 403) { document.getElementById('gate').style.display = 'flex'; document.getElementById('main').style.display = 'none'; throw new Error('Admin required'); }
        if (!res.ok) throw new Error(data.detail || ('HTTP ' + res.status));
        return data;
    }

    function setConnected(ok) {
        const d = document.getElementById('pollingDot'), s = document.getElementById('pollingStatus');
        if (!d) return;
        if (ok) { d.classList.remove('error'); s.textContent = 'Connected'; }
        else { d.classList.add('error'); s.textContent = 'Disconnected'; }
    }

    function resetView() { resetForm(); load(); toast('Refreshed'); }

    async function load() {
        try { const d = await api('/executives'); EXECS = d.executives || []; render(); setConnected(true); }
        catch (e) { setConnected(false); document.getElementById('rows').innerHTML = `<tr><td colspan="8" class="no" style="padding:1.4rem;text-align:center">${esc(e.message)}</td></tr>`; }
    }

    function render() {
        if (!EXECS.length) { document.getElementById('rows').innerHTML = `<tr><td colspan="8" style="padding:1.4rem;text-align:center;color:#94a3b8">No executives yet — add one above.</td></tr>`; return; }
        document.getElementById('rows').innerHTML = EXECS.map(e => {
            const cats = (e.notification_categories || []).map(c => `<span class="tag">${esc(c)}</span>`).join(' ');
            const appr = e.approval_authority_limit != null ? '$' + Number(e.approval_authority_limit).toLocaleString() : '—';
            return `<tr>
                <td><span class="pill">${esc(e.role_code)}</span></td>
                <td><b>${esc(e.full_name)}</b><br><span style="color:#94a3b8;font-size:.72rem">${esc(e.title || '')}</span></td>
                <td>${esc(e.email)}</td>
                <td>${cats || '—'}</td>
                <td>${e.auto_email_enabled ? '<span class="ok">on</span>' : '<span class="no">off</span>'}</td>
                <td>${e.is_active ? '<span class="ok">yes</span>' : '<span class="no">no</span>'}</td>
                <td>${appr}</td>
                <td style="white-space:nowrap"><span class="lnk" onclick='edit(${JSON.stringify(e.executive_id)})'>Edit</span> ·
                    <span class="lnk del" onclick='del(${JSON.stringify(e.executive_id)}, ${JSON.stringify(e.full_name)})'>Delete</span></td>
            </tr>`;
        }).join('');
    }

    function resetForm() {
        ['f_executive_id','f_full_name','f_title','f_email','f_phone','f_notification_categories','f_approval_authority_limit','f_notes'].forEach(id => document.getElementById(id).value = '');
        document.getElementById('f_role_code').value = 'CEO';
        document.getElementById('f_timezone').value = 'America/New_York';
        document.getElementById('f_is_active').checked = true;
        document.getElementById('f_auto_email_enabled').checked = true;
        document.getElementById('formTitle').textContent = 'Add Executive';
    }

    function edit(id) {
        const e = EXECS.find(x => x.executive_id === id); if (!e) return;
        document.getElementById('f_executive_id').value = e.executive_id;
        document.getElementById('f_role_code').value = e.role_code || 'CEO';
        document.getElementById('f_full_name').value = e.full_name || '';
        document.getElementById('f_title').value = e.title || '';
        document.getElementById('f_email').value = e.email || '';
        document.getElementById('f_phone').value = e.phone || '';
        document.getElementById('f_timezone').value = e.timezone || 'America/New_York';
        document.getElementById('f_notification_categories').value = (e.notification_categories || []).join(', ');
        document.getElementById('f_approval_authority_limit').value = e.approval_authority_limit ?? '';
        document.getElementById('f_notes').value = e.notes || '';
        document.getElementById('f_is_active').checked = !!e.is_active;
        document.getElementById('f_auto_email_enabled').checked = !!e.auto_email_enabled;
        document.getElementById('formTitle').textContent = 'Edit Executive — ' + (e.full_name || '');
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    async function save() {
        const body = {
            executive_id: v('f_executive_id') || undefined,
            role_code: v('f_role_code'), full_name: v('f_full_name'), title: v('f_title'),
            email: v('f_email'), phone: v('f_phone'), timezone: v('f_timezone'),
            notification_categories: v('f_notification_categories'),
            approval_authority_limit: v('f_approval_authority_limit') || null,
            notes: v('f_notes'),
            is_active: document.getElementById('f_is_active').checked,
            auto_email_enabled: document.getElementById('f_auto_email_enabled').checked,
        };
        if (!body.role_code || !body.full_name || !body.email) { toast('Role, name and email are required'); return; }
        try { const d = await api('/executives', 'POST', body); toast(d.status === 'updated' ? 'Updated' : 'Created'); resetForm(); load(); }
        catch (e) { toast(e.message); }
    }

    async function del(id, name) {
        if (!confirm('Delete executive "' + name + '"?')) return;
        try { await api('/executives/' + id, 'DELETE'); toast('Deleted'); load(); }
        catch (e) { toast(e.message); }
    }
</script>
</body>
</html>
